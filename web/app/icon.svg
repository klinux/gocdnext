       variables. Keep in sync with --brand-500 in globals.css:
       oklch(0.65 0.14 195) ≈ #0ea5b5. -->
  <g fill="#0ea5b5" stroke="#0ea5b5">
    <line x1="9" y1="16" x2="13" y2="16" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <line x1="19" y1="16" x2="23" y2="16" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <circle cx="6" cy="16" r="3.5" opacity="0.65" stroke="none"/>
    <circle cx="16" cy="16" r="3.5" stroke="none"/>
    <circle cx="26" cy="16" r="3.5" opacity="0.85" stroke="none"/>
  </g>
</svg>
