# Default values for gocdnext. Override via --values custom.yaml or --set.
# Every env-driven knob of the server/agent binaries is surfaced here.

global:
  imageRegistry: ghcr.io/klinux
  imagePullSecrets: []
  logLevel: info

# ----- server ----------------------------------------------------------

server:
  enabled: true
  replicas: 1
  image:
    repository: gocdnext-server
    tag: ""           # defaults to Chart.appVersion
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    httpPort: 8153
    grpcPort: 8154
  ingress:
    enabled: false
    className: nginx
    host: gocdnext.example.com
    tls: false
    tlsSecretName: ""
  # Externally-reachable URL (webhook + artifact signed URLs). If
  # agents run in-cluster and ingress.enabled=false, use
  # http://<release>-server:8153.
  publicBase: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 1Gi
  # Prometheus Operator integration. Enable when the cluster runs
  # kube-prometheus-stack (or any operator that watches ServiceMonitor
  # CRDs). The control-plane exposes /metrics on the existing HTTP
  # port — no extra port to open.
  serviceMonitor:
    enabled: false
    # Extra labels added to the ServiceMonitor — tune if your
    # Prometheus instance uses a non-default `release:` selector.
    labels: {}
    interval: 30s
    scrapeTimeout: 10s
    relabelings: []
    metricRelabelings: []

# ----- agent -----------------------------------------------------------

agent:
  enabled: true
  replicas: 2
  image:
    repository: gocdnext-agent
    tag: ""
    pullPolicy: IfNotPresent
  # shell or kubernetes. Kubernetes spawns one Pod per task in the
  # namespace below (requires the RBAC + PVC this chart creates).
  engine: kubernetes
  tags: "linux,docker"
  capacity: 2
  tokenSecret:
    existingSecret: ""
    value: ""  # required when existingSecret is empty
  workspace:
    storageClass: ""        # "" = cluster default
    size: 20Gi
    accessMode: ReadWriteMany
    mountPath: /workspace
  defaultJobImage: alpine:3.19
  jobCleanup:
    onSuccess: true
    onFailure: false
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 512Mi

# ----- web -------------------------------------------------------------

web:
  enabled: true
  replicas: 1
  image:
    repository: gocdnext-web
    tag: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3000
  ingress:
    enabled: false
    className: nginx
    host: ui.gocdnext.example.com
    tls: false
    tlsSecretName: ""

# ----- database --------------------------------------------------------
# Prod: point at a managed DB via `url` or a Secret. Dev: enable
# devDatabase for a single-replica StatefulSet (not for prod).

database:
  url: ""
  existingSecret: ""
  secretKey: DATABASE_URL

devDatabase:
  enabled: false
  image: postgres:16-alpine
  persistence:
    size: 10Gi
    storageClass: ""
  credentials:
    user: gocdnext
    password: gocdnext
    database: gocdnext

# ----- artifacts -------------------------------------------------------

artifacts:
  backend: filesystem          # filesystem | s3 | gcs
  keepLastPerPipeline: 30
  projectQuotaBytes: "107374182400"  # 100 GiB
  globalQuotaBytes: "0"              # disabled
  # Per-request body cap on artefact uploads. Anything bigger
  # than this is rejected by the receiver before touching disk —
  # protects against a wedged agent streaming TBs into the
  # backend. MB-units to match the env var.
  maxBodyMB: 2048

  filesystem:
    storageClass: ""
    size: 50Gi
    root: /var/lib/gocdnext/artifacts
  s3:
    bucket: ""
    region: us-east-1
    endpoint: ""
    usePathStyle: false
    ensureBucket: false
    existingSecret: ""
  gcs:
    bucket: ""
    projectID: ""
    ensureBucket: false
    existingSecret: ""

# ----- caches ----------------------------------------------------------
# Per-job content-addressable caches uploaded by the cache plugin.
# Eviction is layered: TTL by last_accessed_at, then per-project
# quota, then global quota. 0 disables a layer.
caches:
  # Days of inactivity before a `ready` cache row is evicted. 0 =
  # disabled (TTL pass off; quotas alone govern eviction).
  ttlDays: 30
  # Per-project soft cap, bytes. 0 disables — TTL-only eviction.
  projectQuotaBytes: "0"
  # Global hard cap, bytes. 0 disables. Applied LRU across every
  # project AFTER the per-project pass so heavy tenants pay from
  # their own caches before the pressure spreads.
  globalQuotaBytes: "0"

# ----- logs ------------------------------------------------------------
# log_lines is RANGE-partitioned by month (migration 00027); the
# sweeper rotates partitions ahead and drops them past `retention`.
# Cold archive (slice 3) ships terminal-job logs to the artefact
# backend and drops the rows — toggle via `archive.policy`.
logs:
  # Retention window for the partitioned heap. Go duration string;
  # empty disables drops (partitions still get created ahead of
  # time so writes always land somewhere).
  retention: ""
  # Months of partitions kept stocked ahead of "now". Daily ticks
  # refresh; 3 is enough cushion for a multi-day server outage.
  monthsAhead: 3
  archive:
    # auto | on | off
    #   auto - on iff an artefact backend is wired (default)
    #   on   - force on; boot fails without a backend
    #   off  - cluster-wide kill switch (per-project flags ignored)
    policy: auto
    # In-memory cache for decoded archives. Bytes; 0 disables.
    # 256 MiB by default — comfortable for a single-node deployment,
    # dwarfed by typical /runs/[id] reload savings.
    cacheBytes: "268435456"

# ----- webhook / secret / signing keys --------------------------------

webhookToken:
  existingSecret: ""
  value: ""

# Project secrets live in Postgres (db, default) or as K8s Secret
# objects (kubernetes). Kubernetes backend reads objects named by
# secrets.kubernetes.nameTemplate; secretKey below is ignored.
secrets:
  backend: db          # db | kubernetes
  kubernetes:
    namespace: ""                              # empty = Release.Namespace
    nameTemplate: "gocdnext-secrets-{slug}"

secretKey:
  existingSecret: ""
  value: ""
artifactsSignKey:
  existingSecret: ""
  value: ""

# ----- auth ------------------------------------------------------------
# Off by default — flipping `enabled` true gates /auth + protected
# routes; before that everything stays open (matches binary default).
# Each provider's client_id is non-sensitive and goes inline; the
# client_secret folds into the chart-managed `<release>-tokens`
# Secret when no `existingSecret` is supplied.
auth:
  enabled: false
  # Promotes these emails to admin on first login. Empty list = no
  # automatic promotion (everyone lands as viewer).
  adminEmails: []
  # Restrict logins to these email domains (e.g. ["company.com"]).
  # Empty = any domain accepted.
  allowedDomains: []

  github:
    clientID: ""
    clientSecret:
      existingSecret: ""    # K8s Secret with key AUTH_GITHUB_CLIENT_SECRET
      value: ""             # inline; folded into <release>-tokens when set
    # Override for GitHub Enterprise installations. Empty = github.com.
    apiBase: ""

  google:
    clientID: ""
    clientSecret:
      existingSecret: ""    # key AUTH_GOOGLE_CLIENT_SECRET
      value: ""
    # Issuer URL. Empty inherits the binary default (accounts.google.com).
    issuer: ""

  keycloak:
    clientID: ""
    clientSecret:
      existingSecret: ""    # key AUTH_KEYCLOAK_CLIENT_SECRET
      value: ""
    # Realm issuer URL — e.g. https://kc.example.com/realms/internal.
    issuer: ""

  oidc:
    clientID: ""
    clientSecret:
      existingSecret: ""    # key AUTH_OIDC_CLIENT_SECRET
      value: ""
    issuer: ""
    # Display name shown on the login button. Empty = "OIDC".
    name: ""

# ----- Runner profiles --------------------------------------------------
# Optional declarative seed for the runner_profiles table. When this
# list is non-empty the chart renders a ConfigMap and points the
# server at it via GOCDNEXT_RUNNER_PROFILES_FILE. The server upserts
# each entry by `name` on boot — UI-created profiles not listed here
# are LEFT ALONE, so admin and Helm-managed catalogues coexist.
# Externally-reachable webhook callback URL handed to GitHub
# when registering a repo webhook. Empty = use server.publicBase
# (right thing for most deployments). Set this when the public
# base differs from the webhook base (e.g. a public smee.io tunnel
# in dev while the dashboard sits on a private hostname).
webhookPublicURL: ""

# Plugin catalog directory(ies) the server scans on boot for
# `<dir>/<name>/plugin.yaml` manifests. The server image bakes the
# official catalogue at `/etc/gocdnext/plugins` and sets the env
# var by default, so most deployments leave this empty.
#
# Set this to a colon-separated path list ($PATH-style) only when
# you want to fully override the default — e.g. swap the baked
# catalogue out for a custom one:
#   pluginCatalogDir: /mnt/my-catalog
# To EXTEND the baked catalogue with operator-supplied manifests,
# use the `extraPlugins:` block below — the chart wires that into a
# ConfigMap mounted at `/etc/gocdnext/extra-plugins` and the env
# becomes `/etc/gocdnext/plugins:/etc/gocdnext/extra-plugins`
# automatically. Later roots override earlier ones, so you can also
# use extraPlugins to override one specific official manifest
# without forking the chart.
pluginCatalogDir: ""

# Operator-supplied plugin manifests merged into the catalogue at
# runtime via a ConfigMap mounted alongside the baked one. Each
# key is the plugin name (matches the manifest's `name:` field —
# the loader rejects mismatches). Each value is the verbatim
# `plugin.yaml` content. Empty map = ConfigMap is not rendered.
#
# Example:
#   extraPlugins:
#     myorg-deploy: |
#       name: myorg-deploy
#       category: deploy
#       description: Roll out a service via our internal CD API.
#       inputs:
#         service:
#           required: true
#           description: service slug
#         env:
#           required: true
#           description: target environment (staging|prod)
extraPlugins: {}

# Default seeded catalogue. The "default" profile ships out of the
# box so operators don't have to know about runner profiles before
# their first pipeline runs — pipelines reference it explicitly via
# `agent.profile: default` and pick up the bundled CPU/memory bounds
# without any extra config. Override this list to tighten/widen the
# bounds, add tags, or seed extra profiles (e.g. "gpu", "fast-builds")
# with their own env + secrets.
#
# The bundled "default" deliberately ships:
#   - no `default_image` (jobs / plugins decide what to run)
#   - no `tags`           (matches any agent — no scheduling stalls)
#   - no `env` / `secrets` (operator-specific; add per-cluster needs)
runnerProfiles:
  - name: default
    description: "Sensible runtime bounds for any pipeline. Reference via `agent.profile: default`."
    engine: kubernetes
    default_cpu_request: 100m
    default_cpu_limit: "1"
    default_mem_request: 256Mi
    default_mem_limit: 1Gi
    max_cpu: "4"
    max_mem: 8Gi
    tags: []
# Example of additional seeded profiles. Append to the list above
# (don't replace — that drops the bundled `default`).
# - name: fast-builds
#   description: S3 layer cache for buildx jobs.
#   engine: kubernetes
#   default_cpu_request: 500m
#   default_mem_request: 1Gi
#   max_cpu: "8"
#   max_mem: 16Gi
#   tags: [linux, docker]
#   env:
#     GOCDNEXT_LAYER_CACHE_BUCKET: gocdnext-cache
#     GOCDNEXT_LAYER_CACHE_REGION: us-east-1
#   # secrets are seeded in plain text here — fine for ops/ci
#   # secrets in private values.yaml or sealed-secrets, NOT for
#   # anything that should rotate often (use the admin UI for those).
#   secrets:
#     AWS_ACCESS_KEY_ID:     # set via --set or sealed-secret
#     AWS_SECRET_ACCESS_KEY:

# ----- GitHub App ------------------------------------------------------

githubApp:
  enabled: false
  appID: 0
  existingSecret: ""
  privateKey: ""
  apiBase: ""
