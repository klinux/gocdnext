# Default values for gocdnext. Override via --values custom.yaml or --set.
# Every env-driven knob of the server/agent binaries is surfaced here.

global:
  imageRegistry: ghcr.io/klinux
  imagePullSecrets: []
  logLevel: info

# ----- server ----------------------------------------------------------

server:
  enabled: true
  replicas: 1
  image:
    repository: gocdnext-server
    tag: ""           # defaults to Chart.appVersion
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    httpPort: 8153
    grpcPort: 8154
  ingress:
    enabled: false
    className: nginx
    host: gocdnext.example.com
    tls: false
    tlsSecretName: ""
  # Externally-reachable URL (webhook + artifact signed URLs). If
  # agents run in-cluster and ingress.enabled=false, use
  # http://<release>-server:8153.
  publicBase: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 1Gi

# ----- agent -----------------------------------------------------------

agent:
  enabled: true
  replicas: 2
  image:
    repository: gocdnext-agent
    tag: ""
    pullPolicy: IfNotPresent
  # shell or kubernetes. Kubernetes spawns one Pod per task in the
  # namespace below (requires the RBAC + PVC this chart creates).
  engine: kubernetes
  tags: "linux,docker"
  capacity: 2
  tokenSecret:
    existingSecret: ""
    value: ""  # required when existingSecret is empty
  workspace:
    storageClass: ""        # "" = cluster default
    size: 20Gi
    accessMode: ReadWriteMany
    mountPath: /workspace
  defaultJobImage: alpine:3.19
  jobCleanup:
    onSuccess: true
    onFailure: false
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 512Mi

# ----- web -------------------------------------------------------------

web:
  enabled: true
  replicas: 1
  image:
    repository: gocdnext-web
    tag: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3000
  ingress:
    enabled: false
    className: nginx
    host: ui.gocdnext.example.com
    tls: false
    tlsSecretName: ""

# ----- database --------------------------------------------------------
# Prod: point at a managed DB via `url` or a Secret. Dev: enable
# devDatabase for a single-replica StatefulSet (not for prod).

database:
  url: ""
  existingSecret: ""
  secretKey: DATABASE_URL

devDatabase:
  enabled: false
  image: postgres:16-alpine
  persistence:
    size: 10Gi
    storageClass: ""
  credentials:
    user: gocdnext
    password: gocdnext
    database: gocdnext

# ----- artifacts -------------------------------------------------------

artifacts:
  backend: filesystem          # filesystem | s3 | gcs
  keepLastPerPipeline: 30
  projectQuotaBytes: "107374182400"  # 100 GiB
  globalQuotaBytes: "0"              # disabled

  filesystem:
    storageClass: ""
    size: 50Gi
    root: /var/lib/gocdnext/artifacts
  s3:
    bucket: ""
    region: us-east-1
    endpoint: ""
    usePathStyle: false
    ensureBucket: false
    existingSecret: ""
  gcs:
    bucket: ""
    projectID: ""
    ensureBucket: false
    existingSecret: ""

# ----- webhook / secret / signing keys --------------------------------

webhookToken:
  existingSecret: ""
  value: ""

# Project secrets live in Postgres (db, default) or as K8s Secret
# objects (kubernetes). Kubernetes backend reads objects named by
# secrets.kubernetes.nameTemplate; secretKey below is ignored.
secrets:
  backend: db          # db | kubernetes
  kubernetes:
    namespace: ""                              # empty = Release.Namespace
    nameTemplate: "gocdnext-secrets-{slug}"

secretKey:
  existingSecret: ""
  value: ""
artifactsSignKey:
  existingSecret: ""
  value: ""

# ----- Runner profiles --------------------------------------------------
# Optional declarative seed for the runner_profiles table. When this
# list is non-empty the chart renders a ConfigMap and points the
# server at it via GOCDNEXT_RUNNER_PROFILES_FILE. The server upserts
# each entry by `name` on boot — UI-created profiles not listed here
# are LEFT ALONE, so admin and Helm-managed catalogues coexist.
runnerProfiles: []
# Example:
# runnerProfiles:
#   - name: default
#     description: vanilla pool
#     engine: kubernetes
#     default_image: alpine:3.20
#     default_cpu_request: 100m
#     default_mem_request: 256Mi
#     max_cpu: "4"
#     max_mem: 8Gi
#     tags: [linux]
#   - name: gpu
#     engine: kubernetes
#     default_image: nvidia/cuda:12-runtime
#     max_cpu: "8"
#     max_mem: 32Gi
#     tags: [gpu]

# ----- GitHub App ------------------------------------------------------

githubApp:
  enabled: false
  appID: 0
  existingSecret: ""
  privateKey: ""
  apiBase: ""
