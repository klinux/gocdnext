{{- if .Values.agent.enabled }}
# Headless service satisfies the StatefulSet's serviceName contract.
# We never DNS-resolve agents from outside (gRPC is outbound from
# the agent to the server), but the Service still has to exist for
# the StatefulSet to come up. clusterIP: None keeps it free of
# kube-proxy overhead.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "gocdnext.agent.fullname" . }}-headless
  labels:
    {{- include "gocdnext.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent
spec:
  clusterIP: None
  selector: {{- include "gocdnext.agent.selectorLabels" . | nindent 4 }}
  ports:
    - name: placeholder
      port: 1
---
# StatefulSet (not Deployment): the agent registers in the server
# DB by name, and the row needs to outlive pod restarts. Pod-name
# under a Deployment regenerates on every restart (random suffix
# from the ReplicaSet hash) which would orphan the registration.
# StatefulSet gives stable names — agent-0, agent-1 — that match a
# durable row.
#
# `podManagementPolicy: Parallel` so scale + rollout run concurrent
# on every replica. Default OrderedReady would scale up serially,
# which is fine for databases but pointless for agents (no
# election, no leader, each replica is independent).
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "gocdnext.agent.fullname" . }}
  labels:
    {{- include "gocdnext.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent
spec:
  serviceName: {{ include "gocdnext.agent.fullname" . }}-headless
  replicas: {{ .Values.agent.replicas }}
  podManagementPolicy: Parallel
  selector:
    matchLabels: {{- include "gocdnext.agent.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels: {{- include "gocdnext.agent.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "gocdnext.agent.fullname" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: agent
          image: {{ include "gocdnext.image" (dict "root" . "imageRef" .Values.agent.image) }}
          imagePullPolicy: {{ .Values.agent.image.pullPolicy }}
          env:
            - name: GOCDNEXT_SERVER_ADDR
              value: {{ printf "%s:%d" (include "gocdnext.server.fullname" .) (int .Values.server.service.grpcPort) | quote }}
            - name: GOCDNEXT_AGENT_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: GOCDNEXT_AGENT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ default (printf "%s-token" (include "gocdnext.agent.fullname" .)) .Values.agent.tokenSecret.existingSecret }}
                  key: token
            - name: GOCDNEXT_AGENT_TAGS
              value: {{ .Values.agent.tags | quote }}
            - name: GOCDNEXT_AGENT_CAPACITY
              value: {{ .Values.agent.capacity | quote }}
            - name: GOCDNEXT_AGENT_ENGINE
              value: {{ .Values.agent.engine | quote }}
            {{- if eq .Values.agent.engine "kubernetes" }}
            - name: GOCDNEXT_K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            # accessMode picks the workspace strategy:
            #   ReadWriteOnce (default, v0.5+): each job pod owns
            #     an ephemeral PVC via volume.ephemeral. Agent does
            #     NOT mount a workspace PVC — prep runs inside each
            #     job pod's init container.
            #   ReadWriteMany (legacy, pre-v0.5): per-replica PVC
            #     from the StatefulSet's VCT is mounted by the
            #     agent AND all spawned job pods. Requires an RWX
            #     storage class (Filestore, NFS).
            {{- if eq .Values.agent.workspace.accessMode "ReadWriteMany" }}
            - name: GOCDNEXT_K8S_WORKSPACE_MODE
              value: "shared"
            # Per-replica workspace PVC: the StatefulSet's VCT names
            # the claim `workspace-<podname>` (e.g. workspace-agent-0).
            # The agent reads this env to mount the right claim into
            # job pods.
            #
            # Order matters: kubelet only expands $(VAR) against env
            # entries DEFINED EARLIER in the list — forward refs stay
            # literal.
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: WORKSPACE_PVC_NAME
              value: workspace-$(POD_NAME)
            - name: GOCDNEXT_K8S_WORKSPACE_PVC
              value: $(WORKSPACE_PVC_NAME)
            - name: GOCDNEXT_K8S_WORKSPACE_PATH
              value: {{ .Values.agent.workspace.mountPath | quote }}
            {{- else }}
            - name: GOCDNEXT_K8S_WORKSPACE_MODE
              value: "isolated"
            - name: GOCDNEXT_K8S_WORKSPACE_PATH
              value: {{ .Values.agent.workspace.mountPath | quote }}
            - name: GOCDNEXT_K8S_WORKSPACE_SIZE
              value: {{ .Values.agent.workspace.size | quote }}
            {{- with .Values.agent.workspace.storageClass }}
            - name: GOCDNEXT_K8S_WORKSPACE_STORAGE_CLASS
              value: {{ . | quote }}
            {{- end }}
            # Init container in each job pod re-uses the agent
            # image (the `gocdnext-agent prep` subcommand is part
            # of the same binary).
            - name: GOCDNEXT_K8S_AGENT_IMAGE
              value: {{ include "gocdnext.image" (dict "root" . "imageRef" .Values.agent.image) | quote }}
            {{- with .Values.agent.workspace.housekeeperImage }}
            - name: GOCDNEXT_K8S_HOUSEKEEPER_IMAGE
              value: {{ . | quote }}
            {{- end }}
            {{- end }}
            - name: GOCDNEXT_K8S_DEFAULT_IMAGE
              value: {{ .Values.agent.defaultJobImage | quote }}
            - name: GOCDNEXT_K8S_CLEANUP_ON_SUCCESS
              value: {{ .Values.agent.jobCleanup.onSuccess | quote }}
            - name: GOCDNEXT_K8S_CLEANUP_ON_FAILURE
              value: {{ .Values.agent.jobCleanup.onFailure | quote }}
            - name: GOCDNEXT_K8S_FORCE_IMAGE_PULL_ALWAYS
              value: {{ .Values.agent.forceImagePullAlways | default false | quote }}
            {{- with .Values.agent.workspace.rootOverride }}
            - name: GOCDNEXT_WORKSPACE_ROOT
              value: {{ . | quote }}
            {{- end }}
            # Job-pod scheduling baseline (v0.14.0+). Map / list →
            # JSON via toJson. Empty defaults render as `{}` / `[]`
            # which the agent treats as "no baseline" and skips
            # parsing entirely.
            {{- with .Values.agent.jobNodeSelector }}
            - name: GOCDNEXT_K8S_JOB_NODE_SELECTOR
              value: {{ toJson . | quote }}
            {{- end }}
            {{- with .Values.agent.jobTolerations }}
            - name: GOCDNEXT_K8S_JOB_TOLERATIONS
              value: {{ toJson . | quote }}
            {{- end }}
            {{- end }}
          {{- if and (eq .Values.agent.engine "kubernetes") (eq .Values.agent.workspace.accessMode "ReadWriteMany") }}
          volumeMounts:
            - name: workspace
              mountPath: {{ .Values.agent.workspace.mountPath }}
          {{- end }}
          resources: {{- toYaml .Values.agent.resources | nindent 12 }}
  {{- if and (eq .Values.agent.engine "kubernetes") (eq .Values.agent.workspace.accessMode "ReadWriteMany") }}
  volumeClaimTemplates:
    - metadata:
        name: workspace
      spec:
        accessModes: [ReadWriteMany]
        {{- with .Values.agent.workspace.storageClass }}
        storageClassName: {{ . | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.agent.workspace.size }}
  {{- end }}
{{- end }}
