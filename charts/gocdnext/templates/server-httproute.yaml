{{- /*
Gateway API alternative to the Ingress template above. Renders an
HTTPRoute (and optionally a Gateway) when the operator runs a
gateway controller (Envoy Gateway, Istio, Cilium, APISIX, etc.)
that consumes Gateway API CRDs.

Coexists with the Ingress template — `server.ingress.enabled` and
`server.gateway.enabled` are independent flags. Operators usually
flip one on, one off, but rendering both is harmless if a
migration period needs both routes live.
*/}}
{{- if and .Values.server.enabled .Values.server.gateway.enabled }}
{{- if and .Values.server.gateway.createGateway (not .Values.server.gateway.gatewayClassName) }}
{{- fail "server.gateway.createGateway=true requires server.gateway.gatewayClassName" }}
{{- end }}
{{- if .Values.server.gateway.createGateway }}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ include "gocdnext.server.fullname" . }}-gw
  labels: {{- include "gocdnext.labels" . | nindent 4 }}
  {{- with .Values.server.gateway.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  gatewayClassName: {{ .Values.server.gateway.gatewayClassName | quote }}
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
{{- end }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "gocdnext.server.fullname" . }}
  labels: {{- include "gocdnext.labels" . | nindent 4 }}
  {{- with .Values.server.gateway.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- if .Values.server.gateway.createGateway }}
    - name: {{ include "gocdnext.server.fullname" . }}-gw
    {{- else }}
    {{- range .Values.server.gateway.parentRefs }}
    - {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- end }}
  {{- with .Values.server.gateway.hostnames }}
  hostnames:
    {{- range . }}
    - {{ . | quote }}
    {{- end }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "gocdnext.server.fullname" . }}
          port: {{ .Values.server.service.httpPort }}
{{- end }}
