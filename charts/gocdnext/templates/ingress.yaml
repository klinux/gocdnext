{{- if .Values.ingress.enabled }}
{{- $hosts := .Values.ingress.hosts -}}
{{- if not $hosts -}}
{{- $hosts = list .Values.ingress.host -}}
{{- end -}}
{{- if and (not .Values.ingress.exposeServer) (not .Values.ingress.exposeWeb) -}}
{{- fail "ingress.enabled=true requires at least one of exposeServer / exposeWeb to be true." -}}
{{- end -}}
{{- /*
Single-host routing — ONE Ingress resource per host with server
prefixes (API, auth, operational, artifacts) first and `/` as the
catch-all to the web UI. Multiple Ingresses targeting the same
host is undefined behaviour across controllers, so we always
collapse into one resource here.

Path order matters for nginx-ingress (first-match) and is
preserved verbatim from `ingress.serverPaths`.
*/}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "gocdnext.name" . }}-{{ .Release.Name }}
  labels: {{- include "gocdnext.labels" . | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    - hosts:
        {{- range $hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ default (printf "%s-%s-tls" (include "gocdnext.name" $) $.Release.Name) $.Values.ingress.tlsSecretName }}
  {{- end }}
  rules:
    {{- range $hosts }}
    - host: {{ . | quote }}
      http:
        paths:
          {{- if $.Values.ingress.exposeServer }}
          {{- range $.Values.ingress.serverPaths }}
          - path: {{ . | quote }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "gocdnext.server.fullname" $ }}
                port:
                  name: http
          {{- end }}
          {{- end }}
          {{- if $.Values.ingress.exposeWeb }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "gocdnext.web.fullname" $ }}
                port:
                  number: {{ $.Values.web.service.port }}
          {{- end }}
    {{- end }}
{{- end }}
