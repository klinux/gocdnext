{{- if .Values.web.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gocdnext.web.fullname" . }}
  labels:
    {{- include "gocdnext.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.web.replicas }}
  selector:
    matchLabels: {{- include "gocdnext.web.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels: {{- include "gocdnext.web.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: web
          image: {{ include "gocdnext.image" (dict "root" . "imageRef" .Values.web.image) }}
          imagePullPolicy: {{ .Values.web.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
          env:
            # SSR-only: the web Pod uses this for in-pod fetches to the
            # control plane. Defaults to the in-cluster service so a
            # plain `helm install` works without any operator input;
            # override only for split-cluster topologies.
            - name: GOCDNEXT_API_URL
              value: {{ printf "http://%s:%d" (include "gocdnext.server.fullname" .) (int .Values.server.service.httpPort) | quote }}
            # Browser-facing: empty means the client uses RELATIVE
            # paths (`/api/v1/...`), which works whenever the same
            # ingress fronts both `/` and `/api/v1`. Set this only for
            # split-domain deployments where the UI and API are on
            # different hosts. server.publicBase is the natural value
            # in that case; we forward it when non-empty.
            - name: GOCDNEXT_PUBLIC_API_URL
              value: {{ default "" .Values.server.publicBase | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "gocdnext.web.fullname" . }}
  labels: {{- include "gocdnext.labels" . | nindent 4 }}
spec:
  type: {{ .Values.web.service.type }}
  ports:
    - name: http
      port: {{ .Values.web.service.port }}
      targetPort: http
  selector: {{- include "gocdnext.web.selectorLabels" . | nindent 4 }}
{{- end }}
