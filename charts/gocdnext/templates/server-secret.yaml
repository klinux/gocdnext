{{/*
Secret for server-only tokens. Created when any of the *.value is
set and the matching existingSecret is empty. Users who'd rather
manage the Secret themselves point existingSecret at their own
object and leave value blank — the deployment then picks up the
external Secret.
*/}}
{{- $needsWebhook := and (not .Values.webhookToken.existingSecret) .Values.webhookToken.value -}}
{{- $needsSecretKey := and (not .Values.secretKey.existingSecret) .Values.secretKey.value -}}
{{- $needsSignKey := and (not .Values.artifactsSignKey.existingSecret) .Values.artifactsSignKey.value -}}
{{- $needsApp := and .Values.githubApp.enabled (and (not .Values.githubApp.existingSecret) .Values.githubApp.privateKey) -}}
{{- if or $needsWebhook $needsSecretKey $needsSignKey $needsApp -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "gocdnext.server.fullname" . }}-tokens
  labels: {{- include "gocdnext.labels" . | nindent 4 }}
type: Opaque
stringData:
{{- if $needsWebhook }}
  webhook-token: {{ .Values.webhookToken.value | quote }}
{{- end }}
{{- if $needsSecretKey }}
  secret-key: {{ .Values.secretKey.value | quote }}
{{- end }}
{{- if $needsSignKey }}
  artifacts-sign-key: {{ .Values.artifactsSignKey.value | quote }}
{{- end }}
{{- if $needsApp }}
  github-app-private-key: |-
{{ .Values.githubApp.privateKey | indent 4 }}
{{- end }}
{{- end -}}
