{{/*
Secret for server-only tokens. Created when any of the *.value is
set and the matching existingSecret is empty. Users who'd rather
manage the Secret themselves point existingSecret at their own
object and leave value blank — the deployment then picks up the
external Secret.
*/}}
{{- $needsWebhook := and (not .Values.webhookToken.existingSecret) .Values.webhookToken.value -}}
{{- $needsSecretKey := and (not .Values.secretKey.existingSecret) .Values.secretKey.value -}}
{{- $needsSignKey := and (not .Values.artifactsSignKey.existingSecret) .Values.artifactsSignKey.value -}}
{{- $needsApp := and .Values.githubApp.enabled (and (not .Values.githubApp.existingSecret) .Values.githubApp.privateKey) -}}
{{- $needsAuthGitHub := and (not .Values.auth.github.clientSecret.existingSecret) .Values.auth.github.clientSecret.value -}}
{{- $needsAuthGoogle := and (not .Values.auth.google.clientSecret.existingSecret) .Values.auth.google.clientSecret.value -}}
{{- $needsAuthKeycloak := and (not .Values.auth.keycloak.clientSecret.existingSecret) .Values.auth.keycloak.clientSecret.value -}}
{{- $needsAuthOIDC := and (not .Values.auth.oidc.clientSecret.existingSecret) .Values.auth.oidc.clientSecret.value -}}
{{- if or $needsWebhook $needsSecretKey $needsSignKey $needsApp $needsAuthGitHub $needsAuthGoogle $needsAuthKeycloak $needsAuthOIDC -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "gocdnext.server.fullname" . }}-tokens
  labels: {{- include "gocdnext.labels" . | nindent 4 }}
type: Opaque
stringData:
{{- if $needsWebhook }}
  webhook-token: {{ .Values.webhookToken.value | quote }}
{{- end }}
{{- if $needsSecretKey }}
  secret-key: {{ .Values.secretKey.value | quote }}
{{- end }}
{{- if $needsSignKey }}
  artifacts-sign-key: {{ .Values.artifactsSignKey.value | quote }}
{{- end }}
{{- if $needsApp }}
  github-app-private-key: |-
{{ .Values.githubApp.privateKey | indent 4 }}
{{- end }}
{{- if $needsAuthGitHub }}
  auth-github-client-secret: {{ .Values.auth.github.clientSecret.value | quote }}
{{- end }}
{{- if $needsAuthGoogle }}
  auth-google-client-secret: {{ .Values.auth.google.clientSecret.value | quote }}
{{- end }}
{{- if $needsAuthKeycloak }}
  auth-keycloak-client-secret: {{ .Values.auth.keycloak.clientSecret.value | quote }}
{{- end }}
{{- if $needsAuthOIDC }}
  auth-oidc-client-secret: {{ .Values.auth.oidc.clientSecret.value | quote }}
{{- end }}
{{- end -}}
