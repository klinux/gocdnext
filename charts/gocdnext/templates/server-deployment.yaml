{{- if .Values.server.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gocdnext.server.fullname" . }}
  labels:
    {{- include "gocdnext.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  replicas: {{ .Values.server.replicas }}
  selector:
    matchLabels: {{- include "gocdnext.server.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels: {{- include "gocdnext.server.selectorLabels" . | nindent 8 }}
    spec:
      {{- if eq .Values.secrets.backend "kubernetes" }}
      serviceAccountName: {{ include "gocdnext.server.fullname" . }}
      {{- end }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: server
          image: {{ include "gocdnext.image" (dict "root" . "imageRef" .Values.server.image) }}
          imagePullPolicy: {{ .Values.server.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8153
            - name: grpc
              containerPort: 8154
          env:
            - name: GOCDNEXT_HTTP_ADDR
              value: ":8153"
            - name: GOCDNEXT_GRPC_ADDR
              value: ":8154"
            - name: GOCDNEXT_LOG_LEVEL
              value: {{ .Values.global.logLevel | quote }}
            {{- include "gocdnext.database.envVar" . | nindent 12 }}
            - name: GOCDNEXT_PUBLIC_BASE
              value: {{ .Values.server.publicBase | quote }}
            - name: GOCDNEXT_WEBHOOK_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ default (printf "%s-tokens" (include "gocdnext.server.fullname" .)) .Values.webhookToken.existingSecret }}
                  key: {{ default "webhook-token" (ternary "WEBHOOK_TOKEN" "webhook-token" (ne .Values.webhookToken.existingSecret "")) }}
                  optional: true
            - name: GOCDNEXT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ default (printf "%s-tokens" (include "gocdnext.server.fullname" .)) .Values.secretKey.existingSecret }}
                  key: {{ default "secret-key" (ternary "SECRET_KEY" "secret-key" (ne .Values.secretKey.existingSecret "")) }}
                  optional: true
            - name: GOCDNEXT_SECRET_BACKEND
              value: {{ .Values.secrets.backend | quote }}
            {{- if eq .Values.secrets.backend "kubernetes" }}
            - name: GOCDNEXT_SECRET_K8S_NAMESPACE
              value: {{ default .Release.Namespace .Values.secrets.kubernetes.namespace | quote }}
            - name: GOCDNEXT_SECRET_K8S_NAME_TEMPLATE
              value: {{ .Values.secrets.kubernetes.nameTemplate | quote }}
            {{- end }}
            - name: GOCDNEXT_ARTIFACTS_BACKEND
              value: {{ .Values.artifacts.backend | quote }}
            - name: GOCDNEXT_ARTIFACTS_FS_ROOT
              value: {{ .Values.artifacts.filesystem.root | quote }}
            - name: GOCDNEXT_ARTIFACTS_PUBLIC_BASE
              value: {{ .Values.server.publicBase | quote }}
            - name: GOCDNEXT_ARTIFACTS_SIGN_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ default (printf "%s-tokens" (include "gocdnext.server.fullname" .)) .Values.artifactsSignKey.existingSecret }}
                  key: {{ default "artifacts-sign-key" (ternary "ARTIFACTS_SIGN_KEY" "artifacts-sign-key" (ne .Values.artifactsSignKey.existingSecret "")) }}
                  optional: true
            - name: GOCDNEXT_ARTIFACTS_KEEP_LAST
              value: {{ .Values.artifacts.keepLastPerPipeline | quote }}
            - name: GOCDNEXT_ARTIFACTS_PROJECT_QUOTA_BYTES
              value: {{ .Values.artifacts.projectQuotaBytes | quote }}
            - name: GOCDNEXT_ARTIFACTS_GLOBAL_QUOTA_BYTES
              value: {{ .Values.artifacts.globalQuotaBytes | quote }}
            - name: GOCDNEXT_ARTIFACTS_MAX_BODY_MB
              value: {{ .Values.artifacts.maxBodyMB | quote }}
            - name: GOCDNEXT_CACHE_TTL_DAYS
              value: {{ .Values.caches.ttlDays | quote }}
            - name: GOCDNEXT_CACHE_PROJECT_QUOTA_BYTES
              value: {{ .Values.caches.projectQuotaBytes | quote }}
            - name: GOCDNEXT_CACHE_GLOBAL_QUOTA_BYTES
              value: {{ .Values.caches.globalQuotaBytes | quote }}
            {{- if eq .Values.artifacts.backend "s3" }}
            - name: GOCDNEXT_ARTIFACTS_S3_BUCKET
              value: {{ .Values.artifacts.s3.bucket | quote }}
            - name: GOCDNEXT_ARTIFACTS_S3_REGION
              value: {{ .Values.artifacts.s3.region | quote }}
            - name: GOCDNEXT_ARTIFACTS_S3_ENDPOINT
              value: {{ .Values.artifacts.s3.endpoint | quote }}
            - name: GOCDNEXT_ARTIFACTS_S3_USE_PATH_STYLE
              value: {{ .Values.artifacts.s3.usePathStyle | quote }}
            - name: GOCDNEXT_ARTIFACTS_S3_ENSURE_BUCKET
              value: {{ .Values.artifacts.s3.ensureBucket | quote }}
            {{- if .Values.artifacts.s3.existingSecret }}
            - name: GOCDNEXT_ARTIFACTS_S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.artifacts.s3.existingSecret }}
                  key: AWS_ACCESS_KEY_ID
            - name: GOCDNEXT_ARTIFACTS_S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.artifacts.s3.existingSecret }}
                  key: AWS_SECRET_ACCESS_KEY
            {{- end }}
            {{- end }}
            {{- if eq .Values.artifacts.backend "gcs" }}
            - name: GOCDNEXT_ARTIFACTS_GCS_BUCKET
              value: {{ .Values.artifacts.gcs.bucket | quote }}
            - name: GOCDNEXT_ARTIFACTS_GCS_PROJECT_ID
              value: {{ .Values.artifacts.gcs.projectID | quote }}
            - name: GOCDNEXT_ARTIFACTS_GCS_ENSURE_BUCKET
              value: {{ .Values.artifacts.gcs.ensureBucket | quote }}
            {{- if .Values.artifacts.gcs.existingSecret }}
            - name: GOCDNEXT_ARTIFACTS_GCS_CREDENTIALS_FILE
              value: /var/run/secrets/gcs/service-account.json
            {{- end }}
            {{- end }}
            {{- if .Values.logs.retention }}
            - name: GOCDNEXT_LOG_RETENTION
              value: {{ .Values.logs.retention | quote }}
            {{- end }}
            - name: GOCDNEXT_LOG_MONTHS_AHEAD
              value: {{ .Values.logs.monthsAhead | quote }}
            - name: GOCDNEXT_LOG_ARCHIVE
              value: {{ .Values.logs.archive.policy | quote }}
            - name: GOCDNEXT_LOG_ARCHIVE_CACHE_BYTES
              value: {{ .Values.logs.archive.cacheBytes | quote }}
            {{- if .Values.webhookPublicURL }}
            - name: GOCDNEXT_WEBHOOK_PUBLIC_URL
              value: {{ .Values.webhookPublicURL | quote }}
            {{- end }}
            {{- if .Values.pluginCatalogDir }}
            - name: GOCDNEXT_PLUGIN_CATALOG_DIR
              value: {{ .Values.pluginCatalogDir | quote }}
            {{- else if .Values.extraPlugins }}
            - name: GOCDNEXT_PLUGIN_CATALOG_DIR
              value: "/etc/gocdnext/plugins:/etc/gocdnext/extra-plugins"
            {{- end }}
            - name: GOCDNEXT_AUTH_ENABLED
              value: {{ .Values.auth.enabled | quote }}
            {{- if .Values.auth.adminEmails }}
            - name: GOCDNEXT_AUTH_ADMIN_EMAILS
              value: {{ join "," .Values.auth.adminEmails | quote }}
            {{- end }}
            {{- if .Values.auth.allowedDomains }}
            - name: GOCDNEXT_AUTH_ALLOWED_DOMAINS
              value: {{ join "," .Values.auth.allowedDomains | quote }}
            {{- end }}
            {{- if .Values.auth.github.clientID }}
            - name: GOCDNEXT_AUTH_GITHUB_CLIENT_ID
              value: {{ .Values.auth.github.clientID | quote }}
            - name: GOCDNEXT_AUTH_GITHUB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ default (printf "%s-tokens" (include "gocdnext.server.fullname" .)) .Values.auth.github.clientSecret.existingSecret }}
                  key: {{ ternary "AUTH_GITHUB_CLIENT_SECRET" "auth-github-client-secret" (ne .Values.auth.github.clientSecret.existingSecret "") }}
                  optional: true
            {{- if .Values.auth.github.apiBase }}
            - name: GOCDNEXT_AUTH_GITHUB_API_BASE
              value: {{ .Values.auth.github.apiBase | quote }}
            {{- end }}
            {{- end }}
            {{- if .Values.auth.google.clientID }}
            - name: GOCDNEXT_AUTH_GOOGLE_CLIENT_ID
              value: {{ .Values.auth.google.clientID | quote }}
            - name: GOCDNEXT_AUTH_GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ default (printf "%s-tokens" (include "gocdnext.server.fullname" .)) .Values.auth.google.clientSecret.existingSecret }}
                  key: {{ ternary "AUTH_GOOGLE_CLIENT_SECRET" "auth-google-client-secret" (ne .Values.auth.google.clientSecret.existingSecret "") }}
                  optional: true
            {{- if .Values.auth.google.issuer }}
            - name: GOCDNEXT_AUTH_GOOGLE_ISSUER
              value: {{ .Values.auth.google.issuer | quote }}
            {{- end }}
            {{- end }}
            {{- if .Values.auth.keycloak.clientID }}
            - name: GOCDNEXT_AUTH_KEYCLOAK_CLIENT_ID
              value: {{ .Values.auth.keycloak.clientID | quote }}
            - name: GOCDNEXT_AUTH_KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ default (printf "%s-tokens" (include "gocdnext.server.fullname" .)) .Values.auth.keycloak.clientSecret.existingSecret }}
                  key: {{ ternary "AUTH_KEYCLOAK_CLIENT_SECRET" "auth-keycloak-client-secret" (ne .Values.auth.keycloak.clientSecret.existingSecret "") }}
                  optional: true
            {{- if .Values.auth.keycloak.issuer }}
            - name: GOCDNEXT_AUTH_KEYCLOAK_ISSUER
              value: {{ .Values.auth.keycloak.issuer | quote }}
            {{- end }}
            {{- end }}
            {{- if .Values.auth.oidc.clientID }}
            - name: GOCDNEXT_AUTH_OIDC_CLIENT_ID
              value: {{ .Values.auth.oidc.clientID | quote }}
            - name: GOCDNEXT_AUTH_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ default (printf "%s-tokens" (include "gocdnext.server.fullname" .)) .Values.auth.oidc.clientSecret.existingSecret }}
                  key: {{ ternary "AUTH_OIDC_CLIENT_SECRET" "auth-oidc-client-secret" (ne .Values.auth.oidc.clientSecret.existingSecret "") }}
                  optional: true
            {{- if .Values.auth.oidc.issuer }}
            - name: GOCDNEXT_AUTH_OIDC_ISSUER
              value: {{ .Values.auth.oidc.issuer | quote }}
            {{- end }}
            {{- if .Values.auth.oidc.name }}
            - name: GOCDNEXT_AUTH_OIDC_NAME
              value: {{ .Values.auth.oidc.name | quote }}
            {{- end }}
            {{- end }}
            {{- if .Values.runnerProfiles }}
            - name: GOCDNEXT_RUNNER_PROFILES_FILE
              value: /etc/gocdnext/runner-profiles.yaml
            {{- end }}
            {{- if .Values.githubApp.enabled }}
            - name: GOCDNEXT_GITHUB_APP_ID
              value: {{ .Values.githubApp.appID | quote }}
            - name: GOCDNEXT_GITHUB_APP_PRIVATE_KEY_FILE
              value: /var/run/secrets/gocdnext/github-app-private-key
            - name: GOCDNEXT_GITHUB_APP_API_BASE
              value: {{ .Values.githubApp.apiBase | quote }}
            {{- end }}
          volumeMounts:
            {{- if eq .Values.artifacts.backend "filesystem" }}
            - name: artifacts
              mountPath: {{ .Values.artifacts.filesystem.root }}
            {{- end }}
            {{- if .Values.githubApp.enabled }}
            - name: github-app-key
              mountPath: /var/run/secrets/gocdnext
              readOnly: true
            {{- end }}
            {{- if and (eq .Values.artifacts.backend "gcs") .Values.artifacts.gcs.existingSecret }}
            - name: gcs-creds
              mountPath: /var/run/secrets/gcs
              readOnly: true
            {{- end }}
            {{- if .Values.runnerProfiles }}
            - name: runner-profiles
              mountPath: /etc/gocdnext
              readOnly: true
            {{- end }}
            {{- if .Values.extraPlugins }}
            - name: extra-plugins
              mountPath: /etc/gocdnext/extra-plugins
              readOnly: true
            {{- end }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          resources: {{- toYaml .Values.server.resources | nindent 12 }}
      volumes:
        {{- if eq .Values.artifacts.backend "filesystem" }}
        - name: artifacts
          persistentVolumeClaim:
            claimName: {{ include "gocdnext.server.fullname" . }}-artifacts
        {{- end }}
        {{- if .Values.githubApp.enabled }}
        - name: github-app-key
          secret:
            secretName: {{ default (printf "%s-tokens" (include "gocdnext.server.fullname" .)) .Values.githubApp.existingSecret }}
            items:
              - key: {{ default "github-app-private-key" (ternary "private-key" "github-app-private-key" (ne .Values.githubApp.existingSecret "")) }}
                path: github-app-private-key
        {{- end }}
        {{- if and (eq .Values.artifacts.backend "gcs") .Values.artifacts.gcs.existingSecret }}
        - name: gcs-creds
          secret:
            secretName: {{ .Values.artifacts.gcs.existingSecret }}
        {{- end }}
        {{- if .Values.runnerProfiles }}
        - name: runner-profiles
          configMap:
            name: {{ include "gocdnext.server.fullname" . }}-runner-profiles
        {{- end }}
        {{- if .Values.extraPlugins }}
        # Each extraPlugin lands at /etc/gocdnext/extra-plugins/<name>/plugin.yaml
        # via the per-key `path:` projection — matches the layout the
        # catalog loader expects (<root>/<name>/plugin.yaml).
        - name: extra-plugins
          configMap:
            name: {{ include "gocdnext.server.fullname" . }}-extra-plugins
            items:
              {{- range $name, $_ := .Values.extraPlugins }}
              - key: {{ $name | quote }}
                path: {{ printf "%s/plugin.yaml" $name | quote }}
              {{- end }}
        {{- end }}
{{- end }}
