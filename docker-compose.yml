services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gocdnext
      POSTGRES_PASSWORD: gocdnext
      POSTGRES_DB: gocdnext
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gocdnext"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GOCDNEXT_DATABASE_URL: postgres://gocdnext:gocdnext@postgres:5432/gocdnext?sslmode=disable
      GOCDNEXT_HTTP_ADDR: ":8153"
      GOCDNEXT_GRPC_ADDR: ":8154"
      GOCDNEXT_LOG_LEVEL: debug
      GOCDNEXT_ARTIFACTS_BACKEND: filesystem
      GOCDNEXT_ARTIFACTS_FS_ROOT: /var/lib/gocdnext/artifacts
      GOCDNEXT_ARTIFACTS_PUBLIC_BASE: http://server:8153
    volumes:
      - artifacts:/var/lib/gocdnext/artifacts
    ports:
      - "8153:8153"
      - "8154:8154"

  agent:
    build:
      context: .
      dockerfile: agent/Dockerfile
    depends_on:
      - server
    environment:
      GOCDNEXT_SERVER_ADDR: server:8154
      GOCDNEXT_AGENT_TOKEN: dev-token
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  web:
    build:
      context: ./web
    depends_on:
      - server
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8153
    ports:
      - "3000:3000"

volumes:
  pgdata:
  artifacts:
