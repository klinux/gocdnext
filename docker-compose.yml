# Docker compose for local + CI bring-up.
#
# Every ${VAR:-default} below first looks at the .env file (compose
# auto-loads it from the same dir) then falls back to the default.
# Overriding in your shell works too — compose prefers shell > .env >
# default, same order as scripts/dev.sh.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gocdnext
      POSTGRES_PASSWORD: gocdnext
      POSTGRES_DB: gocdnext
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gocdnext"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Inside the compose network we override the host to `postgres`;
      # the .env default is for host-mode (make dev) which resolves
      # localhost. Keep the compose-internal URL explicit so either
      # path works without surgery on .env.
      GOCDNEXT_DATABASE_URL: postgres://gocdnext:gocdnext@postgres:5432/gocdnext?sslmode=disable
      GOCDNEXT_HTTP_ADDR: "${GOCDNEXT_HTTP_ADDR:-:8153}"
      GOCDNEXT_GRPC_ADDR: "${GOCDNEXT_GRPC_ADDR:-:8154}"
      GOCDNEXT_LOG_LEVEL: "${GOCDNEXT_LOG_LEVEL:-debug}"
      GOCDNEXT_PUBLIC_BASE: "${GOCDNEXT_PUBLIC_BASE:-http://server:8153}"
      # GOCDNEXT_WEBHOOK_TOKEN removed in UI.10.a — webhook
      # secrets are per-scm_source now (sealed via SECRET_KEY).
      GOCDNEXT_SECRET_KEY: "${GOCDNEXT_SECRET_KEY:-}"
      GOCDNEXT_ARTIFACTS_BACKEND: "${GOCDNEXT_ARTIFACTS_BACKEND:-filesystem}"
      GOCDNEXT_ARTIFACTS_FS_ROOT: /var/lib/gocdnext/artifacts
      GOCDNEXT_ARTIFACTS_PUBLIC_BASE: "${GOCDNEXT_ARTIFACTS_PUBLIC_BASE:-http://server:8153}"
      GOCDNEXT_ARTIFACTS_SIGN_KEY: "${GOCDNEXT_ARTIFACTS_SIGN_KEY:-}"
      GOCDNEXT_AUTH_ENABLED: "${GOCDNEXT_AUTH_ENABLED:-false}"
      GOCDNEXT_AUTH_ADMIN_EMAILS: "${GOCDNEXT_AUTH_ADMIN_EMAILS:-}"
      GOCDNEXT_AUTH_ALLOWED_DOMAINS: "${GOCDNEXT_AUTH_ALLOWED_DOMAINS:-}"
      GOCDNEXT_AUTH_GITHUB_CLIENT_ID: "${GOCDNEXT_AUTH_GITHUB_CLIENT_ID:-}"
      GOCDNEXT_AUTH_GITHUB_CLIENT_SECRET: "${GOCDNEXT_AUTH_GITHUB_CLIENT_SECRET:-}"
      GOCDNEXT_AUTH_GOOGLE_CLIENT_ID: "${GOCDNEXT_AUTH_GOOGLE_CLIENT_ID:-}"
      GOCDNEXT_AUTH_GOOGLE_CLIENT_SECRET: "${GOCDNEXT_AUTH_GOOGLE_CLIENT_SECRET:-}"
      GOCDNEXT_AUTH_KEYCLOAK_ISSUER: "${GOCDNEXT_AUTH_KEYCLOAK_ISSUER:-}"
      GOCDNEXT_AUTH_KEYCLOAK_CLIENT_ID: "${GOCDNEXT_AUTH_KEYCLOAK_CLIENT_ID:-}"
      GOCDNEXT_AUTH_KEYCLOAK_CLIENT_SECRET: "${GOCDNEXT_AUTH_KEYCLOAK_CLIENT_SECRET:-}"
      GOCDNEXT_AUTH_OIDC_ISSUER: "${GOCDNEXT_AUTH_OIDC_ISSUER:-}"
      GOCDNEXT_AUTH_OIDC_CLIENT_ID: "${GOCDNEXT_AUTH_OIDC_CLIENT_ID:-}"
      GOCDNEXT_AUTH_OIDC_CLIENT_SECRET: "${GOCDNEXT_AUTH_OIDC_CLIENT_SECRET:-}"
      GOCDNEXT_AUTH_OIDC_NAME: "${GOCDNEXT_AUTH_OIDC_NAME:-}"
    volumes:
      - artifacts:/var/lib/gocdnext/artifacts
    ports:
      - "8153:8153"
      - "8154:8154"

  agent:
    build:
      context: .
      dockerfile: agent/Dockerfile
    depends_on:
      - server
    environment:
      GOCDNEXT_SERVER_ADDR: server:8154
      GOCDNEXT_AGENT_NAME: "${GOCDNEXT_AGENT_NAME:-dev}"
      GOCDNEXT_AGENT_TOKEN: "${GOCDNEXT_AGENT_TOKEN:-dev-token}"
      GOCDNEXT_AGENT_TAGS: "${GOCDNEXT_AGENT_TAGS:-docker}"
      GOCDNEXT_AGENT_CAPACITY: "${GOCDNEXT_AGENT_CAPACITY:-2}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  web:
    build:
      context: ./web
    depends_on:
      - server
    environment:
      NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-http://localhost:8153}"
    ports:
      - "3000:3000"

volumes:
  pgdata:
  artifacts:
