# Primeiro downstream do build-core. Quando build-core.test passa, ESTE pipeline
# e deploy-worker.yaml são disparados em paralelo, ambos amarrados à MESMA
# revisão do material git original (consistência de fanout — diferencial do GoCD).
#
# VSM visual:
#   build-core.test ─┬─▶ deploy-api
#                    └─▶ deploy-worker
name: deploy-api

materials:
  - upstream:
      pipeline: build-core
      stage: test
      status: success

stages: [deploy]

jobs:
  deploy:
    stage: deploy
    image: plugins/kubectl
    # Pull the binary that build-core.build produced on the upstream run
    # that triggered this one. `from_pipeline` switches the lookup from
    # "same run" to "upstream that fanned out into me", keyed on the
    # pipeline name.
    needs_artifacts:
      - from_pipeline: build-core
        from_job: build
        paths: [bin/]
        dest: ./
    settings:
      cluster: prod
      manifest: k8s/api.yaml
    rules:
      - if: $CI_COMMIT_BRANCH == "main"
