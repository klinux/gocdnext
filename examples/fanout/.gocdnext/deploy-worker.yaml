# Segundo downstream do build-core — exemplifica fanout para múltiplos pipelines
# a partir do MESMO upstream. No VSM os dois aparecem lado a lado.
name: deploy-worker

materials:
  - upstream:
      pipeline: build-core
      stage: test
      status: success

stages: [deploy]

jobs:
  deploy:
    stage: deploy
    image: plugins/kubectl
    needs_artifacts:
      - from_pipeline: build-core
        from_job: build
        paths: [bin/]
        dest: ./
    settings:
      cluster: prod
      manifest: k8s/worker.yaml
    # Branch gating lives UPSTREAM: build-core only fires on main
    # (materials git branch: main), and this pipeline only fires
    # when build-core.test passes — the fanout inherits the gate.
    # (`rules:` was removed: the parser rejects unenforced keys.)
