# Matriz: 4 jobs (linux/darwin × amd64/arm64) gerados automaticamente.
name: cross-build

materials:
  - git:
      url: https://github.com/org/cross-platform-cli

stages: [test]

jobs:
  test:
    stage: test
    image: golang:1.23
    parallel:
      matrix:
        - OS: [linux, darwin]
          ARCH: [amd64, arm64]
    script:
      # NOTE: $OS/$ARCH as standalone env vars depend on matrix
      # decomposition (issue #42) — today the dispatch exposes the
      # combined GOCDNEXT_MATRIX="ARCH=...,OS=..." only. This
      # example is the target shape #42 makes real.
      - GOOS=$OS GOARCH=$ARCH go test ./...

# Status-conditioned notification — the IMPLEMENTED mechanism for
# "tell Slack how the run ended" (job-level `when.status` was an
# unenforced key and the parser now rejects it; see issue #40).
notifications:
  - on: always
    uses: ghcr.io/klinux/gocdnext-plugin-slack@v1
    with:
      channel: "#releases"
