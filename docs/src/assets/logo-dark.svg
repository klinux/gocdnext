       web/components/brand/logo.tsx. font-family lives inline so
       the SVG renders consistently on every browser/server. -->
  <text x="68" y="44"
    font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif"
    font-size="32" font-weight="700" letter-spacing="-1">
