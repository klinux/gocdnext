<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 64" fill="none" role="img" aria-label="gocdnext">
  <defs>
    <!-- Same teal gradients as web/components/brand/logo.tsx so the
         hex mark stays brand-consistent across portal + docs site. -->
    <linearGradient id="dl-pbTop"
      x1="23.796248" y1="62.783008" x2="85.930894" y2="124.91765"
