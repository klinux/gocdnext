openapi: 3.1.0
info:
  title: gocdnext API
  version: "0.2.0"
  summary: Public REST surface of the gocdnext control plane.
  description: |
    The gocdnext server exposes the operational surface as a REST API.
    The same handlers back the web UI Server Actions and any third-party
    integration — your CI scripts, dashboards, or bots can call the API
    directly with a session cookie or an account API token.

    ## Authentication

    Two ways to authenticate:

    - **Session cookie** — set by `POST /auth/login/local` or the OIDC
      callback. The browser keeps the cookie and the server enforces
      it on every protected route.
    - **Bearer token** — `Authorization: Bearer gcn_…` header. Tokens
      are minted via `POST /api/v1/account/api-tokens` (user-scoped) or
      `POST /api/v1/admin/service-accounts/{id}/tokens` (service
      accounts, admin only). The token's role determines what the
      caller can do.

    ## Roles

    Three roles, hierarchically:

    - `viewer` — read-only across projects/runs/dashboards.
    - `maintainer` — viewer + trigger/cancel/rerun/approve/reject runs,
      apply project YAML, manage own API tokens.
    - `admin` — full surface, including `/api/v1/admin/*`.

    Endpoints below indicate the minimum role they require.
  contact:
    name: gocdnext
    url: https://gocdnext.io
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0

servers:
  - url: http://localhost:8153
    description: Local dev (default HTTP listener)
  - url: https://gocdnext.example.com
    description: Production (replace with your install)

tags:
  - name: health
    description: Liveness/readiness/version probes — unauthenticated.
  - name: auth
    description: Login, logout, identity providers, current user.
  - name: account
    description: Per-user preferences and API tokens.
  - name: projects
    description: Project + pipeline definitions, secrets, caches.
  - name: runs
    description: Runs, jobs, logs, artifacts, lifecycle actions.
  - name: pipelines
    description: Pipeline metadata, manual triggers.
  - name: dashboard
    description: Aggregate metrics, recent runs, agents.
  - name: analytics
    description: Cross-project rollups (DORA) grouped by project label.
  - name: plugins
    description: Plugin catalog (read-only).
  - name: webhooks
    description: Inbound webhooks from GitHub/GitLab/Bitbucket.
  - name: observability
    description: Prometheus metrics endpoint.
  - name: admin
    description: Admin-only endpoints (user / role / system management).

security:
  - bearerAuth: []
  - cookieAuth: []

paths:
  # -------------------- health --------------------
  /healthz:
    get:
      tags: [health]
      summary: Liveness probe.
      description: Always 200. Used by Kubernetes livenessProbe.
      security: []
      responses:
        "200":
          description: alive
          content:
            text/plain:
              schema: { type: string, example: ok }

  /readyz:
    get:
      tags: [health]
      summary: Readiness probe.
      description: |
        Returns 200 once the server can talk to its Postgres pool.
        Returns 503 with the underlying error otherwise. Wire to the
        Kubernetes readinessProbe so traffic doesn't hit a starting
        replica.
      security: []
      responses:
        "200":
          description: ready
          content:
            text/plain: { schema: { type: string, example: ready } }
        "503":
          description: dependency unavailable
          content:
            text/plain: { schema: { type: string, example: "db unavailable: …" } }

  /version:
    get:
      tags: [health]
      summary: Build metadata.
      security: []
      responses:
        "200":
          description: build info
          content:
            application/json:
              schema:
                type: object
                required: [version, commit, build_date]
                properties:
                  version: { type: string, example: "0.2.0" }
                  commit: { type: string, example: "bc9fbc8" }
                  build_date: { type: string, format: date-time }

  /metrics:
    get:
      tags: [observability]
      summary: Prometheus metrics.
      description: |
        OpenMetrics/Prometheus exposition. Scrape with the chart's
        `serviceMonitor.enabled=true` or any standard Prometheus
        scrape config. See `/install/observability` in the docs for
        the full series catalog.
      security: []
      responses:
        "200":
          description: metrics
          content:
            text/plain:
              schema: { type: string }

  # -------------------- auth --------------------
  /auth/providers:
    get:
      tags: [auth]
      summary: List enabled identity providers.
      security: []
      responses:
        "200":
          description: providers
          content:
            application/json:
              schema:
                type: object
                properties:
                  providers:
                    type: array
                    items:
                      type: object
                      required: [name, display]
                      properties:
                        name: { type: string, example: "google" }
                        display: { type: string, example: "Google" }

  /auth/login/local:
    post:
      tags: [auth]
      summary: Username + password login.
      description: |
        Sets a session cookie on success. Local accounts must be
        enabled in the platform's configuration.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username: { type: string }
                password: { type: string, format: password }
      responses:
        "200":
          description: logged in (cookie set)
          headers:
            Set-Cookie:
              schema: { type: string, example: "gcn_session=…; HttpOnly; Path=/" }
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/login/{provider}:
    get:
      tags: [auth]
      summary: Begin OIDC/OAuth flow.
      security: []
      parameters:
        - in: path
          name: provider
          required: true
          schema: { type: string }
      responses:
        "302":
          description: redirect to provider's authorize URL

  /auth/callback/{provider}:
    get:
      tags: [auth]
      summary: OIDC/OAuth callback.
      security: []
      parameters:
        - in: path
          name: provider
          required: true
          schema: { type: string }
      responses:
        "302":
          description: cookie set, redirect to UI

  /auth/logout:
    post:
      tags: [auth]
      summary: Clear the session cookie.
      responses:
        "204":
          description: logged out

  /api/v1/me:
    get:
      tags: [auth]
      summary: Current authenticated user.
      responses:
        "200":
          description: identity
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/me/password:
    post:
      tags: [auth]
      summary: Change own password.
      description: Local-account users only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [current_password, new_password]
              properties:
                current_password: { type: string, format: password }
                new_password: { type: string, format: password, minLength: 12 }
      responses:
        "204": { description: updated }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  # -------------------- account --------------------
  /api/v1/account/preferences:
    get:
      tags: [account]
      summary: Get preferences for current user.
      responses:
        "200":
          description: preferences
          content:
            application/json:
              schema:
                type: object
                properties:
                  preferences: { type: object, additionalProperties: true }
                  updated_at: { type: string, format: date-time, nullable: true }
    put:
      tags: [account]
      summary: Replace preferences for current user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [preferences]
              properties:
                preferences: { type: object, additionalProperties: true }
      responses:
        "204": { description: stored }

  /api/v1/account/api-tokens:
    get:
      tags: [account]
      summary: List own API tokens.
      responses:
        "200":
          description: tokens
          content:
            application/json:
              schema:
                type: object
                properties:
                  tokens:
                    type: array
                    items: { $ref: "#/components/schemas/APIToken" }
    post:
      tags: [account]
      summary: Mint a new API token.
      description: |
        The plaintext token is returned **once** in the `secret` field.
        The server only stores its hash. If the user loses it, revoke
        and mint again.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string, example: "ci-runner" }
                expires_at: { type: string, format: date-time, nullable: true }
      responses:
        "201":
          description: token minted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIToken"
                  - type: object
                    required: [secret]
                    properties:
                      secret: { type: string, example: "gcn_…" }

  /api/v1/account/api-tokens/{id}:
    delete:
      tags: [account]
      summary: Revoke an own token.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204": { description: revoked }
        "404": { $ref: "#/components/responses/NotFound" }

  # -------------------- projects --------------------
  /api/v1/projects:
    get:
      tags: [projects]
      summary: List projects.
      responses:
        "200":
          description: projects
          content:
            application/json:
              schema:
                type: object
                properties:
                  projects:
                    type: array
                    items: { $ref: "#/components/schemas/Project" }

  /api/v1/projects/{slug}:
    get:
      tags: [projects]
      summary: Project detail (incl. pipelines).
      parameters:
        - $ref: "#/components/parameters/ProjectSlug"
      responses:
        "200":
          description: project
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProjectDetail" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [projects]
      summary: Delete project (maintainer+).
      parameters:
        - $ref: "#/components/parameters/ProjectSlug"
      responses:
        "204": { description: deleted }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/v1/projects/{slug}/vsm:
    get:
      tags: [projects]
      summary: Value-stream map for the project.
      parameters:
        - $ref: "#/components/parameters/ProjectSlug"
      responses:
        "200":
          description: vsm
          content:
            application/json:
              schema:
                type: object
                properties:
                  nodes: { type: array, items: { type: object } }
                  edges: { type: array, items: { type: object } }

  /api/v1/projects/apply:
    post:
      tags: [projects]
      summary: Apply project + pipeline YAML (idempotent).
      description: |
        Takes a `.gocdnext/` bundle (or equivalent JSON) and creates or
        updates the corresponding project, pipelines, secrets refs.
        Idempotent — re-applying the same payload is a no-op.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [yaml]
              properties:
                yaml: { type: string, example: "kind: Project\n…" }
      responses:
        "200":
          description: applied
          content:
            application/json:
              schema:
                type: object
                properties:
                  project_slug: { type: string }
                  pipelines_applied: { type: integer }

  /api/v1/projects/{slug}/sync:
    post:
      tags: [projects]
      summary: Force re-sync of the project material.
      parameters:
        - $ref: "#/components/parameters/ProjectSlug"
      responses:
        "202": { description: scheduled }

  /api/v1/projects/{slug}/run-all:
    post:
      tags: [projects]
      summary: Trigger a run on every pipeline in the project.
      parameters:
        - $ref: "#/components/parameters/ProjectSlug"
      responses:
        "202":
          description: queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  run_ids: { type: array, items: { type: string, format: uuid } }

  /api/v1/projects/{slug}/labels:
    get:
      tags: [projects]
      summary: List a project's key:value grouping labels.
      parameters:
        - $ref: "#/components/parameters/ProjectSlug"
      responses:
        "200":
          description: labels
          content:
            application/json:
              schema:
                type: object
                properties:
                  labels:
                    type: array
                    items: { $ref: "#/components/schemas/ProjectLabel" }
    put:
      tags: [projects]
      summary: Replace a project's full label set.
      parameters:
        - $ref: "#/components/parameters/ProjectSlug"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                labels:
                  type: array
                  items: { $ref: "#/components/schemas/ProjectLabel" }
      responses:
        "204": { description: replaced }
        "400": { description: invalid labels (key required, no ':', bounds) }
        "404": { description: project not found }

  # -------------------- analytics --------------------
  /api/v1/analytics/label-keys:
    get:
      tags: [analytics]
      summary: Distinct project label keys available as a group-by dimension.
      responses:
        "200":
          description: keys
          content:
            application/json:
              schema:
                type: object
                properties:
                  keys: { type: array, items: { type: string } }
  /api/v1/analytics/environments:
    get:
      tags: [analytics]
      summary: Deploy environments available as the analytics environment filter.
      parameters:
        - in: query
          name: key
          required: true
          schema: { type: string }
          description: Project label key to scope the environment list.
      responses:
        "200":
          description: environments
          content:
            application/json:
              schema:
                type: object
                properties:
                  environments: { type: array, items: { type: string } }
        "400": { description: missing/invalid key }
  /api/v1/analytics/dora:
    get:
      tags: [analytics]
      summary: DORA metrics per label-value group over a trailing window.
      parameters:
        - in: query
          name: key
          required: true
          schema: { type: string }
          description: Project label key to group by (e.g. team).
        - in: query
          name: window_days
          schema: { type: integer, minimum: 1, maximum: 365, default: 30 }
        - in: query
          name: environment
          schema: { type: string }
          description: Filter to a single deploy environment by name; omit for all.
      responses:
        "200":
          description: rollup
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DoraRollup" }
        "400": { description: missing/invalid key or window_days }
  /api/v1/analytics/dora/overview:
    get:
      tags: [analytics]
      summary: Org DORA overview — rollup (current + prior window), daily series, leaderboard.
      description: >
        Single read behind the Analytics page: org-wide metrics for the current
        window and the immediately preceding window of equal length (for deltas),
        a per-day series for sparklines, and the per-team leaderboard.
      parameters:
        - in: query
          name: key
          required: true
          schema: { type: string }
          description: Project label key to group by (e.g. team).
        - in: query
          name: window_days
          schema: { type: integer, minimum: 1, maximum: 365, default: 30 }
        - in: query
          name: environment
          schema: { type: string }
          description: Filter to a single deploy environment by name; omit for all.
      responses:
        "200":
          description: overview
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DoraOverview" }
        "400": { description: missing/invalid key or window_days }
  /api/v1/analytics/reliability:
    get:
      tags: [analytics]
      summary: Run-based throughput per group + reliability hotspots over a window.
      description: >
        Throughput and reliability rolled up from run history (not deploys), so
        there is no environment filter. Per label-value group: run volume,
        runs/day, success rate, queue-wait and duration medians. Plus the
        worst-failing pipelines among labelled projects (min 5 runs, worst first).
      parameters:
        - in: query
          name: key
          required: true
          schema: { type: string }
          description: Project label key to group by (e.g. team).
        - in: query
          name: window_days
          schema: { type: integer, minimum: 1, maximum: 365, default: 30 }
      responses:
        "200":
          description: reliability report
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReliabilityReport" }
        "400": { description: missing/invalid key or window_days }
  /api/v1/analytics/compliance:
    get:
      tags: [analytics]
      summary: Framework adoption per group (compliance posture).
      description: >
        Current-state compliance posture grouped by a project label: per
        label-value group, the total projects and how many are bound to each
        framework. No window or environment (not time-series).
      parameters:
        - in: query
          name: key
          required: true
          schema: { type: string }
          description: Project label key to group by (e.g. team).
      responses:
        "200":
          description: compliance coverage report
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ComplianceCoverageReport" }
        "400": { description: missing/invalid key }

  # -------------------- runs --------------------
  /api/v1/runs:
    get:
      tags: [runs]
      summary: Recent runs across all projects.
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [queued, running, success, failed, canceled]
        - in: query
          name: project
          schema: { type: string }
        - in: query
          name: pipeline
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
        - in: query
          name: offset
          schema: { type: integer, minimum: 0, default: 0 }
      responses:
        "200":
          description: runs
          content:
            application/json:
              schema:
                type: object
                required: [runs, total, limit, offset]
                properties:
                  runs:
                    type: array
                    items: { $ref: "#/components/schemas/RunSummary" }
                  total: { type: integer }
                  limit: { type: integer }
                  offset: { type: integer }

  /api/v1/runs/{id}:
    get:
      tags: [runs]
      summary: Run detail (stages + jobs).
      parameters:
        - $ref: "#/components/parameters/RunID"
      responses:
        "200":
          description: run
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RunDetail" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/runs/{id}/logs/stream:
    get:
      tags: [runs]
      summary: Stream logs (SSE).
      description: |
        Server-Sent Events. Each event is one log line as JSON:
        `{"job_run_id":"…","seq":42,"stream":"stdout","at":"2026-04-28T…","text":"…"}`.
        Stream stays open while the run is non-terminal; closes
        cleanly once the run finishes and the tail flushes.
      parameters:
        - $ref: "#/components/parameters/RunID"
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream:
              schema: { type: string }

  /api/v1/runs/{id}/artifacts:
    get:
      tags: [runs]
      summary: List artifacts produced by a run.
      parameters:
        - $ref: "#/components/parameters/RunID"
        - in: query
          name: download
          schema: { type: boolean, default: false }
          description: |
            When true, the response includes pre-signed download URLs
            (short-lived). Off by default to keep cold reads cheap.
      responses:
        "200":
          description: artifacts
          content:
            application/json:
              schema:
                type: object
                properties:
                  artifacts:
                    type: array
                    items: { $ref: "#/components/schemas/Artifact" }

  /api/v1/runs/{id}/cancel:
    post:
      tags: [runs]
      summary: Cancel a running run (maintainer+).
      parameters:
        - $ref: "#/components/parameters/RunID"
      responses:
        "202": { description: cancellation requested }

  /api/v1/runs/{id}/rerun:
    post:
      tags: [runs]
      summary: Rerun an entire run (maintainer+).
      parameters:
        - $ref: "#/components/parameters/RunID"
      responses:
        "201":
          description: new run created
          content:
            application/json:
              schema:
                type: object
                properties:
                  run_id: { type: string, format: uuid }

  /api/v1/job_runs/{id}/rerun:
    post:
      tags: [runs]
      summary: Rerun a single job (maintainer+).
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "201":
          description: job re-queued

  /api/v1/job_runs/{id}/approve:
    post:
      tags: [runs]
      summary: Approve a manual gate (maintainer+).
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: approved }

  /api/v1/job_runs/{id}/reject:
    post:
      tags: [runs]
      summary: Reject a manual gate (maintainer+).
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: rejected }

  /api/v1/pipelines/{id}/trigger:
    post:
      tags: [pipelines]
      summary: Manually trigger a pipeline (maintainer+).
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                git_ref:
                  type: string
                  description: Branch/tag/commit. Defaults to the project's HEAD.
                parameters:
                  type: object
                  additionalProperties: { type: string }
                  description: Run parameters (merged into the pipeline's `parameters:` block).
      responses:
        "201":
          description: run queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  run_id: { type: string, format: uuid }

  /api/v1/pipelines/{id}/yaml:
    get:
      tags: [pipelines]
      summary: Get the pipeline's source YAML (maintainer+).
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: yaml
          content:
            application/json:
              schema:
                type: object
                properties:
                  yaml: { type: string }
                  reconstructed: { type: boolean, description: "True when the YAML was rebuilt from DB state (source not cached)." }

  # -------------------- dashboard --------------------
  /api/v1/dashboard/metrics:
    get:
      tags: [dashboard]
      summary: Aggregate dashboard tile metrics.
      responses:
        "200":
          description: metrics
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DashboardMetrics" }

  /api/v1/agents:
    get:
      tags: [dashboard]
      summary: List registered agents.
      responses:
        "200":
          description: agents
          content:
            application/json:
              schema:
                type: object
                properties:
                  agents:
                    type: array
                    items: { $ref: "#/components/schemas/Agent" }

  /api/v1/agents/{id}:
    get:
      tags: [dashboard]
      summary: Agent detail + recent jobs.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: agent
          content:
            application/json:
              schema:
                type: object
                properties:
                  agent: { $ref: "#/components/schemas/Agent" }
                  jobs:
                    type: array
                    items: { $ref: "#/components/schemas/AgentJobSummary" }

  # -------------------- plugins --------------------
  /api/v1/plugins:
    get:
      tags: [plugins]
      summary: Available plugin catalog.
      responses:
        "200":
          description: catalog
          content:
            application/json:
              schema:
                type: object
                properties:
                  plugins:
                    type: array
                    items: { $ref: "#/components/schemas/Plugin" }

  # -------------------- admin (user mgmt) --------------------
  /api/v1/admin/users:
    post:
      tags: [admin]
      summary: Provision a local-auth user (admin only).
      description: |
        Strict create — fails with 409 if the email already belongs
        to a local account. Mirrors the CLI
        `gocdnext admin create-user`. OIDC users are auto-provisioned
        on first login; this endpoint exists for password-backed
        accounts.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                name: { type: string, default: "" }
                role:
                  type: string
                  enum: [admin, maintainer, viewer]
                  default: maintainer
                password:
                  type: string
                  format: password
                  minLength: 8
      responses:
        "201":
          description: created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: email already exists
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/admin/users/{id}/role:
    put:
      tags: [admin]
      summary: Change a user's role (admin only).
      description: |
        Self-demotion is refused (the server returns 403) so the last
        admin can't lock the cluster out by accident. Promote another
        user to `admin` first if you need to step down.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  type: string
                  enum: [admin, maintainer, viewer]
      responses:
        "200":
          description: updated user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          description: cannot demote yourself
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          $ref: "#/components/responses/NotFound"

  # -------------------- admin (runner profiles) --------------------
  /api/v1/admin/runner-profiles:
    get:
      tags: [admin]
      summary: List runner profiles (admin only).
      description: |
        Returns every profile with its plain `env` and the names of
        configured secrets — values stay encrypted at rest and are
        never echoed through this endpoint. Pipelines reference
        profiles by `name` in YAML (`agent.profile: fast-builds`).
      responses:
        "200":
          description: profiles
          content:
            application/json:
              schema:
                type: object
                properties:
                  profiles:
                    type: array
                    items: { $ref: "#/components/schemas/RunnerProfile" }
    post:
      tags: [admin]
      summary: Create a runner profile (admin only).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RunnerProfileWrite" }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RunnerProfile" }
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: name already exists
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "503":
          description: cipher not configured (cannot accept secrets)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/admin/runner-profiles/{id}:
    put:
      tags: [admin]
      summary: Update a runner profile (admin only).
      description: |
        Full replace. `env` and `secrets` use full-replace semantics —
        keys missing from the new payload are deleted. The web UI
        guards this on the secrets axis by surfacing a confirmation
        when a save would silently drop a stored secret value.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RunnerProfileWrite" }
      responses:
        "204":
          description: updated
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: name already exists
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    delete:
      tags: [admin]
      summary: Delete a runner profile (admin only).
      description: |
        Refuses to delete a profile that any pipeline definition
        still references; the resolver would 422 every apply
        afterwards. Rewire the pipelines first.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204":
          description: deleted
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: profile is still in use
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  # -------------------- admin (artifact storage) --------------------
  /api/v1/admin/storage:
    get:
      tags: [admin]
      summary: Read the active artifact storage configuration (admin only).
      description: |
        Returns the DB override row when present (`source: db`) or
        an env-derived snapshot (`source: env`) so the UI can
        prepopulate the form with what the boot path is actually
        using. Credential VALUES never round-trip — only
        `credential_keys` (sorted names) so the UI can render
        "•••• stored" badges.
      responses:
        "200":
          description: storage configuration
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StorageConfig" }
    put:
      tags: [admin]
      summary: Set / replace the artifact storage configuration (admin only).
      description: |
        Per-backend validation: `s3` and `gcs` require `value.bucket`;
        `filesystem` accepts an empty value (the FS root comes from
        env, since changing it at runtime would orphan existing
        artifacts). Credentials are PLAINTEXT on the wire and
        AEAD-sealed before persisting. The server reads this
        override only at boot today — the response carries an
        `X-Gocdnext-Restart-Required: true` header to surface this
        in the UI banner.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StorageConfigWrite" }
      responses:
        "200":
          description: configuration saved
          headers:
            X-Gocdnext-Restart-Required:
              schema: { type: string, enum: ["true"] }
              description: |
                Set when the change requires a server restart to take
                effect (always "true" today; hot-reload is on the
                roadmap).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StorageConfig" }
        "400":
          $ref: "#/components/responses/BadRequest"
        "503":
          description: cipher not configured (cannot accept credentials)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    delete:
      tags: [admin]
      summary: Drop the storage override (admin only).
      description: |
        Clears the DB override; the next boot falls back to the
        env-derived configuration. Idempotent — deleting a missing
        override is a no-op. Same restart-required semantics as PUT.
      responses:
        "204":
          description: override cleared
          headers:
            X-Gocdnext-Restart-Required:
              schema: { type: string, enum: ["true"] }

  # -------------------- admin (compliance) --------------------
  /api/v1/admin/compliance/frameworks:
    get:
      tags: [admin]
      summary: List compliance frameworks (admin only).
      description: |
        Frameworks are admin-defined labels (`PCI`, `SOC2`, …) assigned to
        projects and targeted by policies. See the
        [compliance concept](https://klinux.github.io/gocdnext/docs/concepts/compliance/).
      responses:
        "200":
          description: frameworks
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ComplianceFramework" }
    post:
      tags: [admin]
      summary: Create a compliance framework (admin only).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ComplianceFrameworkWrite" }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ComplianceFramework" }
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/admin/compliance/frameworks/{id}:
    put:
      tags: [admin]
      summary: Rename / update a compliance framework (admin only).
      description: |
        A rename doesn't touch any effective definition (policies match
        frameworks by id), so no recompute is triggered.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ComplianceFrameworkWrite" }
      responses:
        "204":
          description: updated
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [admin]
      summary: Delete a compliance framework (admin only).
      description: |
        Blocked (409) while the framework is still assigned to a project or
        targeted by a policy — unassign / retarget first.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204":
          description: deleted
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: framework still in use
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string, example: "framework in use" }
                  projects: { type: integer, example: 3 }
                  policies: { type: integer, example: 1 }

  /api/v1/admin/compliance/policies:
    get:
      tags: [admin]
      summary: List compliance policies (admin only).
      description: |
        Metadata only — `framework_ids` and `config_yaml` come back empty
        here; fetch a single policy to get its full body.
      responses:
        "200":
          description: policies
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CompliancePolicy" }
    post:
      tags: [admin]
      summary: Create a compliance policy (admin only).
      description: |
        `config_yaml` is authored in the normal pipeline schema; every
        stage / job it declares must carry the reserved `_compliance_`
        prefix (rejected otherwise). Creating an enabled policy that would
        govern a project with no SCM source is refused (409).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CompliancePolicyWrite" }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CompliancePolicy" }
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: would govern a project that can't be enforced
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/admin/compliance/policies/{id}:
    get:
      tags: [admin]
      summary: Get a compliance policy with its full body (admin only).
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: policy
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CompliancePolicy" }
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [admin]
      summary: Update a compliance policy (admin only).
      description: |
        Full replace. Recomputes the effective definition of every project
        in the union of the old and new targeting.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CompliancePolicyWrite" }
      responses:
        "204":
          description: updated
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: would govern a project that can't be enforced
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    delete:
      tags: [admin]
      summary: Delete a compliance policy (admin only).
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204":
          description: deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/admin/projects/{slug}/frameworks:
    get:
      tags: [admin]
      summary: List the frameworks assigned to a project (admin only).
      parameters:
        - $ref: "#/components/parameters/ProjectSlug"
      responses:
        "200":
          description: assigned frameworks
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ComplianceFramework" }
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [admin]
      summary: Replace a project's framework assignment (admin only).
      description: |
        Full replace. Recomputes the project's effective pipelines in the
        same transaction. Refused (409) if it would govern a project with
        no registered SCM source (enforcement is push-triggered).
      parameters:
        - $ref: "#/components/parameters/ProjectSlug"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProjectFrameworksWrite" }
      responses:
        "204":
          description: assignment saved
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: would drop compliance enforcement (no SCM source)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/admin/projects/{slug}/effective-pipeline:
    get:
      tags: [admin]
      summary: Preview a project's effective (post-policy) pipelines (admin only).
      description: |
        Read-only. For each pipeline of the project returns its pre-policy
        (`raw`) and post-merge (`effective`) definition. Without
        `frameworks` it reads the stored effective definition (what runs
        today). With `frameworks` it recomputes a what-if for that
        hypothetical framework set — nothing is persisted; refused (409) if
        that governance couldn't be enforced (no SCM source), mirroring a
        real save.
      parameters:
        - $ref: "#/components/parameters/ProjectSlug"
        - in: query
          name: frameworks
          required: false
          schema: { type: string }
          description: |
            Comma-separated framework UUIDs for a what-if recompute. Absent
            = stored preview; present-but-empty = "no frameworks".
      responses:
        "200":
          description: per-pipeline raw + effective definitions
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/EffectivePipelinePreview" }
        "400":
          description: malformed framework id
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: would drop compliance enforcement (no SCM source)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  # -------------------- webhooks --------------------
  /api/webhooks/github:
    post:
      tags: [webhooks]
      summary: GitHub webhook receiver.
      security: []
      description: |
        Verifies the `X-Hub-Signature-256` HMAC against the project's
        webhook secret before acting. Supports `push`, `pull_request`,
        `release` events.
      parameters:
        - in: header
          name: X-Hub-Signature-256
          required: true
          schema: { type: string }
        - in: header
          name: X-GitHub-Event
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, additionalProperties: true }
      responses:
        "204": { description: accepted }
        "401":
          description: signature mismatch
        "404":
          description: no matching project

  /api/webhooks/gitlab:
    post:
      tags: [webhooks]
      summary: GitLab webhook receiver.
      security: []
      parameters:
        - in: header
          name: X-Gitlab-Token
          required: true
          schema: { type: string }
        - in: header
          name: X-Gitlab-Event
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, additionalProperties: true }
      responses:
        "204": { description: accepted }
        "401": { description: token mismatch }
        "404": { description: no matching project }

  /api/webhooks/bitbucket:
    post:
      tags: [webhooks]
      summary: Bitbucket webhook receiver.
      security: []
      parameters:
        - in: header
          name: X-Hub-Signature
          required: true
          schema: { type: string }
        - in: header
          name: X-Event-Key
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, additionalProperties: true }
      responses:
        "204": { description: accepted }
        "401": { description: signature mismatch }
        "404": { description: no matching project }

components:
  parameters:
    ProjectSlug:
      in: path
      name: slug
      required: true
      schema: { type: string, pattern: "^[a-z0-9-]+$" }
      description: Project slug (kebab-case).
    RunID:
      in: path
      name: id
      required: true
      schema: { type: string, format: uuid }

  responses:
    BadRequest:
      description: validation error
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Unauthorized:
      description: missing or invalid credentials
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Forbidden:
      description: caller's role doesn't permit the action
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: resource not found
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: gcn_<base62>
      description: |
        Account or service-account API token. Mint via
        `POST /api/v1/account/api-tokens` (or admin equivalent for
        service accounts).
    cookieAuth:
      type: apiKey
      in: cookie
      name: gcn_session
      description: Session cookie set by `/auth/login/local` or OIDC callback.

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error: { type: string, example: "validation: pipeline name required" }
        code:
          type: string
          description: Stable machine-readable code (when present).
          example: "pipeline.invalid"

    User:
      type: object
      required: [id, email, role]
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        name: { type: string }
        role:
          type: string
          enum: [admin, maintainer, viewer]
        provider: { type: string, example: "local" }

    APIToken:
      type: object
      required: [id, name, created_at]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        created_at: { type: string, format: date-time }
        last_used_at: { type: string, format: date-time, nullable: true }
        expires_at: { type: string, format: date-time, nullable: true }
        revoked_at: { type: string, format: date-time, nullable: true }

    Project:
      type: object
      required: [id, slug, name, created_at]
      properties:
        id: { type: string, format: uuid }
        slug: { type: string }
        name: { type: string }
        description: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        log_archive_enabled: { type: boolean, nullable: true, description: "null = inherit global" }
        labels:
          type: array
          description: Free-form key:value grouping tags.
          items: { $ref: "#/components/schemas/ProjectLabel" }

    ProjectLabel:
      type: object
      required: [key, value]
      properties:
        key: { type: string, description: "non-empty, no ':'" }
        value: { type: string, description: "may be empty (flat tag)" }

    DoraGroup:
      type: object
      required: [group, deploys_success, deploys_total, deploys_failed, deploy_freq_per_day, lead_time_p50_seconds, change_failure_rate, mttr_p50_seconds]
      properties:
        group: { type: string, description: "the label value, e.g. payments" }
        deploys_success: { type: integer, format: int64 }
        deploys_total: { type: integer, format: int64 }
        deploys_failed: { type: integer, format: int64, description: "status=failed OR is_rollback" }
        deploy_freq_per_day: { type: number, format: double }
        lead_time_p50_seconds: { type: number, format: double, description: "p50 deploy.finished_at − run.started_at (excludes queue wait)" }
        change_failure_rate: { type: number, format: double, description: "deploys_failed / deploys_total" }
        mttr_p50_seconds: { type: number, format: double, description: "p50 failed → next success in the same environment" }

    DoraRollup:
      type: object
      required: [key, window_days, groups]
      properties:
        key: { type: string }
        window_days: { type: integer }
        environment: { type: string, description: "active environment filter; empty = all" }
        groups:
          type: array
          items: { $ref: "#/components/schemas/DoraGroup" }

    OrgMetrics:
      type: object
      description: Org-wide DORA rollup over one window (no group label).
      required: [deploys_success, deploys_total, deploys_failed, deploy_freq_per_day, lead_time_p50_seconds, change_failure_rate, mttr_p50_seconds]
      properties:
        deploys_success: { type: integer, format: int64 }
        deploys_total: { type: integer, format: int64 }
        deploys_failed: { type: integer, format: int64 }
        deploy_freq_per_day: { type: number, format: double }
        lead_time_p50_seconds: { type: number, format: double }
        change_failure_rate: { type: number, format: double }
        mttr_p50_seconds: { type: number, format: double }

    DoraDay:
      type: object
      description: One daily bucket of the window, zero-filled (hero sparklines).
      required: [day, deploys_success, deploys_total, deploys_failed, lead_time_p50_seconds]
      properties:
        day: { type: string, format: date }
        deploys_success: { type: integer, format: int64 }
        deploys_total: { type: integer, format: int64 }
        deploys_failed: { type: integer, format: int64 }
        lead_time_p50_seconds: { type: number, format: double }

    DoraOverview:
      type: object
      required: [key, window_days, current, prior, daily, teams, teams_prior]
      properties:
        key: { type: string }
        window_days: { type: integer }
        environment: { type: string, description: "active environment filter; empty = all" }
        current: { $ref: "#/components/schemas/OrgMetrics" }
        prior: { $ref: "#/components/schemas/OrgMetrics" }
        daily:
          type: array
          items: { $ref: "#/components/schemas/DoraDay" }
        teams:
          type: array
          items: { $ref: "#/components/schemas/DoraGroup" }
        teams_prior:
          type: array
          description: per-group rollup over the prior window (movers compare vs this)
          items: { $ref: "#/components/schemas/DoraGroup" }
        bottleneck: { $ref: "#/components/schemas/LeadTimeBottleneck" }

    LeadTimeBottleneck:
      type: object
      description: >
        Lead-time decomposition into four consecutive stages (p50 seconds across
        successful deploys correlated to a PR via the merge SHA). Review uses the
        approval timestamp (only deploys with an approval contribute).
      required: [correlated, excluded, coding_sample, review_sample, release_sample, deploy_sample, total_p50_seconds, coding_p50_seconds, review_p50_seconds, release_wait_p50_seconds, deploy_p50_seconds]
      properties:
        correlated: { type: integer, format: int64, description: "non-rollback successful deploys with a PR correlation" }
        excluded: { type: integer, format: int64, description: "non-rollback successful deploys with no PR correlation" }
        coding_sample: { type: integer, format: int64 }
        review_sample: { type: integer, format: int64, description: "correlated deploys that have an approval" }
        release_sample: { type: integer, format: int64 }
        deploy_sample: { type: integer, format: int64 }
        total_p50_seconds: { type: number, format: double, description: "true p50 of deploy_finished − first_commit (NOT the sum of stage p50s)" }
        coding_p50_seconds: { type: number, format: double, description: "opened − first_commit" }
        review_p50_seconds: { type: number, format: double, description: "approved − opened" }
        release_wait_p50_seconds: { type: number, format: double, description: "deploy job start − (approved or merged)" }
        deploy_p50_seconds: { type: number, format: double, description: "deploy finish − deploy job start" }

    ThroughputGroup:
      type: object
      description: Run-based throughput + reliability for one label-value group.
      required: [group, runs_success, runs_failed, runs_total, runs_per_day, success_rate, queue_wait_p50_seconds, duration_p50_seconds]
      properties:
        group: { type: string, description: "the label value, e.g. payments" }
        runs_success: { type: integer, format: int64 }
        runs_failed: { type: integer, format: int64, description: "status failed OR errored" }
        runs_total: { type: integer, format: int64, description: "terminal runs (success+failed+errored); canceled excluded" }
        runs_per_day: { type: number, format: double }
        success_rate: { type: number, format: double, description: "runs_success / runs_total" }
        queue_wait_p50_seconds: { type: number, format: double, description: "p50 started_at − created_at" }
        duration_p50_seconds: { type: number, format: double, description: "p50 finished_at − started_at" }

    ReliabilityHotspot:
      type: object
      description: One pipeline that fails often, among labelled projects.
      required: [project_slug, project, pipeline, runs_total, runs_failed, failure_rate]
      properties:
        project_slug: { type: string }
        project: { type: string }
        pipeline: { type: string }
        runs_total: { type: integer, format: int64 }
        runs_failed: { type: integer, format: int64 }
        failure_rate: { type: number, format: double, description: "runs_failed / runs_total" }

    ReliabilityReport:
      type: object
      required: [key, window_days, groups, hotspots]
      properties:
        key: { type: string }
        window_days: { type: integer }
        groups:
          type: array
          items: { $ref: "#/components/schemas/ThroughputGroup" }
        hotspots:
          type: array
          description: worst-failing pipelines (≥5 runs), worst first
          items: { $ref: "#/components/schemas/ReliabilityHotspot" }

    FrameworkCoverage:
      type: object
      description: How many of a group's projects are bound to one framework.
      required: [framework, covered]
      properties:
        framework: { type: string }
        covered: { type: integer, format: int64 }

    ComplianceGroup:
      type: object
      required: [group, projects_total, frameworks]
      properties:
        group: { type: string, description: "the label value, e.g. payments" }
        projects_total: { type: integer, format: int64, description: "coverage denominator" }
        frameworks:
          type: array
          items: { $ref: "#/components/schemas/FrameworkCoverage" }

    ComplianceCoverageReport:
      type: object
      required: [key, groups]
      properties:
        key: { type: string }
        groups:
          type: array
          items: { $ref: "#/components/schemas/ComplianceGroup" }

    ProjectDetail:
      allOf:
        - $ref: "#/components/schemas/Project"
        - type: object
          properties:
            pipelines:
              type: array
              items: { $ref: "#/components/schemas/Pipeline" }

    Pipeline:
      type: object
      required: [id, name, project_id]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        project_id: { type: string, format: uuid }
        last_run_status:
          type: string
          enum: [queued, running, success, failed, canceled]
          nullable: true
        last_run_at: { type: string, format: date-time, nullable: true }

    RunSummary:
      type: object
      required: [id, status, pipeline_name, project_slug, project_name, has_services]
      properties:
        id: { type: string, format: uuid }
        counter: { type: integer, format: int64 }
        status:
          type: string
          enum: [queued, running, success, failed, canceled]
        pipeline_id: { type: string, format: uuid }
        pipeline_name: { type: string }
        project_id: { type: string, format: uuid }
        project_slug: { type: string }
        project_name: { type: string }
        # Snapshot of `pipeline.services` non-emptiness stamped at
        # run-create time (server migration 00036). Clients gate
        # per-run /api/v1/runs/{id}/services fetches on this flag
        # so cards/timelines listing pipelines that never declared
        # services don't trigger an empty round-trip each.
        has_services: { type: boolean }
        # Names of the services snapshotted at run-create (server
        # migration 00055) — the name-granular companion to
        # has_services. Lets the pipelines list label declared
        # services without the per-run /services fetch. Defaulted to
        # an empty array, so not listed under `required`.
        service_names: { type: array, items: { type: string } }
        git_ref: { type: string, nullable: true }
        commit_sha: { type: string, nullable: true }
        triggered_by: { type: string, nullable: true }
        started_at: { type: string, format: date-time, nullable: true }
        finished_at: { type: string, format: date-time, nullable: true }

    RunDetail:
      allOf:
        - $ref: "#/components/schemas/RunSummary"
        - type: object
          properties:
            stages:
              type: array
              items: { $ref: "#/components/schemas/StageRun" }

    StageRun:
      type: object
      required: [id, name, status]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        status:
          type: string
          enum: [queued, running, success, failed, canceled, awaiting_approval, skipped]
        started_at: { type: string, format: date-time, nullable: true }
        finished_at: { type: string, format: date-time, nullable: true }
        jobs:
          type: array
          items: { $ref: "#/components/schemas/JobRun" }

    JobRun:
      type: object
      required: [id, name, status]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        status:
          type: string
          enum: [queued, running, success, failed, canceled, awaiting_approval, skipped]
        agent_id: { type: string, format: uuid, nullable: true }
        attempt: { type: integer, default: 1 }
        exit_code: { type: integer, nullable: true }
        error: { type: string, nullable: true }
        started_at: { type: string, format: date-time, nullable: true }
        finished_at: { type: string, format: date-time, nullable: true }

    Artifact:
      type: object
      required: [id, job_run_id, job_name, path, status, size_bytes, created_at]
      properties:
        id: { type: string, format: uuid }
        job_run_id: { type: string, format: uuid }
        job_name: { type: string }
        path: { type: string }
        status:
          type: string
          enum: [pending, ready, failed]
        size_bytes: { type: integer, format: int64 }
        content_sha256: { type: string }
        created_at: { type: string, format: date-time }
        expires_at: { type: string, format: date-time, nullable: true }
        download_url:
          type: string
          format: uri
          description: Pre-signed URL — only present when `?download=true`.
        download_url_expires_at: { type: string, format: date-time, nullable: true }

    DashboardMetrics:
      type: object
      required: [runs_today, successes_7d, failures_7d, canceled_7d, success_rate_7d, p50_seconds_7d, queued_runs, pending_jobs]
      properties:
        runs_today: { type: integer, format: int64 }
        successes_7d: { type: integer, format: int64 }
        failures_7d: { type: integer, format: int64 }
        canceled_7d: { type: integer, format: int64 }
        success_rate_7d: { type: number, format: double, description: "0..1 over (success + failure)" }
        p50_seconds_7d: { type: number, format: double }
        queued_runs: { type: integer, format: int64 }
        pending_jobs: { type: integer, format: int64 }

    Agent:
      type: object
      required: [id, name, status, health_state, capacity, registered_at, running_jobs]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        version: { type: string }
        os: { type: string }
        arch: { type: string }
        tags:
          type: array
          items: { type: string }
        capacity: { type: integer }
        status: { type: string }
        health_state:
          type: string
          enum: [online, stale, offline]
        last_seen_at: { type: string, format: date-time, nullable: true }
        registered_at: { type: string, format: date-time }
        running_jobs: { type: integer, format: int64 }

    AgentJobSummary:
      type: object
      properties:
        job_run_id: { type: string, format: uuid }
        job_name: { type: string }
        job_status: { type: string }
        started_at: { type: string, format: date-time, nullable: true }
        finished_at: { type: string, format: date-time, nullable: true }
        exit_code: { type: integer, nullable: true }
        run_id: { type: string, format: uuid }
        run_counter: { type: integer, format: int64 }
        pipeline_name: { type: string }
        project_slug: { type: string }

    Plugin:
      type: object
      required: [name, inputs]
      properties:
        name: { type: string, example: "go" }
        description: { type: string }
        category: { type: string, example: "build" }
        inputs:
          type: array
          items:
            type: object
            required: [name, required]
            properties:
              name: { type: string }
              required: { type: boolean }
              default: { type: string }
              description: { type: string }
        examples:
          type: array
          items:
            type: object
            properties:
              name: { type: string }
              description: { type: string }
              yaml: { type: string }

    RunnerProfile:
      type: object
      required: [id, name, engine, node_selector, tolerations, env, secret_keys, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        name: { type: string, example: "fast-builds" }
        description: { type: string }
        engine:
          type: string
          enum: [kubernetes]
        default_image: { type: string, example: "alpine:3.20" }
        default_cpu_request: { type: string, example: "100m" }
        default_cpu_limit: { type: string, example: "1" }
        default_mem_request: { type: string, example: "256Mi" }
        default_mem_limit: { type: string, example: "1Gi" }
        max_cpu: { type: string, example: "4" }
        max_mem: { type: string, example: "8Gi" }
        tags:
          type: array
          items: { type: string }
          example: ["linux", "amd64"]
        config:
          type: object
          additionalProperties: true
          description: Engine-specific overflow. Reserved for future fields.
        node_selector:
          type: object
          additionalProperties: { type: string }
          description: |
            Pins job pods to nodes carrying these labels (k8s
            `nodeSelector`). Always present on read — empty object
            means no restriction beyond the agent-level
            nodeSelector (set on the StatefulSet). Profile values
            WIN on key collisions when merged with the agent-level
            set: profile is more specific than agent default.
          example:
            workload: ci
            pool: gradle-heavy
        tolerations:
          type: array
          items:
            $ref: '#/components/schemas/Toleration'
          description: |
            Lets job pods schedule on tainted nodes (k8s
            `tolerations`). Always present on read — empty array
            means no tolerations beyond what the agent ships with.
            Tolerations are APPENDED to the agent-level list
            (concat; kubelet ignores duplicates). On read, each
            entry's `operator` is always the explicit value
            (empty input is normalised to `Equal` at write time).
        env:
          type: object
          additionalProperties: { type: string }
          description: |
            Plain (non-secret) env vars injected into every plugin
            container running on this profile. Common use: bucket
            names, regions, GOCDNEXT_LAYER_CACHE_* defaults.
          example:
            GOCDNEXT_LAYER_CACHE_BUCKET: gocdnext-cache
            GOCDNEXT_LAYER_CACHE_REGION: us-east-1
        secret_keys:
          type: array
          items: { type: string }
          description: |
            Names of encrypted secrets configured on this profile.
            Values stay encrypted at rest and are never returned
            through this endpoint. The runner unseals them at
            dispatch and injects them as env into the plugin
            container; the runner also redacts the values from
            log lines.
          example: ["AWS_ACCESS_KEY_ID", "AWS_SECRET_ACCESS_KEY"]
        secret_refs:
          type: object
          additionalProperties: { type: string }
          description: |
            Map of {profile-secret KEY → global secret NAME} for
            secrets whose stored value is a single
            `{{secret:NAME}}` template. Admin UIs use this to
            render "→ globals.NAME" chips in place of the masked
            placeholder so the operator can tell at a glance
            which rows inherit (and auto-rotate with) a global.
            Mixed values (template + literal text) and pure
            literals don't appear here — the dispatcher still
            resolves their templates, but the read surface treats
            them as opaque.
          example:
            AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
            DB_PASSWORD: PROD_DB_PASSWORD
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    RunnerProfileWrite:
      type: object
      required: [name, engine]
      properties:
        name:
          type: string
          pattern: "^[A-Za-z0-9._-]+$"
        description: { type: string }
        engine:
          type: string
          enum: [kubernetes]
        default_image: { type: string }
        default_cpu_request: { type: string }
        default_cpu_limit: { type: string }
        default_mem_request: { type: string }
        default_mem_limit: { type: string }
        max_cpu: { type: string }
        max_mem: { type: string }
        tags:
          type: array
          items: { type: string }
        config:
          type: object
          additionalProperties: true
        node_selector:
          type: object
          additionalProperties: { type: string }
          description: |
            Pins job pods to nodes carrying these labels. Keys
            and values validated against the k8s apiserver label
            rules (`IsQualifiedName` / `IsValidLabelValue`) at
            write time — a misconfig surfaces as a 400 here,
            not as a Pending pod hours later. Full-replace on
            update.
        tolerations:
          type: array
          items:
            $ref: '#/components/schemas/TolerationWrite'
          description: |
            Tolerations applied to job pods. Each entry validated:
            operator ∈ {Equal, Exists} OR omitted (server
            normalises empty → Equal in the stored value).
            Effect ∈ {"", NoSchedule, PreferNoSchedule,
            NoExecute}. operator=Exists with non-empty value is
            rejected. toleration_seconds must be ≥ 0 and only
            allowed with effect=NoExecute. Full-replace on update.
        env:
          type: object
          additionalProperties: { type: string }
          description: |
            Plain env vars. Keys must match `[A-Z_][A-Z0-9_]*` —
            UPPER_SNAKE_CASE convention shells, Docker and K8s
            all converge on. Full-replace on update.
        secrets:
          type: object
          additionalProperties: { type: string }
          description: |
            Plaintext values to encrypt and persist. The server
            seals each value with the AEAD cipher before writing
            and only ever returns secret_keys (not values) on
            read. Full-replace on update — keys missing from the
            payload are deleted from the row.

            Values may contain `{{secret:NAME}}` templates that
            reference globals. At dispatch time the runner
            resolves the template against the global secrets
            table, so admins can rotate a value once globally
            and every profile that references it picks up the
            new value automatically. Templates can compose with
            literal text (`prefix-{{secret:DB_PASSWORD}}-suffix`).
            Unresolvable references fail the dispatch closed.

    Toleration:
      type: object
      description: |
        Read-side shape returned by `GET /admin/runner-profiles`.
        `operator` is always the explicit value — the server
        normalises empty input to `Equal` at write time, so this
        read schema never carries the empty form. Mirrors
        `corev1.Toleration` with concrete strings; API-stable
        and decoupled from k8s versions.
      required: [operator]
      properties:
        key:
          type: string
          description: |
            Taint key the toleration matches. Follows Kubernetes
            label key rules (`IsQualifiedName`): optional DNS
            subdomain prefix (up to 253 chars) + a name segment
            of alphanumeric/-/_/. up to 63 chars. May be empty
            ONLY when `operator: Exists` (the kubelet "tolerate
            everything" pattern); empty key with operator=Equal
            is rejected at write time.
          example: "ci-only"
        operator:
          type: string
          enum: [Equal, Exists]
          description: |
            `Equal` matches when Value equals the taint value;
            `Exists` matches any value (and requires Value
            empty).
        value:
          type: string
          description: |
            Taint value the toleration matches. Follows
            Kubernetes label value rules (`IsValidLabelValue`):
            empty OR 1-63 chars of alphanumeric/-/_/.. With
            `operator: Equal` this may be any conforming string
            including empty (matches a taint with empty value:
            rare but legal). With `operator: Exists` this MUST
            be empty.
          example: "true"
        effect:
          type: string
          enum: ["", NoSchedule, PreferNoSchedule, NoExecute]
          description: |
            Taint effect tolerated. Empty matches any effect.
        toleration_seconds:
          type: integer
          format: int64
          minimum: 0
          description: |
            How long the pod tolerates the taint after it's
            added. Only valid when `effect: NoExecute`; setting
            it for any other effect is rejected at write time
            (k8s silently ignores it, but silent surprises age
            badly). `null` means tolerate forever.
          example: 60

    TolerationWrite:
      type: object
      description: |
        Write-side shape accepted by `POST`/`PUT
        /admin/runner-profiles`. Permissive `operator` (empty
        accepted and normalised to `Equal` server-side); every
        other invariant matches the read-side `Toleration`
        schema. Operators authoring a values.yaml or a UI form
        can omit `operator` for the common Equal case without
        the codegen client rejecting the body.
      properties:
        key:
          type: string
          description: |
            Taint key. Required unless `operator: Exists`
            (kubelet "tolerate everything" pattern). Validated
            with the same Kubernetes label key rules as the
            read-side `Toleration` schema (`IsQualifiedName`).
          example: "ci-only"
        operator:
          type: string
          enum: ["", Equal, Exists]
          description: |
            Omit (or send empty) to default to `Equal`. Any
            other input rejected with HTTP 400.
        value:
          type: string
          description: |
            Taint value. Optional for `operator: Equal` (matches
            a taint with empty value when omitted). Must be
            empty for `operator: Exists`. When non-empty,
            validated with Kubernetes label value rules
            (`IsValidLabelValue`).
          example: "true"
        effect:
          type: string
          enum: ["", NoSchedule, PreferNoSchedule, NoExecute]
        toleration_seconds:
          type: integer
          format: int64
          minimum: 0
          description: |
            Only allowed with `effect: NoExecute`. Server
            rejects with 400 otherwise.

    StorageConfig:
      type: object
      required: [backend, value, credential_keys, source]
      properties:
        backend:
          type: string
          enum: [filesystem, s3, gcs]
        value:
          type: object
          additionalProperties: true
          description: |
            Non-secret backend configuration. Shape varies per
            backend: s3 carries `bucket`, `region`, `endpoint`,
            `use_path_style`, `ensure_bucket`; gcs carries
            `bucket`, `project_id`, `ensure_bucket`; filesystem
            is empty (root path comes from env).
        credential_keys:
          type: array
          items: { type: string }
          description: |
            Sorted names of credentials configured for this
            backend. The DB-row source returns the sentinel
            `["configured"]` when an encrypted blob is present
            (the names live in audit metadata, not the row
            itself); the env source returns the actual key
            names (`access_key`, `secret_key`,
            `service_account_json`) flagged as wired via env.
        updated_at:
          type: string
          format: date-time
          description: Set when source = "db".
        updated_by:
          type: string
          format: uuid
          description: Admin user that last wrote the override.
        source:
          type: string
          enum: [db, env]
          description: |
            "db" when an override row exists; "env" when the boot
            path will fall back to environment variables.

    StorageConfigWrite:
      type: object
      required: [backend]
      properties:
        backend:
          type: string
          enum: [filesystem, s3, gcs]
        value:
          type: object
          additionalProperties: true
          description: |
            Non-secret backend config. s3 / gcs require `bucket`;
            filesystem accepts an empty object.
        credentials:
          type: object
          additionalProperties: { type: string }
          description: |
            Plaintext credentials to seal and persist. Empty /
            missing for backends that should fall through to
            env-provided credentials (IRSA, Workload Identity,
            mounted SA file). Keys: s3 uses `access_key` and
            `secret_key`; gcs uses `service_account_json`.

    # -------------------- compliance --------------------
    ComplianceFramework:
      type: object
      required: [id, name, description, created_by, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        name: { type: string, example: "PCI" }
        description: { type: string }
        created_by: { type: string, description: "Email of the admin that created it." }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ComplianceFrameworkWrite:
      type: object
      required: [name]
      properties:
        name: { type: string, example: "PCI" }
        description: { type: string }

    CompliancePolicy:
      type: object
      required: [id, name, mode, priority, enabled, applies_to_all]
      properties:
        id: { type: string, format: uuid }
        name: { type: string, example: "pci-scan" }
        description: { type: string }
        enabled: { type: boolean }
        mode:
          type: string
          enum: [inject, override]
          description: |
            `inject` appends the policy's stages/jobs (default prepend, or
            anchored via position_before/after); `override` replaces the
            repo's stages/jobs entirely.
        priority:
          type: integer
          description: Merge order, ascending (ties broken by name).
        applies_to_all:
          type: boolean
          description: When true the policy governs every project, ignoring framework_ids.
        position_before:
          type: string
          description: |
            For `inject`: anchor injected stages before this existing stage.
            Mutually exclusive with position_after.
        position_after:
          type: string
          description: "For `inject`: anchor injected stages after this existing stage."
        framework_ids:
          type: array
          items: { type: string, format: uuid }
          description: |
            Frameworks this policy targets. Empty on the list endpoint
            (metadata only) and when applies_to_all is true.
        config_yaml:
          type: string
          description: |
            The mandatory pipeline content, in the normal pipeline YAML
            schema. Every stage/job name must carry the reserved
            `_compliance_` prefix. Empty on the list endpoint.
        created_by: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CompliancePolicyWrite:
      type: object
      required: [name, config_yaml, enabled]
      properties:
        name: { type: string, example: "pci-scan" }
        description: { type: string }
        enabled:
          type: boolean
          description: |
            Required — the server applies no default. Omitting it creates the
            policy DISABLED (the Go zero value is false), so callers must set it
            explicitly. Unlike `mode`, this field is not normalised server-side.
        mode: { type: string, enum: [inject, override], default: inject }
        priority: { type: integer, default: 0 }
        applies_to_all: { type: boolean, default: false }
        position_before: { type: string }
        position_after: { type: string }
        framework_ids:
          type: array
          items: { type: string, format: uuid }
        config_yaml:
          type: string
          description: Pipeline-schema body; all stage/job names must use the `_compliance_` prefix.

    ProjectFrameworksWrite:
      type: object
      required: [framework_ids]
      properties:
        framework_ids:
          type: array
          items: { type: string, format: uuid }
          description: The full set of frameworks to assign (full-replace).

    PipelineDefView:
      type: object
      required: [stages, jobs]
      description: |
        Minimal pipeline shape the preview renders (not the full internal
        definition). Empty collections are `[]`, never null.
      properties:
        stages:
          type: array
          items: { type: string }
        jobs:
          type: array
          items:
            type: object
            required: [name, stage]
            properties:
              name: { type: string }
              stage: { type: string }

    EffectivePipelinePreview:
      type: object
      required: [name, system_managed, raw, effective]
      properties:
        name: { type: string }
        system_managed:
          type: boolean
          description: True for the server-owned synthetic `_compliance` pipeline.
        raw:
          allOf: [{ $ref: "#/components/schemas/PipelineDefView" }]
          description: The pre-policy definition (as authored in the repo).
        effective:
          allOf: [{ $ref: "#/components/schemas/PipelineDefView" }]
          description: The post-merge definition every run uses.
