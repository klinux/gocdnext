name: python
category: build
description: >
  Python build + test runner. Installs dependencies with the
  detected manager (poetry → uv → pip), then executes the
  provided command. Auto-detection priority: poetry.lock →
  uv.lock → requirements.txt → pyproject.toml. Use
  `manager: none` to skip the install step entirely.

inputs:
  command:
    required: true
    description: >
      Shell command to run after dependency install. Examples:
      "pytest -q", "ruff check . && pytest", "mypy src tests".
  working-dir:
    required: false
    default: "."
    description: >
      Directory under the workspace to cd into before running the
      command. Monorepos with a sub-package set this.
  manager:
    required: false
    default: auto
    description: >
      Which package manager to use. "auto" picks the best match
      on disk. Options: auto | uv | pip | poetry | none.
  requirements:
    required: false
    description: >
      Override path to a requirements file (pip manager only).
      Default is "requirements.txt" at the working-dir root.
  extras:
    required: false
    description: >
      Comma- or space-separated STRING of optional-dependency extras
      (PEP 621 `[project.optional-dependencies]`) to enable on the
      install step. Example: `extras: dev, test`. Pipeline `with:` is
      `map[string]string` so YAML list syntax (`extras: [dev, test]`)
      is NOT accepted by the parser — pass a single string. Translation
      per manager: uv → repeated `--extra X`, poetry → `--extras "X Y"`,
      pip → installs the project itself with `.[X,Y]` after the
      requirements file. Empty = base install only.
  all-extras:
    required: false
    default: "false"
    description: >
      Install every optional-dependency extra defined by the project.
      uv/poetry pass `--all-extras` directly. pip has no equivalent
      (extras must be enumerated against a package spec), so the
      flag is honoured as a no-op + warn so a pipeline that runs on
      multiple managers doesn't break on the pip leg.
  no-install:
    required: false
    default: "false"
    description: >
      Skip the dependency-install step entirely and run the command
      against the `.venv` already present in the workspace. The
      shebang rewriter and activate-venv path still run, so a
      `.venv/` restored via `needs_artifacts:` from an upstream
      install job is usable as-is. Pair with an install job that
      sets `all-extras: true` (or `extras: dev, test`) and exposes
      `services/<x>/.venv/` as an artifact to get the
      install-once-reuse-N pattern without paying the resolve cost
      in every downstream job.

examples:
  - name: pytest with poetry
    description: >
      Library project using poetry.lock. Auto-detected; no extra
      config needed.
    yaml: |
      uses: ghcr.io/klinux/gocdnext-plugin-python@v1
      with:
        command: pytest -q

  - name: pytest with uv (pyproject only)
    description: >
      App with pyproject.toml but no uv.lock yet. `uv sync`
      resolves on the fly.
    yaml: |
      uses: ghcr.io/klinux/gocdnext-plugin-python@v1
      with:
        command: pytest -q --maxfail=1

  - name: publish to a private index (secret token)
    description: >
      Twine upload piping the index credentials via secrets so
      the token never touches the log.
    yaml: |
      secrets:
        - PYPI_TOKEN
      uses: ghcr.io/klinux/gocdnext-plugin-python@v1
      with:
        command: |
          python -m build && \
          twine upload --username __token__ --password "${PYPI_TOKEN}" dist/*

  - name: cached test run
    description: >
      Tar + restore the pip/uv/poetry download caches across runs.
      The plugin redirects PIP_CACHE_DIR, UV_CACHE_DIR and
      POETRY_CACHE_DIR to .cache/<mgr>/ inside the workspace so a
      single `paths: [.cache]` entry covers all three.
    yaml: |
      cache:
        - key: py-${CI_COMMIT_BRANCH}
          paths: [.cache]
      uses: ghcr.io/klinux/gocdnext-plugin-python@v1
      with:
        command: pytest -q

  - name: install once, reuse across jobs (extras + no-install)
    description: >
      The fan-out pattern for monorepos / fast pipelines: a single
      `install` job resolves the venv WITH every dev extra, exposes
      `.venv/` as an artifact, and every downstream job (lint,
      typecheck, test, ...) consumes that venv without re-resolving.
      `no-install: true` tells the plugin to skip its own sync and
      trust the artifact — but still rewrite venv shebangs and
      activate the venv so the .venv/bin entry-points spawn
      correctly under the new job's workspace path.
    yaml: |
      jobs:
        - name: install
          uses: ghcr.io/klinux/gocdnext-plugin-python@v1
          with:
            command: "true"      # nothing to run, the install IS the job
            all-extras: true     # sync ruff, mypy, pytest, ...
          artifacts: [.venv/]

        - name: ruff
          needs_artifacts:
            - from_job: install
              paths: [.venv/]
          uses: ghcr.io/klinux/gocdnext-plugin-python@v1
          with:
            command: ruff check .
            no-install: true     # reuse the artifact venv as-is

        - name: pytest
          needs_artifacts:
            - from_job: install
              paths: [.venv/]
          uses: ghcr.io/klinux/gocdnext-plugin-python@v1
          with:
            command: pytest -q
            no-install: true

  - name: install with explicit extras (not all)
    description: >
      Same fan-out pattern but enabling only specific extras —
      handy when `[project.optional-dependencies]` declares a
      heavy `gpu` group nobody wants in CI.
    yaml: |
      uses: ghcr.io/klinux/gocdnext-plugin-python@v1
      with:
        command: "true"
        extras: dev, test    # uv → --extra dev --extra test
      artifacts: [.venv/]
