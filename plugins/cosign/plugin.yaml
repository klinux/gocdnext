name: cosign
category: security
description: >
  Sign, verify, and attest container images via cosign
  (Sigstore). Keyless signing (OIDC) is preferred — no long-lived
  key material to rotate — but a password-protected
  cosign.key on disk is supported for environments that can't
  reach Fulcio/Rekor yet. `image:` should be a digest-pinned
  ref; signing a tag silently follows whichever image the tag
  resolves to at sign time.

inputs:
  image:
    required: true
    description: >
      Digest-pinned image ref, e.g.
      "ghcr.io/org/app@sha256:abc…". Tag refs mutate; cosign
      signs what the ref resolves to right now.
  action:
    required: false
    default: sign
    description: "sign | verify | attest"
  key:
    required: false
    description: >
      Path (under the workspace) to a cosign.key file. Mutually
      exclusive with `key-content:`. Empty = keyless
      signing/verification (Fulcio + OIDC).
  key-content:
    required: false
    description: >
      Inline cosign private-key bytes (the value of cosign.key
      itself). The entrypoint writes the content to a 0600
      tempfile inside the plugin's container and wipes it on
      exit via `trap`; the key never touches the artifact
      backend. Mutually exclusive with `key:` (file path).
      Typical use: `key-content: ${{ COSIGN_PRIVATE_KEY }}`
      with `secrets: [COSIGN_PRIVATE_KEY]` on the job, which
      keeps the bytes in the gocdnext log-mask layer the whole
      way through.
  key-password:
    required: false
    description: >
      Passphrase for the private key. Populate via secrets: so
      the plaintext stays out of the log.
  cert-identity:
    required: false
    description: >
      action=verify keyless: expected OIDC subject (e.g. the
      runner identity URL).
  cert-oidc-issuer:
    required: false
    description: >
      action=verify keyless: expected OIDC issuer URL (e.g.
      https://token.actions.githubusercontent.com).
  registry:
    required: false
    description: >
      Registry hostname for login. Defaults to the prefix of
      `image` up to the first "/".
  username:
    required: false
    description: Registry username for push access (signatures upload).
  password:
    required: false
    description: >
      Registry token/password. Populate via the job's
      `secrets:` list so the plaintext stays out of the log.
  predicate:
    required: false
    description: >
      action=attest: path to the in-toto predicate JSON (SBOM,
      SLSA provenance, etc).
  predicate-type:
    required: false
    description: >
      action=attest: predicate type. Common values: spdxjson,
      cyclonedx, slsaprovenance, custom.

examples:
  - name: keyless sign (digest ref)
    description: >
      Preferred shape — no key material, signs the image the
      digest pins. Registry creds piped via secrets.
    yaml: |
      secrets:
        - GHCR_USERNAME
        - GHCR_TOKEN
      uses: ghcr.io/klinux/gocdnext-plugin-cosign@v1
      with:
        image: ghcr.io/org/app@sha256:${IMAGE_SHA}
        username: ${{ GHCR_USERNAME }}
        password: ${{ GHCR_TOKEN }}

  - name: key-based sign with password
    description: >
      Old-school flow for environments without Sigstore access.
      The key file is checked into the workspace (usually via
      secrets-as-files) and the passphrase comes through
      secrets.
    yaml: |
      secrets:
        - COSIGN_PASSWORD
      uses: ghcr.io/klinux/gocdnext-plugin-cosign@v1
      with:
        image: ghcr.io/org/app@sha256:${IMAGE_SHA}
        key: cosign.key
        key-password: ${{ COSIGN_PASSWORD }}

  - name: inline key content (no artifact persistence)
    description: >
      Pass the key bytes inline via `secrets:` — the entrypoint
      writes them to a 0600 tempfile and `trap`-cleans on exit.
      The key never persists in the artifact backend; with the
      v0.7.x Docker engine + cmd.Env env propagation, it also
      never lands on the docker CLI argv. Registry creds are
      required because `cosign sign` uploads the signature
      manifest, which on a private registry needs auth.
      Preferred shape for trunk-based release pipelines whose
      runners scan-after-publish + sign in the same window.
    yaml: |
      secrets:
        - COSIGN_PRIVATE_KEY
        - COSIGN_PASSWORD
        - GHCR_USERNAME
        - GHCR_TOKEN
      uses: ghcr.io/klinux/gocdnext-plugin-cosign@v1
      with:
        image: ghcr.io/org/app:v1.2.3
        key-content: ${{ COSIGN_PRIVATE_KEY }}
        key-password: ${{ COSIGN_PASSWORD }}
        registry: ghcr.io
        username: ${{ GHCR_USERNAME }}
        password: ${{ GHCR_TOKEN }}

  - name: attest an SBOM
    description: >
      Attach an SPDX SBOM as an attestation on the image.
    yaml: |
      uses: ghcr.io/klinux/gocdnext-plugin-cosign@v1
      with:
        image: ghcr.io/org/app@sha256:${IMAGE_SHA}
        action: attest
        predicate: sbom.spdx.json
        predicate-type: spdxjson
