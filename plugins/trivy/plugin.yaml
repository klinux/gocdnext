name: trivy
category: security
description: >
  Scan images, filesystems, git repos, or Kubernetes manifests
  for CVEs and leaked secrets using Aqua's Trivy. By default
  fails the job on HIGH/CRITICAL findings that have a fix
  available — tune severity + exit_code to make the scan
  advisory instead of blocking.

inputs:
  scan-type:
    required: false
    default: fs
    description: >
      What to scan: "image", "fs", "repo", or "config".
      Defaults to "fs" (the workspace tree).
  target:
    required: false
    description: >
      What to point the scan at. Required for image + repo;
      defaults to "." (the workspace root) for fs + config.
  skip-db-update:
    required: false
    default: "false"
    description: >
      Skip the upstream HEAD that checks whether the cached
      vulnerability DB is fresh. Default off — trivy verifies
      freshness on every run and only downloads when stale
      (24h policy). Force "true" on fully offline / air-gapped
      runners where the freshness check itself would error.
      Pair with `cache: [{ key: trivy-db, paths: [.cache/trivy] }]`
      to persist the DB across runs.
  severity:
    required: false
    default: HIGH,CRITICAL
    description: >
      Comma-separated severity filter. Anything below the
      threshold is ignored for exit-code purposes but still
      appears in the report.
  exit-code:
    required: false
    default: "1"
    description: >
      Exit code when the scan finds anything in the severity
      filter. Set to "0" to make the scan advisory.
  ignore-unfixed:
    required: false
    default: "true"
    description: >
      When "true", CVEs without an upstream fix are skipped —
      reduces noise on libraries you can't patch anyway.
  format:
    required: false
    default: table
    description: >
      Report format — table (human), json, sarif, or template.
  username:
    required: false
    description: >
      Registry username for `scan-type: image` against a private
      registry (GHCR-private, ECR, GAR, internal Harbor, …). The
      plugin promotes this to `TRIVY_USERNAME` env which trivy
      reads natively. Populate via the job's `secrets:` list so
      the value flows through the gocdnext masking layer + the
      docker-engine env propagation (NAME-only on argv, value
      via cmd.Env). Empty = anonymous pull (works on public
      registries).
  password:
    required: false
    description: >
      Registry token/password. Same path as `username:`:
      promoted to `TRIVY_PASSWORD` env. Populate via secrets:.
  output:
    required: false
    description: >
      Path (under the workspace) to write the report to.
      Pairs well with `artifacts.paths:` to attach the report
      to the run.

examples:
  - name: scan built image
    description: Scan the image just built by gocdnext/docker.
    yaml: |
      uses: ghcr.io/klinux/gocdnext-plugin-trivy@v1
      with:
        scan-type: image
        target: ghcr.io/org/app:${CI_COMMIT_SHORT_SHA}
        severity: HIGH,CRITICAL

  - name: scan published image on a private registry
    description: >
      Pulls the image from a private registry for scanning.
      The login buildx did in the build job doesn't carry across
      job containers, so trivy needs its own creds — `username:`
      and `password:` promote to `TRIVY_USERNAME` / `TRIVY_PASSWORD`
      which trivy reads natively. Use this in scan-after-publish
      pipelines where the build job already pushed.
    yaml: |
      uses: ghcr.io/klinux/gocdnext-plugin-trivy@v1
      secrets: [GHCR_USERNAME, GHCR_TOKEN]
      with:
        scan-type: image
        target: ghcr.io/org/app:${CI_COMMIT_SHORT_SHA}
        severity: HIGH,CRITICAL
        username: ${{ GHCR_USERNAME }}
        password: ${{ GHCR_TOKEN }}

  - name: advisory fs scan
    description: >
      Scan the workspace tree but don't fail the build —
      attach the JSON report as optional artifact.
    yaml: |
      uses: ghcr.io/klinux/gocdnext-plugin-trivy@v1
      with:
        scan-type: fs
        format: json
        output: trivy-report.json
        exit-code: "0"
      artifacts:
        optional: [trivy-report.json]

  - name: cached vulnerability DB
    description: >
      Trivy downloads its CVE database (~50 MB) at scan start and
      re-validates freshness on a 24h policy. Persist `.cache/trivy`
      across runs to skip the download on warm runs; pair with
      `skip-db-update: "true"` on air-gapped agents. The cache key
      is constant (`trivy-db`) because the database itself is the
      artefact, not anything project-derived — all projects in the
      same agent fleet share the warm DB.
    yaml: |
      trivy-fs:
        stage: scan
        uses: ghcr.io/klinux/gocdnext-plugin-trivy@v1
        cache:
          - key: trivy-db
            paths: [.cache/trivy]
        with:
          scan-type: fs
          target: .
          severity: HIGH,CRITICAL
          skip-db-update: "false"
