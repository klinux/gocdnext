name: go
category: build
description: >
  Run `go` toolchain commands — build, test, vet, mod, etc.
  Ships with go:1.25-alpine + git + make; operator provides the
  subcommand + args via `command:` and optionally changes
  working-dir. Exits with the go CLI's exit code.

inputs:
  command:
    required: true
    description: >
      go subcommand + args, word-split. Examples: "build ./...",
      "test -race ./...", "test -cover -coverprofile=cover.out ./...".
  working-dir:
    required: false
    default: "."
    description: Directory under the workspace to cd into before running go.

examples:
  - name: test with race detector
    description: Run the full test suite with -race (typical CI step).
    yaml: |
      uses: gocdnext/go@v1
      with:
        command: test -race ./...

  - name: build + coverage
    description: Build then run coverage, attaching the report as artifact.
    yaml: |
      uses: gocdnext/go@v1
      with:
        command: test -cover -coverprofile=cover.out ./...
      artifacts:
        optional: [cover.out]
