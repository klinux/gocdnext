name: buildx
category: container
description: >
  Multi-arch container build via `docker buildx`. Unlike
  `gocdnext/docker` (single-arch), this plugin sets up QEMU
  emulation and a dedicated buildx builder so one job produces a
  manifest list covering amd64 + arm64 (or any platforms you
  pick). Requires `docker: true` on the job. Pipe registry creds
  via `secrets:` — plaintext never touches the log.

inputs:
  image:
    required: true
    description: >
      Target image repo without a tag, e.g. "ghcr.io/org/app".
  tags:
    required: false
    default: latest
    description: >
      Comma- or space-separated tag list. A single buildx pass
      produces all tags as one manifest list per tag.
  platforms:
    required: false
    default: "linux/amd64,linux/arm64"
    description: >
      Comma-separated target platforms. The default covers 95% of
      modern deployments; add "linux/arm/v7" or "linux/ppc64le"
      when targeting embedded / power.
  dockerfile:
    required: false
    default: Dockerfile
    description: Path to the Dockerfile, relative to the build context.
  context:
    required: false
    default: "."
    description: Build context directory, relative to the workspace.
  build-args:
    required: false
    description: >
      KEY=VALUE list (comma- or newline-separated) forwarded as
      `--build-arg`.
  push:
    required: false
    default: "true"
    description: >
      Set to "false" to skip the registry push. Multi-arch images
      can't live in the legacy daemon store, so "false" builds
      both arches into the builder cache without a local image.
  registry:
    required: false
    description: >
      Registry hostname for login. Defaults to the prefix of
      `image` up to the first "/".
  username:
    required: false
    description: Registry username. Empty = no login.
  password:
    required: false
    description: >
      Registry token/password. Populate via the job's
      `secrets:` list so the plaintext stays out of the log.
  cache:
    required: false
    description: >
      Shorthand for layer caching. Pick one:
        - "registry" → reuses the destination registry as cache
          target (`<image>:buildcache` tag, mode=max). Auth flows
          through the same registry creds you already pass.
        - "inline"   → embeds the cache metadata into the pushed
          manifest (no separate tag). Cheap but only works when
          `push: true`; ignores layers not in the final image.
        - "bucket"   → reads GOCDNEXT_LAYER_CACHE_* env vars (set
          by the runner profile's `env:` block) and builds a
          `type=s3` cache spec automatically. Combined with the
          profile's encrypted `secrets:` (AWS_ACCESS_KEY_ID,
          AWS_SECRET_ACCESS_KEY) it lets every job on the
          profile hit the same S3/GCS layer cache without any
          per-job credential plumbing.
        - "" (empty) → no automatic cache wiring; use cache-to /
          cache-from below if you want explicit control.
      Mutually exclusive with cache-to/cache-from — those win
      when both are set.
  cache-to:
    required: false
    description: >
      Full BuildKit `--cache-to` spec, passed verbatim. Use this
      for S3/GCS/Azure backends. Examples:
        type=s3,region=us-east-1,bucket=my-cache,name=org/app,mode=max
        type=gha,mode=max
        type=registry,ref=ghcr.io/org/app:cache,mode=max
      Pipe AWS/GCS credentials via `secrets:` so BuildKit can
      reach the bucket — the plugin doesn't proxy the upload.
  cache-from:
    required: false
    description: >
      Full BuildKit `--cache-from` spec, passed verbatim. Usually
      the import-side mirror of `cache-to`. Examples:
        type=s3,region=us-east-1,bucket=my-cache,name=org/app
        type=registry,ref=ghcr.io/org/app:cache

examples:
  - name: amd64 + arm64 release
    description: >
      Typical release shape — one job, two architectures, pushed
      as a single manifest list. Creds come from secrets so the
      token never touches the log.
    yaml: |
      secrets:
        - GHCR_USERNAME
        - GHCR_TOKEN
      docker: true
      uses: gocdnext/buildx@v1
      with:
        image: ghcr.io/org/app
        tags: "latest, v${CI_COMMIT_SHORT_SHA}"
        platforms: linux/amd64,linux/arm64
        username: ${{ GHCR_USERNAME }}
        password: ${{ GHCR_TOKEN }}

  - name: PR preview (build-only, no push)
    description: >
      Validate the Dockerfile still builds on both arches on a
      PR, without writing to the registry.
    yaml: |
      docker: true
      uses: gocdnext/buildx@v1
      with:
        image: ghcr.io/org/app
        tags: pr-${CI_PR_NUMBER}
        push: "false"

  - name: Layer cache via runner profile (zero per-job config)
    description: >
      Admin configures the runner profile once (env + encrypted
      secrets in /admin/profiles); every build that lands on
      that profile inherits the bucket coords + creds. The job
      just opts in with `cache: bucket`.
    yaml: |
      agent:
        profile: fast-builds
      docker: true
      uses: gocdnext/buildx@v1
      with:
        image: ghcr.io/org/app
        tags: latest
        cache: bucket

  - name: registry-as-cache shorthand
    description: >
      Zero-config option for projects that already push to a
      registry: BuildKit writes a `<image>:buildcache` tag and
      reads from it on the next run. No bucket or extra creds
      beyond what the push already requires.
    yaml: |
      secrets:
        - GHCR_USERNAME
        - GHCR_TOKEN
      docker: true
      uses: gocdnext/buildx@v1
      with:
        image: ghcr.io/org/app
        tags: latest
        username: ${{ GHCR_USERNAME }}
        password: ${{ GHCR_TOKEN }}
        cache: registry

  - name: explicit S3 cache spec
    description: >
      Escape hatch when you don't want runner-profile env
      injection (e.g. project-specific bucket override). Pipe
      AWS creds via `secrets:` and write the full BuildKit
      cache-to / cache-from spec.
    yaml: |
      secrets:
        - GHCR_USERNAME
        - GHCR_TOKEN
        - AWS_ACCESS_KEY_ID
        - AWS_SECRET_ACCESS_KEY
      docker: true
      uses: gocdnext/buildx@v1
      with:
        image: ghcr.io/org/app
        tags: latest
        username: ${{ GHCR_USERNAME }}
        password: ${{ GHCR_TOKEN }}
        cache-to:   type=s3,region=us-east-1,bucket=my-cache,name=org/app,mode=max
        cache-from: type=s3,region=us-east-1,bucket=my-cache,name=org/app
