# Plugin manifest — consumed by the gocdnext server at startup to
# validate `with:` inputs before a run ever dispatches. The plugin
# image still reads the same PLUGIN_* env vars at runtime; this
# file is metadata, not code.
name: node
category: build
description: >
  Run pnpm commands with corepack + pnpm bootstrap. Handles
  `install`, `test`, `build`, `exec <cmd>` — whatever pnpm
  understands, passed through word-split.

inputs:
  command:
    required: true
    description: pnpm subcommand + args, word-split. Example "install --frozen-lockfile".
  working-dir:
    required: false
    default: "."
    description: Directory under the workspace to cd into before running pnpm.

examples:
  - name: install deps
    description: Frozen-lockfile install in the web/ subdir.
    yaml: |
      uses: gocdnext/node@v1
      with:
        working-dir: web
        command: install --frozen-lockfile

  - name: typecheck
    description: Type-check via pnpm exec.
    yaml: |
      uses: gocdnext/node@v1
      with:
        working-dir: web
        command: exec tsc --noEmit

  - name: cached install
    description: >
      Tar + restore pnpm's content-addressable store across runs.
      Plugin redirects the store to .pnpm-store/ inside the
      workspace so the `cache:` block captures it. Keyed on the
      lockfile hash — different lockfile = fresh cache, no stale
      packages slipping through.
    yaml: |
      cache:
        - key: pnpm-store-${CI_COMMIT_BRANCH}
          paths: [.pnpm-store]
      uses: gocdnext/node@v1
      with:
        working-dir: web
        command: install --frozen-lockfile
