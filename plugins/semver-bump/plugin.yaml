name: semver-bump
category: release
description: >
  Compute the next SemVer version from the Conventional Commits
  between the prior tag and HEAD. Writes a shell-sourceable file
  under the workspace (NEXT, CURRENT, KIND, PREV_SHA) that
  downstream jobs `source` to drive `git tag`, build labels, or
  publish steps — no operator-typed TAG variable at trigger time.

  Bump rules (Conventional Commits):
    - any `feat!:` / `fix!:` (etc.) subject OR `BREAKING CHANGE:`
      in any commit body → major
    - any `feat:` / `feat(scope):` → minor
    - else → patch

  When no prior tag exists, the initial version (PLUGIN_INITIAL,
  default 0.1.0) is emitted as-is. When no commits exist since
  the prior tag, KIND=none and NEXT=CURRENT so downstream can
  short-circuit without re-tagging.

inputs:
  prefix:
    required: false
    default: v
    description: >
      Tag prefix to scope detection against (e.g. "v" reads
      v1.2.3-style tags; empty reads SemVer-only tags; "release-"
      reads release-1.2.3-style). Used with `git describe --match
      '<prefix>[0-9]*'` so the digit guard rejects non-SemVer
      siblings sharing the prefix (`vfoo`, `vnext`, `vendor-1`)
      AND a repo with mixed tag tracks (release/ + v) doesn't
      cross-pollute. Must match `[A-Za-z0-9._/-]*` — no shell
      metas (the value lands in the shell-sourceable output file).
  initial:
    required: false
    default: "0.1.0"
    description: >
      First version emitted when no prior tag exists. Must be
      SemVer (major.minor.patch with optional pre-release suffix).
      Default 0.1.0 matches the SemVer-recommended start for a
      library — bump-major detection still applies on top once
      the first tag lands.
  pre-release:
    required: false
    description: >
      Pre-release suffix appended to the computed next version,
      e.g. `rc1` → v1.3.0-rc1. Must match `[A-Za-z0-9.-]+` so a
      typo doesn't end up in a tag name. Empty (default) emits a
      stable tag.
  force-kind:
    required: false
    description: >
      Override the auto-detected bump kind. One of `major`,
      `minor`, `patch`. Empty (default) uses the Conventional
      Commits scan. Use this when the operator KNOWS the next
      release is e.g. a major even if commits read as patch (doc-
      only cycle that ships a deprecated-API removal flagged
      separately).
  prior-tag:
    required: false
    description: >
      Override for the prior-tag detection. Must itself be a
      SemVer-shaped tag (e.g. `v1.2.3`) — the plugin parses
      this verbatim as the baseline whose version gets bumped.
      Defaults to the nearest reachable matching tag via
      `git describe --tags --match '<prefix>[0-9]*' --abbrev=0`.
      The `[0-9]*` filter (not just `*`) rejects non-SemVer
      siblings sharing the prefix (`vfoo`, `vnext`, `vendor-*`)
      that would otherwise crash the SemVer parser. Use this
      input ONLY to pin a specific prior tag — not to point at
      an arbitrary ref like `main` or a SHA.
  output:
    required: false
    default: ".gocdnext/semver.env"
    description: >
      Workspace-relative output file. Created with `mkdir -p`.
      Shell-sourceable format (NEXT=, CURRENT=, KIND=, PREV_SHA=).
      Pair with `artifacts.paths:` on this job and
      `needs_artifacts:` on the consumer in isolated runtimes
      (Kubernetes engine, isolated mode) so the file crosses job
      boundaries.

examples:
  - name: auto-bump on every release pipeline
    description: >
      Cuts the next version automatically — no TAG variable at
      trigger time. The downstream create-tag job sources the
      output and pushes whatever `semver-bump` decided.
    yaml: |
      jobs:
        bump:
          stage: tag
          uses: ghcr.io/klinux/gocdnext-plugin-semver-bump@v1
          artifacts:
            paths: [".gocdnext/semver.env"]

        create-tag:
          stage: tag
          needs: [bump]
          needs_artifacts:
            - from_job: bump
              paths: [".gocdnext/semver.env"]
          secrets: [GH_RELEASE_TOKEN]
          image: alpine:3.20
          script:
            - apk add --no-cache git
            - |
              # Use `.` (POSIX) rather than `source` (bash-only) so
              # the script works on Alpine's default ash shell. The
              # output file is intentionally shell-portable for
              # exactly this reason.
              . .gocdnext/semver.env
              if [ "$KIND" = "none" ]; then
                echo "No commits since $CURRENT — skipping tag"
                exit 0
              fi
              git config user.email "ci-release@example.com"
              git config user.name "release-bot"
              git tag -a "$NEXT" -m "Release $NEXT"
              # GIT_ASKPASS pattern (see trunk-based-release recipe)
              # to push without leaking the token on argv.
              ...

  - name: pre-release cycle (release candidates)
    description: >
      Stamp every push to a release/* branch with an incrementing
      `-rc<N>` pre-release. Combine with `force-kind: patch` so
      RC bumps don't accidentally land a major on the wrong cycle.
    yaml: |
      jobs:
        rc-bump:
          stage: tag
          uses: ghcr.io/klinux/gocdnext-plugin-semver-bump@v1
          with:
            pre-release: rc${CI_RUN_COUNTER}
            force-kind: patch
          artifacts:
            paths: [".gocdnext/semver.env"]

  - name: SemVer-only tags (no `v` prefix)
    description: >
      Helm chart repos often tag with bare SemVer (`1.2.3`)
      instead of `v1.2.3`. Empty `prefix:` matches that scheme.
    yaml: |
      jobs:
        bump:
          stage: tag
          uses: ghcr.io/klinux/gocdnext-plugin-semver-bump@v1
          with:
            prefix: ""
            initial: "0.1.0"
          artifacts:
            paths: [".gocdnext/semver.env"]

  - name: separate release tracks (multi-track monorepo)
    description: >
      A monorepo with independently versioned components — each
      component has its own prefix and its own bump. Run one
      semver-bump job per track with a track-scoped output file.
    yaml: |
      jobs:
        bump-api:
          stage: tag
          uses: ghcr.io/klinux/gocdnext-plugin-semver-bump@v1
          with:
            prefix: api-v
            output: .gocdnext/api.env
          artifacts:
            paths: [".gocdnext/api.env"]

        bump-web:
          stage: tag
          uses: ghcr.io/klinux/gocdnext-plugin-semver-bump@v1
          with:
            prefix: web-v
            output: .gocdnext/web.env
          artifacts:
            paths: [".gocdnext/web.env"]
