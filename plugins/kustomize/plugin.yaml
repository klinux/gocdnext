name: kustomize
category: deploy
description: >
  Render a kustomization tree and apply / build / diff / validate it
  against a cluster. Bundles `kustomize` + `kubectl` so operators don't
  pipe between containers. Beyond a plain apply it can set image tags
  (deploy the freshly built image), substitute ${VAR} placeholders from
  the job env (inject project secrets without committing them), and wait
  for the rollout to become healthy so a green deploy means "rolled out",
  not just "submitted". Kubeconfig discovery mirrors the kubectl + helm
  plugins (path / inline / base64), and the cluster-registry `cluster:`
  key feeds it — all three deploy plugins share one convention.

inputs:
  path:
    required: true
    description: >
      Workspace-relative path to the kustomization root (folder with
      kustomization.yaml). Example: deploy/overlays/prod.
  action:
    required: false
    default: apply
    description: >
      apply | build | diff | validate.
      apply renders + kubectl apply (+ optional wait);
      build renders to stdout only;
      diff renders + kubectl diff (exit 1 on differences is not a
      failure — only ≥2 fails the job);
      validate renders + kubectl apply --dry-run=server (catches
      schema/admission errors without touching the cluster).
  images:
    required: false
    description: >
      Image overrides applied with `kustomize edit set image` before
      render. Newline- or comma-separated, each "name=registry/img:tag"
      or "name=registry/img@sha256:...". The idiomatic CD use: pin the
      freshly built tag, e.g. app=ghcr.io/org/app:${CI_COMMIT_SHORT_SHA},
      so the committed overlay holds only a placeholder tag.
  envsubst:
    required: false
    description: >
      Substitute ${VAR} placeholders from the job env, in place on the
      source *.yaml under path, BEFORE kustomize build (so source quoting
      is preserved — a secret with YAML-special chars stays valid). "true"
      substitutes every variable currently set in the env; a comma/space
      list ("DB_PASSWORD,API_TOKEN") restricts to those names — the
      recommended form for injecting project secrets (the value lives in
      the masked job env + the source holds ${NAME}, so it never enters
      git). Both modes substitute ONLY set variables, so an unset ${...}
      survives untouched. Only files under path are processed — a base
      outside path is not.
      SECURITY: with action=apply the rendered manifest is NOT echoed to
      the log while envsubst is on, so a resolved secret can't leak there.
      But action=build and action=diff print the rendered output by
      definition — do NOT combine those with substituted secrets.
  wait:
    required: false
    default: "false"
    description: >
      "true" → after apply, `kubectl rollout status` each Deployment /
      StatefulSet / DaemonSet — the workload list (and each one's
      namespace) is parsed from the already-rendered manifests, offline
      (no server roundtrip); the manifest's metadata.namespace wins, else
      namespace, else the context default. On failure the job dumps recent
      events + a describe and fails. Makes deploy-success mean "rolled
      out", not "submitted".
  wait_timeout:
    required: false
    default: "120s"
    description: Per-workload rollout timeout (Go duration, e.g. 180s, 5m).
  ensure_namespace:
    required: false
    default: "false"
    description: >
      "true" → create `namespace` if it doesn't exist before apply
      (deploy to an ephemeral / fresh namespace). Requires namespace.
  namespace:
    required: false
    description: >
      Default namespace passed as `--namespace`. Manifests with an
      explicit metadata.namespace win.
  server_side:
    required: false
    default: "false"
    description: '"true" → kubectl apply --server-side (field-manager apply).'
  enable_helm:
    required: false
    default: "false"
    description: '"true" → `kustomize build --enable-helm` (inflate helmCharts: entries).'
  prune:
    required: false
    default: "false"
    description: >
      "true" enables `kubectl apply --prune` so resources removed from
      the kustomization are deleted from the cluster. Requires prune_label.
  prune_label:
    required: false
    description: >
      Label selector used with prune (e.g.
      app.kubernetes.io/managed-by=gocdnext). Required when prune=true.
  kubeconfig:
    required: false
    description: >
      Kubeconfig source: path under /workspace, raw YAML, or base64 YAML.
      Auto-detected. Empty defers to the agent's in-cluster service
      account. Usually supplied by the cluster registry (`cluster:`).
  extra_args:
    required: false
    description: >
      Forwarded verbatim to `kubectl apply` (e.g. --force-conflicts).

examples:
  - name: deploy a freshly built image and wait for rollout
    description: >
      The canonical CD shape — set the image tag from the build, apply
      the overlay to the registered cluster, and block until the rollout
      is healthy. Kubeconfig comes from the cluster registry.
    yaml: |
      uses: ghcr.io/klinux/gocdnext-plugin-kustomize@v1
      cluster: prod
      with:
        path: deploy/overlays/prod
        namespace: apps
        # `with:` values are strings — one image per line (or comma-separated).
        images: |
          app=ghcr.io/org/app:${CI_COMMIT_SHORT_SHA}
        wait: "true"
        wait_timeout: 180s

  - name: inject a project secret without committing it
    description: >
      The overlay holds `${DB_PASSWORD}` placeholders; the value
      is a masked project secret in the job env. envsubst (restricted to
      the named vars) resolves them at deploy — nothing sensitive lands
      in git.
    yaml: |
      uses: ghcr.io/klinux/gocdnext-plugin-kustomize@v1
      cluster: staging
      secrets: [DB_PASSWORD, API_TOKEN]
      with:
        path: deploy/overlays/staging
        namespace: apps
        images: "app=ghcr.io/org/app:${CI_COMMIT_SHORT_SHA}"
        envsubst: "DB_PASSWORD,API_TOKEN"
        wait: "true"

  - name: validate manifests on a PR (no cluster mutation)
    description: >
      Server dry-run catches schema + admission errors before merge.
      Pair with diff to show reviewers what would change.
    yaml: |
      uses: ghcr.io/klinux/gocdnext-plugin-kustomize@v1
      cluster: staging
      with:
        path: deploy/overlays/staging
        action: validate

  - name: render to an artifact (no apply)
    description: >
      Use build when the rendered YAML is the output — for review
      pipelines that publish manifests rather than applying them.
    yaml: |
      uses: ghcr.io/klinux/gocdnext-plugin-kustomize@v1
      with:
        path: deploy/overlays/prod
        action: build
      artifacts:
        paths: [rendered.yaml]

  - name: prune dropped resources
    description: >
      Apply with prune so a manifest deleted from the kustomization gets
      cleaned up. The label selector is what `apply --prune` uses to know
      which existing resources to consider — set it via a commonLabels:
      block on every kustomization.
    yaml: |
      uses: ghcr.io/klinux/gocdnext-plugin-kustomize@v1
      cluster: prod
      with:
        path: deploy/overlays/prod
        prune: "true"
        prune_label: "app.kubernetes.io/managed-by=gocdnext"
