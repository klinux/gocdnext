name: gitleaks
category: security
description: >
  Secret scanner that catches accidentally-committed credentials,
  API keys, and tokens. Add at the front of a pipeline so leaks
  surface before they propagate to downstream jobs. Defaults to
  scanning the working tree (`dir` mode); `git` mode walks the
  full commit history for repo-lifetime audits.

inputs:
  path:
    required: false
    default: "."
    description: >
      Path under the workspace to scan. Defaults to the whole
      repo root; point at a subdir to narrow the scope on a
      monorepo.
  config:
    required: false
    description: >
      Path to a `gitleaks.toml` config (relative to the workspace).
      Empty = use the bundled default ruleset.
  format:
    required: false
    default: json
    description: >
      Report format — json, sarif, or csv.
  report:
    required: false
    description: >
      Path under the workspace to write the report to. Pair with
      `artifacts.optional:` to attach the report to the run.
  scan-mode:
    required: false
    default: dir
    description: >
      "dir" scans the current working tree (fast, checks what's
      checked out). "git" walks commit history (slower, catches
      secrets buried in old commits).
  exit-code:
    required: false
    default: "1"
    description: >
      Exit code when leaks are found. Set to "0" for advisory-
      only scans that attach a report but don't fail CI.
  verbose:
    required: false
    default: "true"
    description: >
      When "true", each finding is printed inline to the build
      log as it's discovered (file:line, rule, redacted secret).
      Set "false" to silence inline output — the report file
      (if `report:` is set) still gets the full details. Default
      on so operators don't have to download the JSON report to
      see what was flagged.
  redact:
    required: false
    default: "75"
    description: >
      Percentage of each secret's body to mask in the verbose
      inline output. 75 leaves prefix + suffix visible so the
      operator can identify the credential without leaving the
      key in plaintext in the build log stream. "0" disables
      masking (DANGEROUS — prints the secret); "100" fully masks.
  allowlist-paths:
    required: false
    description: >
      Comma- or whitespace-separated list of directory / path
      substrings to allowlist. Each entry becomes a `.*<path>.*`
      regex under `[allowlist].paths` in a runtime gitleaks
      config — substring match, so `docs/` covers `docs/`,
      `services/web/docs/`, etc. Useful to skip known-safe
      directories (docs with example tokens, test fixtures with
      fake creds) WITHOUT committing a `.gitleaks.toml` to the
      repo.
      Composition: combines with `config:` via gitleaks'
      `[extend].path` chain — the operator's config rules stay
      active, our allowlist paths are additive. Without `config:`,
      the plugin synthesizes a runtime config that explicitly
      keeps `[extend].useDefault = true` so the built-in
      gitleaks ruleset isn't accidentally disabled.
      Validation: charset restricted to `[a-zA-Z0-9/_.-]`. `..`
      and absolute paths rejected at parse time. Regex meta-
      chars not supported here — use a real `.gitleaks.toml`
      via `config:` for those.
      SAFETY NOTE: every path you allowlist is a place secrets
      can hide undetected. Real-world incidents include "fake"
      API keys in README examples that turned out to be live,
      and staging credentials in test fixtures that became the
      attack vector. Prefer narrow targets (`tests/fixtures/`)
      over broad ones (`tests/`); review the list periodically.

# Suppressing false positives
#
# The plugin runs upstream gitleaks unchanged, so all of gitleaks'
# native suppression mechanisms work as-is. Both files live in the
# repo, so they're versioned alongside the code and behave
# identically on a local `gitleaks detect` run.
#
#   1) .gitleaksignore at the repo root — line-level allowlist.
#      Format: `commit:file:rule:line`. Copy the "Fingerprint:"
#      line from a verbose finding directly:
#
#        abc1234:services/core/tests/fixtures/fake.py:aws-access-token:42
#
#   2) .gitleaks.toml + `config:` input — richer ruleset overrides.
#      Path-glob / regex allowlists, custom rules, or wholesale
#      rule disables:
#
#        [allowlist]
#        paths = [
#          '''.*tests/fixtures/.*''',
#          '''.*\.example$''',
#        ]
#        regexes = ['''GENERIC_FAKE_KEY=''']
#
#      Reference via `config: .gitleaks.toml` (workspace-relative).
#      Same `--config` flag the gitleaks CLI uses — a TOML that
#      works locally works in CI.
#
# Rule of thumb: .gitleaksignore for one-off "yes that's a test
# fixture"; .gitleaks.toml when the rule is "anything under tests/
# is allowed."

examples:
  - name: block PR on leak
    description: Default mode — scan the working tree, fail on any leak.
    yaml: |
      uses: ghcr.io/klinux/gocdnext-plugin-gitleaks@v1

  - name: advisory scan with report
    description: >
      Don't fail the build; attach the JSON report so operators
      can review findings without blocking merges.
    yaml: |
      uses: ghcr.io/klinux/gocdnext-plugin-gitleaks@v1
      with:
        format: json
        report: gitleaks-report.json
        exit-code: "0"
      artifacts:
        optional: [gitleaks-report.json]

  - name: with allowlist config
    description: >
      Point gitleaks at a project-managed `.gitleaks.toml` to
      whitelist test fixtures + example files. The TOML file
      lives in the repo so a local `gitleaks detect --config
      .gitleaks.toml` matches CI behaviour exactly.
    yaml: |
      uses: ghcr.io/klinux/gocdnext-plugin-gitleaks@v1
      with:
        config: .gitleaks.toml

  - name: skip docs + tests via inline allowlist
    description: >
      One-liner alternative to checking a `.gitleaks.toml` into
      the repo. Plugin synthesises a runtime config that extends
      gitleaks' built-in ruleset and adds the operator's paths
      to `[allowlist].paths`. Equivalent to maintaining the TOML
      manually, just keyed to the pipeline YAML instead of a
      tracked repo file. Combines with `config:` if both are set
      — runtime config chains the operator's via `[extend].path`.
    yaml: |
      uses: ghcr.io/klinux/gocdnext-plugin-gitleaks@v1
      with:
        allowlist-paths: docs/, tests/, __tests__/fixtures/
