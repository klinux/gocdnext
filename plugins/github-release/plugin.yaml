name: github-release
category: release
description: >
  Publish a GitHub release at the given tag. Wraps the `gh` CLI
  — operators pass inputs through `with:` without crafting curl
  calls. Auto-generates release notes from commit history when
  `notes` is empty and `generate-notes` stays true. Supports
  draft + pre-release flags, and uploads asset files the job
  produced (tarballs, binaries, etc.).

inputs:
  tag:
    required: true
    description: >
      Git tag to release (e.g. "v1.2.3"). The tag must already
      exist at the revision you want released — the plugin
      doesn't create the tag, pair with `gocdnext/tag` if you
      need that.
  repo:
    required: false
    description: >
      "owner/name". Defaults to the workspace's git remote —
      safe when the pipeline runs on the repo the release
      belongs to.
  title:
    required: false
    description: Release title. Defaults to the tag name.
  notes:
    required: false
    description: >
      Body text for the release. Empty + `generate-notes=true`
      = gh auto-generates from commit history since the previous
      tag. Explicit notes win when set.
  generate-notes:
    required: false
    default: "true"
    description: >
      When notes is empty and this is "true", gh auto-generates
      release notes. Set "false" to create a release with an
      empty body.
  draft:
    required: false
    default: "false"
    description: >
      "true" creates the release as a draft — only repo admins
      see it until someone publishes it.
  prerelease:
    required: false
    default: "false"
    description: >
      "true" marks the release as a pre-release (alpha/beta).
  assets:
    required: false
    description: >
      Comma- or newline-separated list of workspace-relative
      paths to upload as release assets. Globs (`bin/*.tar.gz`)
      expand via gh.
  token:
    required: true
    description: >
      GitHub token with `repo` scope. Pipe via the job's
      `secrets:` list so the plaintext never hits the log —
      gh reads it via GH_TOKEN rather than a CLI flag so it
      stays out of argv.

examples:
  - name: minimal release
    description: >
      Create a release at the tag just pushed; gh auto-generates
      notes from commits since the previous tag.
    yaml: |
      secrets:
        - GITHUB_TOKEN
      uses: gocdnext/github-release@v1
      with:
        tag: ${CI_GIT_TAG}
        token: ${{ GITHUB_TOKEN }}

  - name: release with binaries attached
    description: >
      Ship a cross-compiled binary tree as release assets.
      Operators commonly pair this with a preceding go build
      step that wrote files into `bin/`.
    yaml: |
      secrets:
        - GITHUB_TOKEN
      uses: gocdnext/github-release@v1
      with:
        tag: ${CI_GIT_TAG}
        title: ${CI_GIT_TAG}
        assets: |
          bin/app-linux-amd64.tar.gz
          bin/app-linux-arm64.tar.gz
          bin/app-darwin-arm64.tar.gz
        token: ${{ GITHUB_TOKEN }}
