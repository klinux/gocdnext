name: jdk-base
category: base-image
description: >
  Shared base image used by every gocdnext JVM plugin (gradle,
  maven, and future sbt/ant/kotlin-cli). Ships Temurin 11, 17,
  21, and 25 in parallel and a `select-jdk.sh` helper that maps
  `jdk: "<version>"` on the consuming plugin's step to
  `JAVA_HOME` + `PATH`. Not invoked directly by operators — list
  here so the plugin catalog stays a single source of truth for
  every published image.

inputs: {}

examples:
  - name: jdk-base is not a runnable plugin
    description: >
      Operators don't `uses:` this image directly. Reference the
      `gradle` or `maven` plugin and pass `jdk: "11"` (or 17,
      21, 25) to switch JDKs without changing the plugin tag.
    yaml: |
      uses: ghcr.io/klinux/gocdnext-plugin-gradle@v1
      with:
        command: test
        jdk: "11"             # selected by jdk-base's select-jdk.sh
