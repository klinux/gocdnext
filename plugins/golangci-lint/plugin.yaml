# Plugin manifest — consumed by the gocdnext server at startup to
# validate `with:` inputs before a run dispatches.
name: golangci-lint
category: lint
description: >
  Run golangci-lint against a Go module. Bundles the upstream
  v1.63 image; operators provide args + working-dir.

inputs:
  args:
    required: false
    default: "./..."
    description: >
      Args appended after `run`. Example: "--timeout 5m ./...".
  working-dir:
    required: false
    default: "."
    description: Directory under the workspace to cd into before running.
  timeout:
    required: false
    default: "5m"
    description: Value for --timeout. Default 5m.

examples:
  - name: lint a single module
    description: Lint the server module with the default 5m timeout.
    yaml: |
      uses: ghcr.io/klinux/gocdnext-plugin-golangci-lint@v1
      with:
        working-dir: server

  - name: lint multiple modules in one job
    description: >
      golangci-lint accepts multiple package patterns. The platform
      runs them serially in the same container — cheaper than three
      separate jobs when the lint is fast.
    yaml: |
      uses: ghcr.io/klinux/gocdnext-plugin-golangci-lint@v1
      with:
        args: ./server/... ./agent/... ./cli/...

  - name: cached analyzer + Go module cache
    description: >
      golangci-lint compiles every package + runs every analyzer on
      a cold cache — the first run on a fresh container takes 5–10
      minutes for a typical project. The plugin redirects
      GOMODCACHE, GOCACHE, and GOLANGCI_LINT_CACHE to workspace-
      local directories so the platform's `cache:` block can tar
      all three. Warm runs drop to seconds. Hash-keyed on go.sum so
      a dependency bump invalidates automatically; different
      branches sharing the same go.sum share the cache safely
      because the contents are content-addressable.
    yaml: |
      golangci:
        stage: lint
        uses: ghcr.io/klinux/gocdnext-plugin-golangci-lint@v1
        cache:
          - key: golangci-{{ hash "go.sum" }}
            paths: [.go-mod, .go-cache, .golangci-cache]
        with:
          args: ./...
