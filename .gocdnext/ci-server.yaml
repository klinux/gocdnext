# gocdnext server — test + build. Uses the gocdnext/go plugin so
# the toolchain (golang:1.25 + git + make) lives in one image
# instead of re-pinning it across every job. testcontainers-go
# (dbtest package) needs Docker access; `docker: true` mounts the
# host's docker.sock.
name: ci-server

when:
  event: [push, pull_request]

stages: [lint, test, build]

jobs:
  vet:
    stage: lint
    uses: gocdnext/go@v1
    with:
      working-dir: server
      command: vet ./...

  unit:
    stage: test
    uses: gocdnext/go@v1
    needs: [vet]
    docker: true
    with:
      working-dir: server
      command: test -race ./...

  compile:
    stage: build
    uses: gocdnext/go@v1
    needs: [unit]
    with:
      working-dir: server
      command: build -o ../bin/gocdnext-server ./cmd/gocdnext-server
    artifacts:
      paths: [bin/gocdnext-server]
