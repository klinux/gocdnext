# gocdnext server — test + build.
# Runs on every push and PR that touches main. Uses testcontainers
# (which pulls postgres:16-alpine on the fly), so the agent must
# have Docker access — the default agent runtime already does.
name: ci-server

materials:
  - git:
      url: https://github.com/klinux/gocdnext
      branch: main
      on: [push, pull_request]

stages: [lint, test, build]

variables:
  GO_VERSION: "1.25"

jobs:
  vet:
    stage: lint
    image: golang:1.25
    script:
      - cd server && go vet ./...

  unit:
    stage: test
    image: golang:1.25
    needs: [vet]
    # Race detector catches the same bugs the contributor guide
    # tells contributors to catch locally.
    script:
      - cd server && go test -race ./...

  compile:
    stage: build
    image: golang:1.25
    needs: [unit]
    script:
      - cd server && go build -o ../bin/gocdnext-server ./cmd/gocdnext-server
    artifacts:
      paths: [bin/gocdnext-server]
