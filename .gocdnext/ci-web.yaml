# gocdnext web (Next.js) — type-check, unit tests, production
# build. Every job uses the gocdnext/node plugin so the corepack +
# pnpm setup lives in one image instead of four identical shell
# scripts. Upstream to ci-server.test so the web bundle is only
# built after the server tests pass — we don't bake UI artefacts
# against a server revision that's known-broken.
name: ci-web

materials:
  - upstream:
      pipeline: ci-server
      stage: test
      status: success

stages: [install, lint, test, build]

jobs:
  deps:
    stage: install
    uses: ghcr.io/klinux/gocdnext-plugin-node@v1
    with:
      working-dir: web
      command: install --frozen-lockfile
    # Cache node_modules across runs: when pnpm-lock.yaml is
    # unchanged, `install --frozen-lockfile` against a pre-
    # populated tree is a near-instant verify. A lockfile change
    # makes pnpm error loudly — at which point a human bumps the
    # key suffix (cache key templating is on the roadmap; see the
    # eviction/invalidation tracking doc).
    cache:
      - key: web-node-modules-v1
        paths: [web/node_modules/]
    artifacts:
      paths: [web/node_modules/]

  typecheck:
    stage: lint
    uses: ghcr.io/klinux/gocdnext-plugin-node@v1
    needs: [deps]
    # needs_artifacts because `needs:` only orders jobs — the
    # downstream job starts in a fresh container and gets
    # node_modules back via the tar from deps.
    needs_artifacts:
      - from_job: deps
        paths: [web/node_modules/]
    with:
      working-dir: web
      command: exec tsc --noEmit

  unit:
    stage: test
    uses: ghcr.io/klinux/gocdnext-plugin-node@v1
    needs: [deps]
    needs_artifacts:
      - from_job: deps
        paths: [web/node_modules/]
    with:
      working-dir: web
      command: test --run

  bundle:
    stage: build
    uses: ghcr.io/klinux/gocdnext-plugin-node@v1
    needs: [typecheck, unit]
    needs_artifacts:
      - from_job: deps
        paths: [web/node_modules/]
    # GOCDNEXT_API_URL is only needed at runtime; build uses a
    # placeholder so the bundle still generates deterministically.
    # Job variables layer on top of PLUGIN_* env in the runner.
    variables:
      GOCDNEXT_API_URL: http://localhost:8153
    with:
      working-dir: web
      command: build
    artifacts:
      paths: [web/.next/standalone/, web/.next/static/]
