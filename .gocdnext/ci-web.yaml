# gocdnext web (Next.js) — type-check, unit tests, production
# build. Migrated to plugin-node@v2 in v0.4.39: the new contract
# auto-installs dependencies (no more explicit `command: install
# --frozen-lockfile`) and treats `command:` as a shell expression
# (no more pnpm prefix). Upstream to ci-server.test so the web
# bundle is only built after the server tests pass — we don't bake
# UI artefacts against a server revision that's known-broken.
name: ci-web

materials:
  - upstream:
      pipeline: ci-server
      stage: test
      status: success

stages: [install, lint, test, build]

jobs:
  deps:
    stage: install
    uses: ghcr.io/klinux/gocdnext-plugin-node@v2
    with:
      working-dir: web
      # v2: command:"" + install:true (default) = install-only run.
      # The plugin invokes pnpm install --frozen-lockfile automatically.
    cache:
      # Hash-keyed cache (v0.4.37+): pnpm-lock.yaml change → fresh
      # cache, no manual key bump required. Pre-v0.4.37 fallback was
      # a literal `web-node-modules-v1` key bumped by hand on every
      # dep update — now obsolete.
      - key: web-pnpm-store-{{ hash "web/pnpm-lock.yaml" }}
        paths: [web/.pnpm-store]
    artifacts:
      paths: [web/node_modules]

  typecheck:
    stage: lint
    uses: ghcr.io/klinux/gocdnext-plugin-node@v2
    needs: [deps]
    needs_artifacts:
      - from_job: deps
        paths: [web/node_modules]
    with:
      working-dir: web
      install: false              # reuse the artifact, skip resolve
      command: pnpm exec tsc --noEmit

  unit:
    stage: test
    uses: ghcr.io/klinux/gocdnext-plugin-node@v2
    needs: [deps]
    needs_artifacts:
      - from_job: deps
        paths: [web/node_modules]
    with:
      working-dir: web
      install: false
      command: pnpm test --run

  bundle:
    stage: build
    uses: ghcr.io/klinux/gocdnext-plugin-node@v2
    needs: [typecheck, unit]
    needs_artifacts:
      - from_job: deps
        paths: [web/node_modules]
    # GOCDNEXT_API_URL is only needed at runtime; build uses a
    # placeholder so the bundle still generates deterministically.
    # Job variables layer on top of PLUGIN_* env in the runner.
    variables:
      GOCDNEXT_API_URL: http://localhost:8153
    with:
      working-dir: web
      install: false
      command: pnpm build
    artifacts:
      paths: [web/.next/standalone/, web/.next/static/]
