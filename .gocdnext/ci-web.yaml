# gocdnext web (Next.js) — type-check, unit tests, production
# build. Now upstream to ci-server.test so the web bundle is only
# built after the server tests pass — we don't bake UI artefacts
# against a server revision that's known-broken. Triggering via
# upstream also lets the VSM draw a real "ci-server → ci-web"
# edge so the dependency is visible instead of implicit.
name: ci-web

materials:
  - upstream:
      pipeline: ci-server
      stage: test
      status: success

stages: [install, lint, test, build]

variables:
  NODE_VERSION: "22"
  PNPM_VERSION: "9"

jobs:
  deps:
    stage: install
    image: node:22-alpine
    script:
      # pnpm is fetched via corepack; frozen-lockfile makes CI
      # fail rather than regenerate the lockfile on drift.
      - corepack enable
      - cd web && pnpm install --frozen-lockfile
    artifacts:
      paths: [web/node_modules/]

  typecheck:
    stage: lint
    image: node:22-alpine
    needs: [deps]
    script:
      - corepack enable
      - cd web && pnpm exec tsc --noEmit

  unit:
    stage: test
    image: node:22-alpine
    needs: [deps]
    script:
      - corepack enable
      - cd web && pnpm test --run

  bundle:
    stage: build
    image: node:22-alpine
    needs: [typecheck, unit]
    script:
      - corepack enable
      # GOCDNEXT_API_URL is only needed at runtime; build uses a
      # placeholder so the bundle still generates deterministically.
      - cd web && GOCDNEXT_API_URL=http://localhost:8153 pnpm build
    artifacts:
      paths: [web/.next/standalone/, web/.next/static/]
