# gocdnext agent — test + build. Shares the gocdnext/go plugin
# with the server + cli pipelines; kept separate so an agent-only
# PR doesn't have to wait on the server matrix.
name: ci-agent

when:
  event: [push, pull_request]

stages: [lint, test, build]

jobs:
  vet:
    stage: lint
    uses: gocdnext/go@v1
    with:
      working-dir: agent
      command: vet ./...

  unit:
    stage: test
    uses: gocdnext/go@v1
    needs: [vet]
    with:
      working-dir: agent
      command: test -race ./...

  compile:
    stage: build
    uses: gocdnext/go@v1
    needs: [unit]
    with:
      working-dir: agent
      command: build -o ../bin/gocdnext-agent ./cmd/gocdnext-agent
    artifacts:
      paths: [bin/gocdnext-agent]
