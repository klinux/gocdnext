# gocdnext CLI — test + build. cli/internal/admin tests use
# testcontainers (Postgres) so docker: true is needed in the
# unit stage just like the server pipeline.
name: ci-cli

when:
  event: [push, pull_request]

stages: [lint, test, build]

jobs:
  vet:
    stage: lint
    uses: gocdnext/go@v1
    with:
      working-dir: cli
      command: vet ./...

  unit:
    stage: test
    uses: gocdnext/go@v1
    needs: [vet]
    docker: true
    with:
      working-dir: cli
      command: test -race ./...

  compile:
    stage: build
    uses: gocdnext/go@v1
    needs: [unit]
    with:
      working-dir: cli
      command: build -o ../bin/gocdnext ./cmd/gocdnext
    artifacts:
      paths: [bin/gocdnext]
