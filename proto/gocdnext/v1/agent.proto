syntax = "proto3";

package gocdnext.v1;

option go_package = "github.com/gocdnext/gocdnext/proto/gen/go/gocdnext/v1;gocdnextv1";

import "google/protobuf/timestamp.proto";
import "gocdnext/v1/common.proto";

// AgentService — contrato bidirecional server ↔ agent.
// O agent INICIA a conexão (NAT-friendly) e mantém um stream aberto.
service AgentService {
  // Register: handshake inicial. Agent se identifica, server devolve session.
  rpc Register(RegisterRequest) returns (RegisterResponse);

  // Connect: stream bidirecional de longa duração.
  //   server → agent: despacho de job, cancelamento
  //   agent → server: heartbeat, progresso de job, logs, resultado
  rpc Connect(stream AgentMessage) returns (stream ServerMessage);

  // RequestCacheGet / RequestCachePut / MarkCacheReady: trio que
  // alimenta o ciclo de vida dos caches persistentes por projeto.
  // Agent chama Get ANTES das tasks (miss = segue vida sem cache
  // pré-populado); chama Put depois do sucesso pra subir o tar e
  // MarkCacheReady pra marcar visível ao próximo run.
  rpc RequestCacheGet(RequestCacheGetRequest)
      returns (RequestCacheGetResponse);
  rpc RequestCachePut(RequestCachePutRequest)
      returns (RequestCachePutResponse);
  rpc MarkCacheReady(MarkCacheReadyRequest)
      returns (MarkCacheReadyResponse);

  // RequestArtifactUpload: agent pede URLs assinadas para subir N
  // artefatos de um job. Servidor cria rows pendentes em `artifacts` e
  // devolve um ticket por path. Agent faz PUT HTTP em cada URL; server
  // confirma via HEAD quando receber o JobResult.
  rpc RequestArtifactUpload(RequestArtifactUploadRequest)
      returns (RequestArtifactUploadResponse);
}

message RegisterRequest {
  string   agent_id    = 1;
  string   token       = 2;
  string   version     = 3;
  string   os          = 4;
  string   arch        = 5;
  repeated string tags = 6;  // "linux", "docker", "gpu", labels custom
  int32    capacity    = 7;  // jobs paralelos
  // engine is the agent's configured execution engine name —
  // "kubernetes" / "docker" / "shell". Used server-side to filter
  // CleanupRunServices broadcasts to k8s-capable agents only
  // (Docker/Shell agents would no-op the cleanup, and broadcasting
  // to them at scale wastes wire + log noise). Empty string is
  // treated as "unknown engine" — server includes the agent in
  // the broadcast as a defensive fallback.
  string   engine      = 8;
}

message RegisterResponse {
  string session_id = 1;
  int32  heartbeat_seconds = 2;
}

// ── Mensagens AGENT → SERVER ─────────────────────────────────────────
message AgentMessage {
  oneof kind {
    Heartbeat                 heartbeat                    = 1;
    JobProgress               progress                     = 2;
    LogLine                   log                          = 3;
    JobResult                 result                       = 4;
    TestResultBatch           test_results                 = 5;
    CleanupRunServicesResult  cleanup_run_services_result  = 6;
    ServiceLifecycle          service_lifecycle            = 7;
  }
}

// ServiceLifecycle reports the agent-observable state transitions
// of a pipeline-level service Pod: starting (Pod create issued),
// ready (Pod phase=Running), stopped (Pod deleted), or failed
// (Pod never reached Running within the agent's StartupTimeout).
//
// The server upserts these into `service_runs` (keyed by
// run_id+name) so the UI can render services as nodes alongside
// jobs with the right status + duration. Idempotent on the wire:
// re-sending the same status is a no-op, lets the agent retry
// freely after a stream reconnect without bookkeeping its own
// delivery state.
//
// `error` is populated only when status=failed. `pod_name` lets
// the server / UI correlate to the actual Pod log stream (a
// future "service logs" follow-up consumes it).
message ServiceLifecycle {
  string                    run_id     = 1;
  string                    name       = 2;   // service name from YAML
  string                    image      = 3;
  string                    pod_name   = 4;
  string                    status     = 5;   // starting|ready|stopped|failed
  string                    error      = 6;
  google.protobuf.Timestamp at         = 7;
}

// CleanupRunServicesResult is the per-agent ack for a server-issued
// CleanupRunServices broadcast. Sent AFTER the agent's engine call
// returns — best-effort: if the stream is disconnected at ack
// time, the ack is dropped (the engine call's local log is the
// fallback). The server logs every ack so an operator can grep
// "which agent deleted what" when investigating leak suspicions.
//
// `deleted` is the count returned by Engine.CleanupRunServices —
// 0 is legitimate (no labeled pods in this agent's namespace,
// either because it didn't run this run OR because a sibling
// agent's broadcast won the race). `error_message` is non-empty
// only when the engine call returned an error; the engine's local
// "cleanup run services failed" log is still emitted as well, so
// having BOTH the agent log and the server log on the same
// failure is intentional belt-and-braces.
//
// `engine` echoes the agent's configured engine name (matches the
// value sent in RegisterRequest.engine). Useful in mixed-engine
// fleets to confirm the broadcast filter is doing its job — a
// Docker agent's ack with deleted=0 hitting this surface would
// signal a filter regression upstream.
message CleanupRunServicesResult {
  string run_id        = 1;
  int32  deleted       = 2;
  string error_message = 3;
  string engine        = 4;
}

message Heartbeat {
  google.protobuf.Timestamp at = 1;
  int32 running_jobs = 2;
}

message JobProgress {
  string    run_id  = 1;
  string    job_id  = 2;
  RunStatus status  = 3;
  string    step    = 4;
}

message LogLine {
  string run_id = 1;
  string job_id = 2;
  int64  seq    = 3;
  google.protobuf.Timestamp at = 4;
  string stream = 5; // "stdout" | "stderr"
  string text   = 6;
}

message JobResult {
  string    run_id   = 1;
  string    job_id   = 2;
  RunStatus status   = 3;
  int32     exit_code = 4;
  string    error    = 5;
  repeated ArtifactRef artifacts = 6;
  // Structured key/value outputs the job produced (issue #10).
  // Keys are the YAML `outputs:` ALIASES the operator declared,
  // values are what the plugin wrote to the file referenced by
  // the GOCDNEXT_OUTPUT_FILE env var (absolute path the engine
  // chooses at RunScript time; host path for Shell, container
  // path for Docker/K8s containerized).
  //
  // Empty map ONLY when the job declared no `outputs:` block.
  // Declared outputs are a contract — if the job declared
  // outputs: but the plugin didn't write each declared alias,
  // the official agent FAILS the job before this message is
  // sent, with a message that cites the missing alias.
  //
  // Soft-capped at 64KB total (sum of keys + values) on both the
  // agent and server side to keep gRPC payloads and the persisted
  // JSONB row reasonable. A misbehaving plugin that exceeds the
  // cap fails the job loud, not silently truncated. Server-side
  // validation also rejects non-UTF-8 values, aliases that fail
  // the parser's regex, and > 64 entries.
  //
  // Custom agent implementations MUST: (1) honour the declared
  // outputs as a contract (fail the job on missing); (2) write
  // alias-keyed values here (not env-var-name-keyed — the agent
  // is responsible for the rekey from $GOCDNEXT_OUTPUT_FILE's
  // KEY=value lines to the YAML alias map).
  map<string, string> outputs = 7;
}

message ArtifactRef {
  string path           = 1;
  string storage_key    = 2; // chave opaca no backend (devolvida pelo ticket)
  int64  size           = 3;
  string content_sha256 = 4; // hex; agent calcula ao tar+stream
}

// TestResult is one parsed test case from a JUnit/xUnit XML
// report. Agent parses the XML locally (no XML on the wire) and
// ships a flat list per job. `status` is one of
// "passed" / "failed" / "skipped" / "errored" — server clamps
// anything else to "errored" so a weird upstream report never
// corrupts the stored state.
message TestResult {
  string suite            = 1;
  string classname        = 2;
  string name             = 3;
  string status           = 4;
  int64  duration_millis  = 5;
  string failure_type     = 6;
  string failure_message  = 7;
  string failure_detail   = 8;
  string system_out       = 9;
  string system_err       = 10;
}

// TestResultBatch bundles every case parsed from a job's test
// reports into a single message. Sent BEFORE JobResult so the
// server can persist results before the job's terminal cascade
// fires (keeps the "tests for this run" query consistent with
// `run status = terminal`).
message TestResultBatch {
  string              run_id  = 1;
  string              job_id  = 2;
  repeated TestResult results = 3;
}

// RequestCacheGet asks the server for a signed download of a
// previously-uploaded cache blob. When the cache doesn't exist
// yet (first run for this key) or is still pending an upload,
// `found` is false and the agent continues without a pre-
// populated directory.
message RequestCacheGetRequest {
  string session_id = 1;
  string run_id     = 2;
  string job_id     = 3;
  string key        = 4;
}
message RequestCacheGetResponse {
  bool   found          = 1;
  string get_url        = 2;
  int64  size_bytes     = 3;
  string content_sha256 = 4;
  google.protobuf.Timestamp expires_at = 5;
}

// RequestCachePut asks the server to mint a signed PUT URL the
// agent uploads the cache tarball at. `cache_id` is the opaque
// token the agent feeds back to MarkCacheReady after the upload
// lands so the server flips the row from pending to ready.
message RequestCachePutRequest {
  string session_id = 1;
  string run_id     = 2;
  string job_id     = 3;
  string key        = 4;
}
message RequestCachePutResponse {
  string cache_id    = 1;
  string put_url     = 2;
  string storage_key = 3;
  google.protobuf.Timestamp expires_at = 4;
}

// MarkCacheReady flips a pending cache row to ready with the
// finalised size + sha. Called after the agent confirms the PUT
// succeeded end-to-end — before this RPC lands, any concurrent
// GET treats the cache as missing to avoid handing out partial
// data.
message MarkCacheReadyRequest {
  string session_id     = 1;
  string cache_id       = 2;
  int64  size_bytes     = 3;
  string content_sha256 = 4;
}
message MarkCacheReadyResponse {}

message RequestArtifactUploadRequest {
  string          session_id = 1; // autentica o agent (emitido no Register)
  string          run_id     = 2;
  string          job_id     = 3;
  repeated string paths      = 4; // paths declarados no YAML job.artifacts
}

message RequestArtifactUploadResponse {
  repeated ArtifactUploadTicket tickets = 1;
}

// ArtifactUploadTicket é o contrato opaco que o agent usa para subir um
// único artefato. `storage_key` é o que o agent anexa no JobResult;
// `put_url` é a URL assinada (filesystem backend: HTTP do próprio server;
// S3/GCS: URL do cloud). `expires_at` é orientativo — se o job demorar
// mais que a janela, agent pede novo ticket.
message ArtifactUploadTicket {
  string                    path       = 1;
  string                    storage_key = 2;
  string                    put_url    = 3;
  google.protobuf.Timestamp expires_at = 4;
}

// ── Mensagens SERVER → AGENT ─────────────────────────────────────────
message ServerMessage {
  oneof kind {
    JobAssignment       assign                = 1;
    CancelJob           cancel                = 2;
    Pong                pong                  = 3;
    CleanupRunServices  cleanup_run_services  = 4;
  }
}

// CleanupRunServices tells the agent to tear down every service pod
// (k8s) labelled with the given run_id. Sent once when the run
// reaches terminal — the cascade in CompleteJob (and the manual
// Cancel path) BROADCASTS this to a wide target set: every agent
// that ran a job of the run (filtered by SQL to engine='kubernetes'
// or legacy-unknown), UNION every currently-connected k8s agent
// (in-memory filtered by Session.Engine). The engine filter is
// load-bearing: without it a Docker/Shell agent that participated
// in a mixed-engine run would receive the cleanup, return
// success-with-0-deleted, and let the server's ok-counter
// mistakenly report a successful cleanup while disconnected k8s
// agents' pods leak.
//
// When EVERY targeted dispatch fails — no k8s agents online at
// terminal — the pods stay until an operator runs `kubectl delete
// pods -l app.kubernetes.io/managed-by=gocdnext-agent,gocdnext.io/run-id=<id>`
// manually. Documented limitation.
//
// Idempotent: each agent's label-selector delete against an
// already-cleaned run is a successful no-op (NotFound on a
// concurrent race is treated as success).
message CleanupRunServices {
  string run_id = 1;
}

message JobAssignment {
  string run_id  = 1;
  string job_id  = 2;
  string name    = 3;
  string image   = 4;
  repeated TaskSpec tasks = 5;
  map<string, string> env = 6;
  repeated MaterialCheckout checkouts = 7;
  string workspace = 8;
  int32  timeout_seconds = 9;
  // Raw secret values the runner must replace with *** in every LogLine
  // before it's streamed back. Kept separate from env so a future change
  // can mask values that aren't env-derived (e.g. Bearer tokens the
  // runtime injects into Authorization headers).
  repeated string log_masks = 10;
  // Artifact paths declared in the job's YAML `artifacts.paths:`. The
  // runner tars each path after tasks succeed, calls
  // RequestArtifactUpload to get signed PUT URLs, and reports what
  // uploaded back in JobResult.artifacts. Upload failure on any
  // required path fails the job — the YAML declared these as part
  // of the build's contract, so a missing file means the build
  // didn't deliver what it promised.
  repeated string artifact_paths = 11;
  // Artifacts this job depends on (`needs_artifacts:` in YAML). Agent
  // downloads + untars each one into `dest` (relative to workspace)
  // before running the first task. Failure to download any dep fails
  // the job before any user code runs.
  repeated ArtifactDownload artifact_downloads = 12;
  // Best-effort artifact paths from YAML `artifacts.optional:` — the
  // runner attempts to upload each but only logs on failure instead
  // of failing the job. Use for logs, coverage reports, screenshots
  // — anything where "nice to have" beats "fail the build". Kept
  // separate from artifact_paths so the runner can enforce strict
  // semantics on the required list without per-entry flags on the
  // wire.
  repeated string optional_artifact_paths = 13;
  // When true the runner must expose a usable Docker API to the
  // script — via a mounted /var/run/docker.sock (Shell/Docker
  // engines) or a DinD sidecar (Kubernetes engine). Set by the
  // YAML `docker: true` flag on a job that needs to spawn
  // containers itself (testcontainers, docker compose, buildx).
  // Engines that can't honour this return an error before running
  // the script — the user asked for capability A, running without
  // it would surprise them silently.
  bool docker = 14;
  // Pipeline-level sidecar services (postgres, redis, localstack…)
  // the agent brings up BEFORE tasks run and tears down when the
  // job ends. Jobs reach a service by `name` on a job-scoped
  // docker network the agent provisions per assignment. Empty
  // list = no sidecars, skip the network plumbing entirely.
  repeated ServiceSpec services = 15;
  // Cache entries declared on this job. Agent calls
  // RequestCacheGet for each before tasks (silent miss on first
  // run) and RequestCachePut + MarkCacheReady for each after a
  // successful run. Empty list = no cache plumbing.
  repeated CacheEntry caches = 16;
  // Glob patterns the agent scans after tasks complete, parses
  // as JUnit XML, and ships back as a TestResultBatch. Empty =
  // no test reporting for this job. Globs are workspace-relative;
  // no match is a silent no-op (the job may have legitimately
  // produced nothing, e.g. when tests were skipped entirely).
  repeated string test_reports = 17;
  // Resources is the per-job compute envelope the engine should
  // request from the runtime. Strings carry k8s quantity format
  // ("100m", "256Mi"); empty fields fall through to engine defaults.
  // Engines without a notion of resources (Shell) ignore the field
  // entirely; the scheduler still validates against the runner
  // profile cap at apply time, so by the time this lands on the
  // wire it has been clamped.
  ResourceRequirements resources = 18;
  // Profile is the resolved runner profile name the scheduler
  // matched the job to. Carried here only so the agent's logs +
  // metrics can label the dispatch — the scheduler's tag-matching
  // already enforced the constraint upstream.
  string profile = 19;
  // Outputs declared in the job's YAML `outputs:` block — map of
  // alias → plugin env-var name written to GOCDNEXT_OUTPUT_FILE.
  // The agent uses this to filter+rekey the parsed output file
  // before shipping JobResult.outputs (alias → value). Empty map
  // means the job declared no outputs; the agent skips reading
  // GOCDNEXT_OUTPUT_FILE entirely on that path. See issue #10.
  map<string, string> outputs = 20;
  // NodeSelector pins the job pod to nodes carrying these labels
  // (k8s `nodeSelector`). Resolved server-side from the runner
  // profile's node_selector and shipped here so the agent
  // engine doesn't need to look up profile state itself. Empty
  // map = no profile-supplied restriction; the agent-level
  // nodeSelector (set on the StatefulSet) still applies.
  // Profile values WIN on key collisions when merged with the
  // agent-level set — profile is more specific than agent default.
  // Honoured by the Kubernetes engine only; Shell + Docker ignore
  // the field entirely.
  map<string, string> node_selector = 21;
  // Tolerations let the job pod schedule on tainted nodes (k8s
  // `tolerations`). Resolved server-side from the runner profile,
  // already validated + normalised (empty operator becomes Equal,
  // value/key shapes match k8svalidation rules) so the agent
  // engine can drop them straight into the pod spec.
  // APPENDED to the agent-level tolerations list — kubelet
  // ignores duplicates so we don't bother deduping on the agent.
  // Honoured by the Kubernetes engine only.
  repeated Toleration tolerations = 22;
}

// Toleration mirrors corev1.Toleration with concrete strings so
// the wire shape is API-stable and decoupled from k8s versions.
// Identical semantics to store.Toleration (server domain type);
// see scheduling_validation.go for the validation rules applied
// before this lands on the wire.
message Toleration {
  string key = 1;
  // Operator: "Equal" or "Exists". Server normalises empty to
  // "Equal" before shipping, so the wire always carries the
  // explicit form.
  string operator = 2;
  string value = 3;
  // Effect: "" (any), "NoSchedule", "PreferNoSchedule", "NoExecute".
  string effect = 4;
  // TolerationSeconds: only valid with effect="NoExecute". A
  // nil/absent value (use HasTolerationSeconds via google.protobuf
  // semantics through the optional keyword) means "tolerate
  // forever"; 0 evicts immediately. Server validates >= 0.
  optional int64 toleration_seconds = 5;
}

// ResourceRequirements mirrors the subset of corev1.ResourceList the
// engines honour: cpu + memory, requests + limits. Strings are the
// raw quantity literal, kept verbatim to round-trip through the
// admin UI without re-encoding.
message ResourceRequirements {
  string cpu_request    = 1;
  string cpu_limit      = 2;
  string memory_request = 3;
  string memory_limit   = 4;
}

// CacheEntry on the wire mirrors parser.CacheSpec — the key the
// server indexes by and the workspace-relative paths the agent
// tars up. Renamed from `CacheSpec` to avoid collision with the
// existing Kubernetes-style name in future proto evolution;
// the domain-layer name stays `CacheSpec` where the overlap
// doesn't matter.
message CacheEntry {
  string key               = 1;
  repeated string paths    = 2;
  // Pre-signed cache GET URL + sha + found flag. Populated by the
  // AGENT (not the server) at dispatch time when the job runs in
  // isolated workspace mode AND the cache key is literal (no
  // `{{ hash }}` token). Init container reads these to fetch via
  // HTTP without a gRPC session. Empty in shared mode (agent does
  // the round-trip on-demand) and for templated keys in isolated
  // mode (warning emitted; cache skipped).
  string fetch_url         = 3;
  string fetch_sha256      = 4;
  bool   fetch_found       = 5;
}

// ServiceSpec is the wire shape for a pipeline-level service. The
// agent's docker engine translates each into a container on a
// per-job bridge network with `name` as the DNS alias. `command`,
// when set, overrides the image's default ENTRYPOINT/CMD — matches
// how GitLab CI / Woodpecker expose the same knob.
message ServiceSpec {
  string name                = 1;
  string image               = 2;
  map<string, string> env    = 3;
  repeated string command    = 4;
}

message ArtifactDownload {
  string path           = 1; // original YAML path of the source artifact
  string storage_key    = 2; // opaque key at the backend (for logs)
  string get_url        = 3; // signed GET URL
  string dest           = 4; // destination dir relative to workspace
  string content_sha256 = 5; // expected hex sha for verification
  string from_job       = 6; // upstream job name (for logs)
}

message TaskSpec {
  oneof kind {
    string      script = 1;
    PluginSpec  plugin = 2;
  }
}

message PluginSpec {
  string              image    = 1;
  map<string, string> settings = 2; // vira PLUGIN_* env no container
}

message MaterialCheckout {
  string material_id = 1;
  string url         = 2;
  string revision    = 3;
  string branch      = 4;
  string target_dir  = 5;
  string secret_ref  = 6;
}

message CancelJob {
  string run_id = 1;
  string job_id = 2;
  string reason = 3;
}

message Pong {
  google.protobuf.Timestamp at = 1;
}
