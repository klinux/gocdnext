syntax = "proto3";

package gocdnext.v1;

option go_package = "github.com/gocdnext/gocdnext/proto/gen/go/gocdnext/v1;gocdnextv1";

import "google/protobuf/timestamp.proto";
import "gocdnext/v1/common.proto";

// AgentService — contrato bidirecional server ↔ agent.
// O agent INICIA a conexão (NAT-friendly) e mantém um stream aberto.
service AgentService {
  // Register: handshake inicial. Agent se identifica, server devolve session.
  rpc Register(RegisterRequest) returns (RegisterResponse);

  // Connect: stream bidirecional de longa duração.
  //   server → agent: despacho de job, cancelamento
  //   agent → server: heartbeat, progresso de job, logs, resultado
  rpc Connect(stream AgentMessage) returns (stream ServerMessage);

  // RequestCacheGet / RequestCachePut / MarkCacheReady: trio que
  // alimenta o ciclo de vida dos caches persistentes por projeto.
  // Agent chama Get ANTES das tasks (miss = segue vida sem cache
  // pré-populado); chama Put depois do sucesso pra subir o tar e
  // MarkCacheReady pra marcar visível ao próximo run.
  rpc RequestCacheGet(RequestCacheGetRequest)
      returns (RequestCacheGetResponse);
  rpc RequestCachePut(RequestCachePutRequest)
      returns (RequestCachePutResponse);
  rpc MarkCacheReady(MarkCacheReadyRequest)
      returns (MarkCacheReadyResponse);

  // RequestArtifactUpload: agent pede URLs assinadas para subir N
  // artefatos de um job. Servidor cria rows pendentes em `artifacts` e
  // devolve um ticket por path. Agent faz PUT HTTP em cada URL; server
  // confirma via HEAD quando receber o JobResult.
  rpc RequestArtifactUpload(RequestArtifactUploadRequest)
      returns (RequestArtifactUploadResponse);
}

message RegisterRequest {
  string   agent_id    = 1;
  string   token       = 2;
  string   version     = 3;
  string   os          = 4;
  string   arch        = 5;
  repeated string tags = 6;  // "linux", "docker", "gpu", labels custom
  int32    capacity    = 7;  // jobs paralelos
}

message RegisterResponse {
  string session_id = 1;
  int32  heartbeat_seconds = 2;
}

// ── Mensagens AGENT → SERVER ─────────────────────────────────────────
message AgentMessage {
  oneof kind {
    Heartbeat         heartbeat      = 1;
    JobProgress       progress       = 2;
    LogLine           log            = 3;
    JobResult         result         = 4;
    TestResultBatch   test_results   = 5;
  }
}

message Heartbeat {
  google.protobuf.Timestamp at = 1;
  int32 running_jobs = 2;
}

message JobProgress {
  string    run_id  = 1;
  string    job_id  = 2;
  RunStatus status  = 3;
  string    step    = 4;
}

message LogLine {
  string run_id = 1;
  string job_id = 2;
  int64  seq    = 3;
  google.protobuf.Timestamp at = 4;
  string stream = 5; // "stdout" | "stderr"
  string text   = 6;
}

message JobResult {
  string    run_id   = 1;
  string    job_id   = 2;
  RunStatus status   = 3;
  int32     exit_code = 4;
  string    error    = 5;
  repeated ArtifactRef artifacts = 6;
}

message ArtifactRef {
  string path           = 1;
  string storage_key    = 2; // chave opaca no backend (devolvida pelo ticket)
  int64  size           = 3;
  string content_sha256 = 4; // hex; agent calcula ao tar+stream
}

// TestResult is one parsed test case from a JUnit/xUnit XML
// report. Agent parses the XML locally (no XML on the wire) and
// ships a flat list per job. `status` is one of
// "passed" / "failed" / "skipped" / "errored" — server clamps
// anything else to "errored" so a weird upstream report never
// corrupts the stored state.
message TestResult {
  string suite            = 1;
  string classname        = 2;
  string name             = 3;
  string status           = 4;
  int64  duration_millis  = 5;
  string failure_type     = 6;
  string failure_message  = 7;
  string failure_detail   = 8;
  string system_out       = 9;
  string system_err       = 10;
}

// TestResultBatch bundles every case parsed from a job's test
// reports into a single message. Sent BEFORE JobResult so the
// server can persist results before the job's terminal cascade
// fires (keeps the "tests for this run" query consistent with
// `run status = terminal`).
message TestResultBatch {
  string              run_id  = 1;
  string              job_id  = 2;
  repeated TestResult results = 3;
}

// RequestCacheGet asks the server for a signed download of a
// previously-uploaded cache blob. When the cache doesn't exist
// yet (first run for this key) or is still pending an upload,
// `found` is false and the agent continues without a pre-
// populated directory.
message RequestCacheGetRequest {
  string session_id = 1;
  string run_id     = 2;
  string job_id     = 3;
  string key        = 4;
}
message RequestCacheGetResponse {
  bool   found          = 1;
  string get_url        = 2;
  int64  size_bytes     = 3;
  string content_sha256 = 4;
  google.protobuf.Timestamp expires_at = 5;
}

// RequestCachePut asks the server to mint a signed PUT URL the
// agent uploads the cache tarball at. `cache_id` is the opaque
// token the agent feeds back to MarkCacheReady after the upload
// lands so the server flips the row from pending to ready.
message RequestCachePutRequest {
  string session_id = 1;
  string run_id     = 2;
  string job_id     = 3;
  string key        = 4;
}
message RequestCachePutResponse {
  string cache_id    = 1;
  string put_url     = 2;
  string storage_key = 3;
  google.protobuf.Timestamp expires_at = 4;
}

// MarkCacheReady flips a pending cache row to ready with the
// finalised size + sha. Called after the agent confirms the PUT
// succeeded end-to-end — before this RPC lands, any concurrent
// GET treats the cache as missing to avoid handing out partial
// data.
message MarkCacheReadyRequest {
  string session_id     = 1;
  string cache_id       = 2;
  int64  size_bytes     = 3;
  string content_sha256 = 4;
}
message MarkCacheReadyResponse {}

message RequestArtifactUploadRequest {
  string          session_id = 1; // autentica o agent (emitido no Register)
  string          run_id     = 2;
  string          job_id     = 3;
  repeated string paths      = 4; // paths declarados no YAML job.artifacts
}

message RequestArtifactUploadResponse {
  repeated ArtifactUploadTicket tickets = 1;
}

// ArtifactUploadTicket é o contrato opaco que o agent usa para subir um
// único artefato. `storage_key` é o que o agent anexa no JobResult;
// `put_url` é a URL assinada (filesystem backend: HTTP do próprio server;
// S3/GCS: URL do cloud). `expires_at` é orientativo — se o job demorar
// mais que a janela, agent pede novo ticket.
message ArtifactUploadTicket {
  string                    path       = 1;
  string                    storage_key = 2;
  string                    put_url    = 3;
  google.protobuf.Timestamp expires_at = 4;
}

// ── Mensagens SERVER → AGENT ─────────────────────────────────────────
message ServerMessage {
  oneof kind {
    JobAssignment assign = 1;
    CancelJob     cancel = 2;
    Pong          pong   = 3;
  }
}

message JobAssignment {
  string run_id  = 1;
  string job_id  = 2;
  string name    = 3;
  string image   = 4;
  repeated TaskSpec tasks = 5;
  map<string, string> env = 6;
  repeated MaterialCheckout checkouts = 7;
  string workspace = 8;
  int32  timeout_seconds = 9;
  // Raw secret values the runner must replace with *** in every LogLine
  // before it's streamed back. Kept separate from env so a future change
  // can mask values that aren't env-derived (e.g. Bearer tokens the
  // runtime injects into Authorization headers).
  repeated string log_masks = 10;
  // Artifact paths declared in the job's YAML `artifacts.paths:`. The
  // runner tars each path after tasks succeed, calls
  // RequestArtifactUpload to get signed PUT URLs, and reports what
  // uploaded back in JobResult.artifacts. Upload failure on any
  // required path fails the job — the YAML declared these as part
  // of the build's contract, so a missing file means the build
  // didn't deliver what it promised.
  repeated string artifact_paths = 11;
  // Artifacts this job depends on (`needs_artifacts:` in YAML). Agent
  // downloads + untars each one into `dest` (relative to workspace)
  // before running the first task. Failure to download any dep fails
  // the job before any user code runs.
  repeated ArtifactDownload artifact_downloads = 12;
  // Best-effort artifact paths from YAML `artifacts.optional:` — the
  // runner attempts to upload each but only logs on failure instead
  // of failing the job. Use for logs, coverage reports, screenshots
  // — anything where "nice to have" beats "fail the build". Kept
  // separate from artifact_paths so the runner can enforce strict
  // semantics on the required list without per-entry flags on the
  // wire.
  repeated string optional_artifact_paths = 13;
  // When true the runner must expose a usable Docker API to the
  // script — via a mounted /var/run/docker.sock (Shell/Docker
  // engines) or a DinD sidecar (Kubernetes engine). Set by the
  // YAML `docker: true` flag on a job that needs to spawn
  // containers itself (testcontainers, docker compose, buildx).
  // Engines that can't honour this return an error before running
  // the script — the user asked for capability A, running without
  // it would surprise them silently.
  bool docker = 14;
  // Pipeline-level sidecar services (postgres, redis, localstack…)
  // the agent brings up BEFORE tasks run and tears down when the
  // job ends. Jobs reach a service by `name` on a job-scoped
  // docker network the agent provisions per assignment. Empty
  // list = no sidecars, skip the network plumbing entirely.
  repeated ServiceSpec services = 15;
  // Cache entries declared on this job. Agent calls
  // RequestCacheGet for each before tasks (silent miss on first
  // run) and RequestCachePut + MarkCacheReady for each after a
  // successful run. Empty list = no cache plumbing.
  repeated CacheEntry caches = 16;
  // Glob patterns the agent scans after tasks complete, parses
  // as JUnit XML, and ships back as a TestResultBatch. Empty =
  // no test reporting for this job. Globs are workspace-relative;
  // no match is a silent no-op (the job may have legitimately
  // produced nothing, e.g. when tests were skipped entirely).
  repeated string test_reports = 17;
  // Resources is the per-job compute envelope the engine should
  // request from the runtime. Strings carry k8s quantity format
  // ("100m", "256Mi"); empty fields fall through to engine defaults.
  // Engines without a notion of resources (Shell) ignore the field
  // entirely; the scheduler still validates against the runner
  // profile cap at apply time, so by the time this lands on the
  // wire it has been clamped.
  ResourceRequirements resources = 18;
  // Profile is the resolved runner profile name the scheduler
  // matched the job to. Carried here only so the agent's logs +
  // metrics can label the dispatch — the scheduler's tag-matching
  // already enforced the constraint upstream.
  string profile = 19;
}

// ResourceRequirements mirrors the subset of corev1.ResourceList the
// engines honour: cpu + memory, requests + limits. Strings are the
// raw quantity literal, kept verbatim to round-trip through the
// admin UI without re-encoding.
message ResourceRequirements {
  string cpu_request    = 1;
  string cpu_limit      = 2;
  string memory_request = 3;
  string memory_limit   = 4;
}

// CacheEntry on the wire mirrors parser.CacheSpec — the key the
// server indexes by and the workspace-relative paths the agent
// tars up. Renamed from `CacheSpec` to avoid collision with the
// existing Kubernetes-style name in future proto evolution;
// the domain-layer name stays `CacheSpec` where the overlap
// doesn't matter.
message CacheEntry {
  string key               = 1;
  repeated string paths    = 2;
}

// ServiceSpec is the wire shape for a pipeline-level service. The
// agent's docker engine translates each into a container on a
// per-job bridge network with `name` as the DNS alias. `command`,
// when set, overrides the image's default ENTRYPOINT/CMD — matches
// how GitLab CI / Woodpecker expose the same knob.
message ServiceSpec {
  string name                = 1;
  string image               = 2;
  map<string, string> env    = 3;
  repeated string command    = 4;
}

message ArtifactDownload {
  string path           = 1; // original YAML path of the source artifact
  string storage_key    = 2; // opaque key at the backend (for logs)
  string get_url        = 3; // signed GET URL
  string dest           = 4; // destination dir relative to workspace
  string content_sha256 = 5; // expected hex sha for verification
  string from_job       = 6; // upstream job name (for logs)
}

message TaskSpec {
  oneof kind {
    string      script = 1;
    PluginSpec  plugin = 2;
  }
}

message PluginSpec {
  string              image    = 1;
  map<string, string> settings = 2; // vira PLUGIN_* env no container
}

message MaterialCheckout {
  string material_id = 1;
  string url         = 2;
  string revision    = 3;
  string branch      = 4;
  string target_dir  = 5;
  string secret_ref  = 6;
}

message CancelJob {
  string run_id = 1;
  string job_id = 2;
  string reason = 3;
}

message Pong {
  google.protobuf.Timestamp at = 1;
}
