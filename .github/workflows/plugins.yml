name: Plugins

on:
  push:
    branches: [main]
    paths:
      - "plugins/**"
      - ".github/workflows/plugins.yml"
    tags: ["v*.*.*"]
  pull_request:
    paths:
      - "plugins/**"
      - ".github/workflows/plugins.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write    # cosign keyless: short-lived Sigstore Fulcio
                     # cert bound to GitHub OIDC claims (repo, ref,
                     # sha, workflow). Same pattern as release.yml.
                     # Fork PRs DON'T sign — the cosign steps are
                     # gated on `github.event_name != 'pull_request'`
                     # mirroring the provenance/sbom flags, so this
                     # elevated permission only fires on
                     # main/tag/workflow_dispatch.

env:
  REGISTRY: ghcr.io
  # Plugins that FROM the shared jdk-base image. When jdk-base
  # changes, these MUST rebuild against the new base so a
  # consumer touching only entrypoint.sh and a base toolchain
  # bump don't ship out of sync. New JVM plugins (sbt, ant,
  # kotlin-cli) join this list when they land.
  JDK_BASE_CONSUMERS: "gradle maven"

jobs:
  changed:
    # Compute which plugin directories changed in this push so the
    # build matrix only fans out over those — buying the 38-plugin
    # repo back its sub-2-minute CI for a typical PR. On a tag push
    # we rebuild every plugin so the release version stamps a full
    # set of images regardless of which dir last touched main.
    runs-on: ubuntu-latest
    outputs:
      plugins: ${{ steps.set.outputs.plugins }}
      any: ${{ steps.set.outputs.any }}
      base_needed: ${{ steps.set.outputs.base_needed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: set
        run: |
          set -euo pipefail
          all=$(find plugins -mindepth 2 -maxdepth 2 -name Dockerfile \
                | awk -F/ '{print $2}' | sort -u)

          if [[ "${GITHUB_REF}" == refs/tags/v* ]] || [[ "${{ github.event_name }}" == workflow_dispatch ]]; then
            picks=$all
          else
            base="${{ github.event.before }}"
            # Fall back to the merge-base with main when the recorded base
            # is missing, the all-zero sentinel (first push to a branch),
            # OR no longer present in the repo — a force-push (amend/rebase,
            # which we do every review round) leaves event.before pointing
            # at a now-unreachable commit, and `git diff <gone> HEAD` would
            # die with "bad object" under set -e.
            if [[ -z "$base" ]] \
               || [[ "$base" == 0000000000000000000000000000000000000000 ]] \
               || ! git cat-file -e "${base}^{commit}" 2>/dev/null; then
              base=$(git merge-base HEAD origin/main 2>/dev/null || git rev-list --max-parents=0 HEAD)
            fi
            changed=$(git diff --name-only "$base" HEAD -- plugins/ \
                      | awk -F/ '{print $2}' | sort -u)
            # Workflow file changed → rebuild everything (operators
            # often tweak the matrix and expect a full rebuild).
            if git diff --name-only "$base" HEAD -- .github/workflows/plugins.yml | grep -q .; then
              picks=$all
            else
              picks=$changed
              # If jdk-base changed, force-add the consumers so a
              # toolchain bump doesn't leave gradle:main pointing at
              # last week's base. Consumers in $JDK_BASE_CONSUMERS
              # get folded in even when their own dir didn't change.
              if printf '%s\n' $picks | grep -qx jdk-base; then
                picks=$(printf '%s\n%s\n' "$picks" "$JDK_BASE_CONSUMERS" | tr ' ' '\n' | sort -u)
              fi
            fi
          fi

          # Split the picks into (a) the matrix list — every plugin
          # to build EXCEPT jdk-base, which has its own dedicated job
          # because consumers in the matrix FROM it — and (b) a flag
          # telling us whether jdk-base itself needs a rebuild this
          # run. Both are needed downstream.
          matrix_picks=$(printf '%s\n' $picks | grep -vx jdk-base || true)
          if printf '%s\n' $picks | grep -qx jdk-base; then
            base_needed=true
          else
            base_needed=false
          fi

          arr=$(printf '%s\n' $matrix_picks | jq -R . | jq -sc .)
          echo "plugins=$arr" >> "$GITHUB_OUTPUT"
          if [[ "$arr" == "[]" ]] && [[ "$base_needed" == "false" ]]; then
            echo "any=false" >> "$GITHUB_OUTPUT"
          else
            echo "any=true" >> "$GITHUB_OUTPUT"
          fi
          echo "base_needed=$base_needed" >> "$GITHUB_OUTPUT"
          echo "Matrix: $arr"
          echo "Base needed: $base_needed"

  base:
    # jdk-base is built BEFORE the consumer matrix so gradle and
    # maven (and future JVM plugins) can FROM the just-pushed
    # image. Skipped when base_needed=false — consumers then fall
    # back to the stable `:v1` tag from the last release.
    needs: changed
    if: needs.changed.outputs.base_needed == 'true'
    runs-on: ubuntu-latest
    outputs:
      # The tag the consumer matrix will FROM for this run. On
      # release-tag push: the semver tag (e.g. "v0.15.0"). On main
      # push: "main" or the short sha. On same-repo PR: "pr-N".
      # Empty when this job is skipped — the matrix's `images`
      # job uses `||` fallback to `:v1` in that case.
      ref: ${{ steps.meta.outputs.version }}
      # Whether the base image was actually pushed to ghcr. False
      # on fork PRs (token can't write); the consumer matrix MUST
      # ignore `ref` in that case and fall back to `:v1` instead
      # of trying to FROM a non-existent `:pr-N` tag.
      pushed: ${{ steps.can-push.outputs.push }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
        with:
          # GCR mirror dodges Docker Hub flakeyness at the
          # bootstrap step (issue #19). Same pin in release.yml.
          driver-opts: |
            image=mirror.gcr.io/moby/buildkit:buildx-stable-1

      - id: can-push
        # Decide can-push BEFORE the registry login so a fork-PR
        # token without packages:write doesn't crash the login
        # step (which would short-circuit the whole job before
        # the build-push fallback fired). The login step below is
        # gated on push=true; fork PRs skip login + push, but
        # still run the validation build via build-push with
        # push: false.
        #
        # Fork detection: head.repo.full_name on a PR opened from
        # an external fork differs from the workflow's own
        # github.repository; same-repo PRs (push to a branch in
        # the same repo) match. `pull_request_target` is NOT used
        # here on purpose — it would run with write tokens against
        # UNTRUSTED Dockerfile content, exactly the supply-chain
        # risk #20 was not meant to introduce.
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "push=true" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event.pull_request.head.repo.full_name }}" == "${{ github.repository }}" ]]; then
            echo "push=true" >> "$GITHUB_OUTPUT"
          else
            echo "push=false" >> "$GITHUB_OUTPUT"
            echo "::notice::fork PR detected (head=${{ github.event.pull_request.head.repo.full_name }}); base build validates without push, consumers fall back to :v1"
          fi

      - uses: docker/login-action@v3
        if: steps.can-push.outputs.push == 'true'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # cosign keyless installer. Cheap to run unconditionally —
      # only the sign/attest steps further down actually exercise
      # the OIDC token, and those are gated on non-PR.
      - uses: sigstore/cosign-installer@v3
        if: github.event_name != 'pull_request'
        with:
          cosign-release: v2.4.1

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/gocdnext-plugin-jdk-base
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}
            # sha- only on BRANCH pushes: main-push + tag-push runs for the
            # same commit build DIFFERENT digests (VERSION build-arg) and
            # both writing sha-<commit> orphans the loser's manifest —
            # its own SBOM step then fails resolving the digest (issue #31).
            # Disjoint tag sets per trigger keep every digest reachable.
            type=sha,prefix=sha-,enable=${{ github.ref_type == 'branch' }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=v1,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            # PR-scoped immutable tag: `pr-N-sha-FULL` is unique per
            # commit so successive PR pushes never overwrite each
            # other's manifest. Cleanup walks ALL versions whose
            # tags match `pr-N` OR `pr-N-sha-*` so orphaned older
            # builds (no longer holding the moving `pr-N` tag) get
            # collected too.
            type=raw,value=pr-${{ github.event.pull_request.number }}-sha-${{ github.sha }},enable=${{ github.event_name == 'pull_request' }}

      - id: build
        uses: docker/build-push-action@v6
        with:
          context: plugins/jdk-base
          file: plugins/jdk-base/Dockerfile
          platforms: linux/amd64
          # PR-scoped push (issue #20): pushing on same-repo PRs
          # lets the consumer matrix FROM the exact base the PR
          # is proposing, instead of falling back to the last
          # released `:v1`. The metadata-action tag set restricts
          # what lands per event kind:
          #   - tag push → semver tags (v0.15.0, v0.15, v0) + latest + v1 + sha-
          #   - main push → main + sha-
          #   - same-repo PR → pr-N (moves on each push) + pr-N-sha-FULL (immutable) + sha-
          #   - fork PR → no push, validates only (see can-push step)
          # Cleanup workflow (.github/workflows/plugins-cleanup.yml)
          # deletes ALL pr-N* tagged versions when the PR closes;
          # a nightly sweep collects stragglers.
          push: ${{ steps.can-push.outputs.push == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # provenance + sbom only on main/tag pushes. PR-scoped
          # builds produce ephemeral images that the cleanup
          # workflow deletes by tag; the provenance/SBOM
          # referrers are untagged child manifests of the same
          # digest, so they leak past the tag-based cleanup. For
          # release/main builds we want both for supply-chain
          # provenance; for PR-scoped builds the throwaway nature
          # means the noise isn't worth the residue. Same gate
          # applies to the cosign sign/attest steps below.
          provenance: ${{ github.event_name != 'pull_request' }}
          sbom: ${{ github.event_name != 'pull_request' }}
          # Registry cache instead of type=gha: the Actions cache has a
          # 10 GB per-repo cap with LRU eviction, and a tag push
          # rebuilding the whole catalog blows through it every release —
          # evicted blobs leave per-scope indexes dangling and buildkit
          # fails the IMPORT with "blob not found" instead of treating it
          # as a miss (goose on v0.22.0/v0.23.0). GHCR has no such cap.
          # cache-to only when we can push (fork PRs read the public
          # cache but can't write — an empty string input is ignored).
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository_owner }}/gocdnext-plugin-buildcache:jdk-base
          cache-to: ${{ steps.can-push.outputs.push == 'true' && format('type=registry,ref={0}/{1}/gocdnext-plugin-buildcache:jdk-base,mode=max', env.REGISTRY, github.repository_owner) || '' }}

      # Sign the manifest digest, not a tag — tags are mutable
      # (jdk-base ships `:v1`, `:latest`, `:main`, semver tags,
      # `:pr-N` and `:pr-N-sha-FULL` simultaneously); the digest
      # is the only handle that can't shift under the signature.
      # Verifier pins the OIDC identity to this workflow file +
      # tag the same way as release.yml.
      - name: cosign sign (keyless)
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE: ${{ env.REGISTRY }}/${{ github.repository_owner }}/gocdnext-plugin-jdk-base
        run: |
          set -euo pipefail
          cosign sign --yes "${IMAGE}@${DIGEST}"

      # GHCR is eventually consistent for by-digest reads right
      # after a push — gate before Syft, same flake class as
      # release.yml (manifest unknown a few hundred ms post-push).
      - name: wait for pushed manifest
        if: github.event_name != 'pull_request'
        env:
          REF: ${{ env.REGISTRY }}/${{ github.repository_owner }}/gocdnext-plugin-jdk-base@${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          for i in $(seq 1 12); do
            if docker manifest inspect "${REF}" >/dev/null 2>&1; then
              echo "manifest resolvable after ${i} attempt(s)"
              exit 0
            fi
            sleep 5
          done
          echo "::error::${REF} not resolvable after 60s — registry propagation stuck"
          exit 1

      # CycloneDX SBOM via Syft — same rationale as release.yml.
      # The buildkit-native SBOM (sbom: true above) is SPDX;
      # most vuln scanners read CycloneDX, so we attach both
      # bound to the same digest.
      - uses: anchore/sbom-action@v0
        if: github.event_name != 'pull_request'
        with:
          image: ${{ env.REGISTRY }}/${{ github.repository_owner }}/gocdnext-plugin-jdk-base@${{ steps.build.outputs.digest }}
          format: cyclonedx-json
          output-file: sbom-jdk-base.cdx.json
          upload-artifact: false

      - name: cosign attest (SBOM, CycloneDX)
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE: ${{ env.REGISTRY }}/${{ github.repository_owner }}/gocdnext-plugin-jdk-base
        run: |
          set -euo pipefail
          cosign attest --yes \
            --predicate sbom-jdk-base.cdx.json \
            --type cyclonedx \
            "${IMAGE}@${DIGEST}"

  images:
    # The fan-out matrix for every plugin EXCEPT jdk-base. Waits
    # for the `base` job so consumers (gradle, maven) FROM the
    # just-pushed jdk-base when it rebuilt; falls back to the
    # stable `:v1` tag when base was skipped.
    #
    # `if` guards on the matrix having at least one entry AND on
    # the base job being either successful or skipped — we don't
    # want a base failure to silently produce a consumer image
    # against the previous-release base.
    needs: [changed, base]
    if: |
      always() &&
      needs.changed.outputs.any == 'true' &&
      needs.changed.outputs.plugins != '[]' &&
      (needs.base.result == 'success' || needs.base.result == 'skipped')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        plugin: ${{ fromJson(needs.changed.outputs.plugins) }}
    steps:
      - uses: actions/checkout@v4

      # Shell-mock unit test for plugins that ship one (entrypoint_test.sh).
      # Runs before the image build so a logic regression fails fast and
      # cheap, without needing the built image or a live backend.
      - name: plugin unit test (if present)
        run: |
          t="plugins/${{ matrix.plugin }}/entrypoint_test.sh"
          if [ -x "$t" ]; then
            echo "==> $t"
            bash "$t"
          else
            echo "no entrypoint_test.sh for ${{ matrix.plugin }} — skipping"
          fi

      # arm64 builds disabled while we stabilise — see release.yml
      # for the rationale. Restore docker/setup-qemu-action@v3 and
      # the linux/arm64 entry below when multi-arch returns.
      - uses: docker/setup-buildx-action@v3
        with:
          # GCR mirror dodges Docker Hub flakeyness at the
          # bootstrap step (issue #19). Same pin in release.yml.
          driver-opts: |
            image=mirror.gcr.io/moby/buildkit:buildx-stable-1

      - uses: docker/login-action@v3
        # Skip login on fork PRs — same rationale as the `base`
        # job's `can-push` guard: a fork-PR token doesn't carry
        # packages:write so the login step would 403 and kill
        # the matrix entry before the build-push fallback to
        # push: false fires. The consumer matrix already runs
        # push: false on any PR (including same-repo), so
        # technically same-repo PRs don't need login either —
        # but keeping it on same-repo lets a future change that
        # pushes consumer images on same-repo PRs land without
        # re-touching this guard.
        if: |
          github.event_name != 'pull_request' ||
          github.event.pull_request.head.repo.full_name == github.repository
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # cosign keyless: same pattern as base/release. Skipped on
      # PR runs because the matrix build-push runs push: false
      # in that case — no published image to sign.
      - uses: sigstore/cosign-installer@v3
        if: github.event_name != 'pull_request'
        with:
          cosign-release: v2.4.1

      # Contract tag comes from the plugin's own manifest (`image_tag:`,
      # default v1). Before this step the workflow hardcoded v1 for every
      # plugin while node's manifest declared image_tag: v2 — the docs
      # catalog rendered `node@v2` examples against a tag that was never
      # published (operator-reported ImagePullBackOff). The manifest is
      # now the single source of truth for the contract channel.
      - id: imgtag
        run: |
          TAG=$(grep -E '^image_tag:' "plugins/${{ matrix.plugin }}/plugin.yaml" | head -1 | awk '{print $2}' | tr -d '"' || true)
          echo "tag=${TAG:-v1}" >> "$GITHUB_OUTPUT"

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/gocdnext-plugin-${{ matrix.plugin }}
          # Stable channels (latest, v1, vMAJOR.MINOR, vMAJOR) ride ONLY
          # on release-tag pushes — pinning to :v1 or :latest should track
          # the last cut release, not the rolling main HEAD. main pushes
          # only refresh :main and :sha-... so dev consumers have a HEAD
          # tracker without polluting the stable channel pinned by users.
          #
          # v1 is ALWAYS published alongside the manifest's image_tag:
          # node:v1 has carried the v2 contract since the v0.4.39 rewrite
          # (the tag never bumped with the source), so freezing v1 now
          # would silently strand anyone pinned to it. Both tags point at
          # the same digest; image_tag is the documented channel.
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}
            # sha- only on BRANCH pushes: main-push + tag-push runs for the
            # same commit build DIFFERENT digests (VERSION build-arg) and
            # both writing sha-<commit> orphans the loser's manifest —
            # its own SBOM step then fails resolving the digest (issue #31).
            # Disjoint tag sets per trigger keep every digest reachable.
            type=sha,prefix=sha-,enable=${{ github.ref_type == 'branch' }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=v1,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=${{ steps.imgtag.outputs.tag }},enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - id: base-ref
        # Compute the BASE_IMAGE build-arg per consumer step.
        # Precedence after issue #20:
        #
        #   1. base.outputs.ref is set AND base.outputs.pushed
        #      is "true" → the base job ran THIS workflow and
        #      its image is in ghcr. Consumer FROMs the exact
        #      image that was just built. Covers:
        #        - tag push (ref="v0.15.0", pushed=true)
        #        - main push touching jdk-base (ref="main", pushed=true)
        #        - same-repo PR touching jdk-base (ref="pr-42", pushed=true)
        #
        #   2. base ran but did NOT push (fork PR) → fall back
        #      to :v1. The image isn't in ghcr to FROM. Same
        #      shape as pre-#20 fork PR behaviour.
        #
        #   3. PR that did NOT rebuild jdk-base (consumer-only
        #      changes) → fall back to :v1. The PR isn't
        #      proposing a base change so the stable channel is
        #      the right anchor.
        #
        #   4. main push that did NOT rebuild jdk-base → fall
        #      back to :main, not :v1. If jdk-base:main diverged
        #      from :v1, a downstream-only push that falls back
        #      to :v1 silently builds gradle:main against
        #      last-week's stable base — masking breakage that
        #      :main was supposed to surface.
        #
        #   5. Any other ref → :v1 (defence in depth).
        run: |
          set -euo pipefail
          owner="${{ github.repository_owner }}"
          base="${REGISTRY}/${owner}/gocdnext-plugin-jdk-base"
          if [[ -n "${{ needs.base.outputs.ref }}" ]] && [[ "${{ needs.base.outputs.pushed }}" == "true" ]]; then
            ref="${base}:${{ needs.base.outputs.ref }}"
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            ref="${base}:v1"
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            ref="${base}:main"
          else
            ref="${base}:v1"
          fi
          echo "ref=$ref" >> "$GITHUB_OUTPUT"
          echo "BASE_IMAGE for ${{ matrix.plugin }}: $ref"

      - id: build
        uses: docker/build-push-action@v6
        with:
          context: plugins/${{ matrix.plugin }}
          file: plugins/${{ matrix.plugin }}/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # build-args is a NEWLINE-separated list. Plugins that
          # don't honour BASE_IMAGE (every non-JVM plugin) silently
          # ignore the unknown ARG — no Dockerfile change needed.
          build-args: |
            BASE_IMAGE=${{ steps.base-ref.outputs.ref }}
          # Same supply-chain flags as the base job: buildkit
          # provenance (SLSA v1 in-toto) + native SPDX SBOM, only
          # on non-PR pushes. PR-scoped builds don't push, so
          # there's nothing to attest anyway.
          provenance: ${{ github.event_name != 'pull_request' }}
          sbom: ${{ github.event_name != 'pull_request' }}
          # Registry cache — same rationale as the base job (10 GB GHA
          # cache cap + full-catalog rebuilds = recurring evicted-blob
          # import failures). cache-to skipped on any PR: the matrix
          # never pushes on PRs, and fork tokens can't write GHCR.
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository_owner }}/gocdnext-plugin-buildcache:${{ matrix.plugin }}
          cache-to: ${{ github.event_name != 'pull_request' && format('type=registry,ref={0}/{1}/gocdnext-plugin-buildcache:{2},mode=max', env.REGISTRY, github.repository_owner, matrix.plugin) || '' }}

      # Sign the manifest digest of every consumer plugin
      # (gradle, maven, node, go, docker, kubectl, trivy, slack
      # …) the same way as base + release.yml. Verifier pins:
      #   cosign verify \
      #     --certificate-identity-regexp \
      #       'https://github.com/<owner>/<repo>/\.github/workflows/plugins\.yml@.*' \
      #     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
      #     ghcr.io/<owner>/gocdnext-plugin-<name>@sha256:...
      - name: cosign sign (keyless)
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE: ${{ env.REGISTRY }}/${{ github.repository_owner }}/gocdnext-plugin-${{ matrix.plugin }}
        run: |
          set -euo pipefail
          cosign sign --yes "${IMAGE}@${DIGEST}"

      # Same GHCR by-digest propagation gate as the base job —
      # 3 of 47 matrix entries flaked "manifest unknown" on the
      # post-#31 main run, proving the flake is independent of
      # the parallel-runs race.
      - name: wait for pushed manifest
        if: github.event_name != 'pull_request'
        env:
          REF: ${{ env.REGISTRY }}/${{ github.repository_owner }}/gocdnext-plugin-${{ matrix.plugin }}@${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          for i in $(seq 1 12); do
            if docker manifest inspect "${REF}" >/dev/null 2>&1; then
              echo "manifest resolvable after ${i} attempt(s)"
              exit 0
            fi
            sleep 5
          done
          echo "::error::${REF} not resolvable after 60s — registry propagation stuck"
          exit 1

      - uses: anchore/sbom-action@v0
        if: github.event_name != 'pull_request'
        with:
          image: ${{ env.REGISTRY }}/${{ github.repository_owner }}/gocdnext-plugin-${{ matrix.plugin }}@${{ steps.build.outputs.digest }}
          format: cyclonedx-json
          output-file: sbom-${{ matrix.plugin }}.cdx.json
          upload-artifact: false

      - name: cosign attest (SBOM, CycloneDX)
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE: ${{ env.REGISTRY }}/${{ github.repository_owner }}/gocdnext-plugin-${{ matrix.plugin }}
        run: |
          set -euo pipefail
          cosign attest --yes \
            --predicate "sbom-${{ matrix.plugin }}.cdx.json" \
            --type cyclonedx \
            "${IMAGE}@${DIGEST}"
