name: Release

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
    # Skip the per-main-push :latest rebuild for docs-only / README
    # changes (mirrors ci.yml). MUST mirror ci.yml: if ci.yml skips a
    # docs commit but release.yml didn't, verify-ci-green would poll
    # for a CI run that never ran and fail the (pointless) Release.
    # Tags are safe — a release commit bumps CHANGELOG.md (not docs/ or
    # README.md), so it isn't ignored and verify-ci-green still finds
    # the changelog commit's green CI run.
    paths-ignore:
      - 'docs/**'
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: write    # chart job pushes to the gh-pages branch
  packages: write
  actions: read      # verify-ci-green reads workflow_runs via gh api
  id-token: write    # cosign keyless signs against the Sigstore
                     # Fulcio instance using a short-lived GitHub
                     # OIDC token — no PAT, no long-lived cert.

env:
  REGISTRY: ghcr.io

jobs:
  # verify-ci-green is the release-stage equivalent of the
  # trunk-based-release doc's "main.yaml SHA check": refuse to
  # publish images for a SHA whose CI workflow didn't pass green.
  # Without this, a `git revert` during red CI can land a tag
  # whose bytes never validated — the bug is fix-forward by then.
  #
  # The gate polls the same-SHA CI run via the GitHub API rather
  # than declaring `workflow_run: workflows: [CI]` because:
  #   - workflow_run wouldn't trigger on a manual workflow_dispatch
  #     (operator intent on a known-good SHA),
  #   - tag pushes need CI to have already run on the underlying
  #     commit; workflow_run would force a re-run.
  # The poll covers all three triggers (push/tag/manual) with one
  # contract: "the CI workflow MUST be completed with conclusion
  # success on this exact SHA, otherwise this release stops".
  verify-ci-green:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Wait for CI to land green on this SHA
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          deadline=$(( $(date +%s) + 1800 ))   # 30 min cap
          # Tag pushes ride a SHA whose CI already ran minutes
          # earlier; main pushes race the CI job in parallel.
          # In both cases we read the same /actions/runs endpoint
          # filtered to head_sha=SHA + workflow_name=CI.
          while :; do
            json=$(gh api \
              "repos/${REPO}/actions/runs?head_sha=${SHA}&per_page=20" \
              || echo '{"workflow_runs":[]}')
            ci=$(jq '[.workflow_runs[] | select(.name=="CI")] | first // empty' <<<"$json")
            if [ -n "$ci" ]; then
              status=$(jq -r '.status // ""' <<<"$ci")
              conclusion=$(jq -r '.conclusion // ""' <<<"$ci")
              url=$(jq -r '.html_url // ""' <<<"$ci")
              echo "CI run $url status=$status conclusion=$conclusion"
              if [ "$status" = "completed" ]; then
                if [ "$conclusion" = "success" ]; then
                  echo "::notice::CI green on ${SHA}; proceeding with release."
                  exit 0
                fi
                echo "::error::CI on ${SHA} finished with conclusion=${conclusion} (${url}). Refusing to publish."
                exit 1
              fi
            else
              echo "No CI run yet for ${SHA}; waiting..."
            fi
            if [ "$(date +%s)" -ge "$deadline" ]; then
              echo "::error::Timed out waiting for CI on ${SHA} after 30 min."
              exit 1
            fi
            sleep 30
          done

  images:
    runs-on: ubuntu-latest
    needs: [verify-ci-green]
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: server
            context: .
            dockerfile: server/Dockerfile
          - name: agent
            context: .
            dockerfile: agent/Dockerfile
          - name: web
            # Root context so the in-app /docs page can ship the
            # repo's root-level markdowns. The Dockerfile pulls
            # web/ explicitly + docs/*.md.
            context: .
            dockerfile: web/Dockerfile
    steps:
      - uses: actions/checkout@v4

      # arm64 builds disabled while we stabilise — QEMU emulation
      # on amd64 runners was pacing every release at 15-25 min per
      # image. Flip platforms back to linux/amd64,linux/arm64 + add
      # docker/setup-qemu-action@v3 when arm64 demand returns.
      - uses: docker/setup-buildx-action@v3
        with:
          # Pull buildkit from the GCR Docker Hub mirror to dodge
          # Docker Hub flakeyness / rate-limit class failures that
          # killed v0.14.8 release + plugins runs at the bootstrap
          # step (issue #19). The mirror is byte-identical and
          # auth-free; revert to default if it ever flaps.
          driver-opts: |
            image=mirror.gcr.io/moby/buildkit:buildx-stable-1

      # cosign keyless signs against Sigstore Fulcio using the
      # workflow's id-token (GitHub OIDC). No long-lived PAT or
      # private key in repo secrets — Fulcio mints a short-lived
      # certificate bound to the workflow's OIDC claims (repo,
      # ref, sha, workflow). Verifiers then pin those claims via
      # `cosign verify --certificate-identity-regexp`.
      - uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.4.1

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/gocdnext-${{ matrix.name }}
          # Stable channels (latest, vMAJOR.MINOR, vMAJOR) ride ONLY on
          # release-tag pushes — operators pulling :latest should land on
          # the last cut release, not the last main commit. main pushes
          # only refresh :main and :sha-... so dev consumers have a
          # rolling HEAD without polluting the stable channel.
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}
            # sha- only on BRANCH pushes: main-push + tag-push runs for the
            # same commit build DIFFERENT digests (VERSION build-arg) and
            # both writing sha-<commit> orphans the loser's manifest —
            # its own SBOM step then fails resolving the digest (issue #31).
            # Disjoint tag sets per trigger keep every digest reachable.
            type=sha,prefix=sha-,enable=${{ github.ref_type == 'branch' }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "value=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=$(git describe --tags --always --dirty)" >> "$GITHUB_OUTPUT"
          fi

      - id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.value }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
          # Buildkit emits SLSA v1 provenance + an SPDX SBOM
          # alongside the image manifest. mode=max captures the
          # full build graph (which Dockerfile stage produced
          # each layer, which build args were used) — that's the
          # predicate cosign attests below. Tag-stripped digest
          # output by build-push-action is the binding target.
          provenance: mode=max
          sbom: true

      # Sign the manifest digest, not a tag — tags are mutable;
      # the digest is the only handle that can't shift under the
      # signature. build-push-action exposes the published digest
      # as steps.build.outputs.digest. We iterate every tag the
      # metadata step produced so the cluster can verify against
      # whichever reference operators happen to pin. Fan-out over
      # tags is cheap because cosign reuses the same signature
      # for the digest — it just writes additional refs.
      - name: cosign sign (keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE: ${{ env.REGISTRY }}/${{ github.repository_owner }}/gocdnext-${{ matrix.name }}
        run: |
          set -euo pipefail
          cosign sign --yes "${IMAGE}@${DIGEST}"

      # GHCR is eventually consistent for by-digest reads right
      # after a push: Syft pulling the digest a few hundred ms
      # after buildx occasionally gets "manifest unknown" and
      # kills the matrix job (observed on v0.19.0 kaniko + the
      # v0.20.0-era main run: buf/nexus/helm). Gate on the
      # manifest being resolvable before invoking Syft —
      # bounded retry, fails loud past the deadline.
      - name: wait for pushed manifest
        env:
          REF: ${{ env.REGISTRY }}/${{ github.repository_owner }}/gocdnext-${{ matrix.name }}@${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          for i in $(seq 1 12); do
            if docker manifest inspect "${REF}" >/dev/null 2>&1; then
              echo "manifest resolvable after ${i} attempt(s)"
              exit 0
            fi
            sleep 5
          done
          echo "::error::${REF} not resolvable after 60s — registry propagation stuck"
          exit 1

      # Syft generates a richer CycloneDX SBOM than buildkit's
      # native SPDX one — it walks every layer's package manager
      # state (apk/dpkg + go.mod + node_modules) which is what
      # most vuln scanners read. We attach it as an in-toto
      # attestation bound to the SAME digest cosign just signed
      # so verifiers see a single bundle: signature + SBOM
      # predicate + SLSA predicate.
      - uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ github.repository_owner }}/gocdnext-${{ matrix.name }}@${{ steps.build.outputs.digest }}
          format: cyclonedx-json
          output-file: sbom-${{ matrix.name }}.cdx.json
          upload-artifact: false

      - name: cosign attest (SBOM, CycloneDX)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE: ${{ env.REGISTRY }}/${{ github.repository_owner }}/gocdnext-${{ matrix.name }}
          PREDICATE: sbom-${{ matrix.name }}.cdx.json
        run: |
          set -euo pipefail
          cosign attest --yes \
            --predicate "${PREDICATE}" \
            --type cyclonedx \
            "${IMAGE}@${DIGEST}"

      # SLSA provenance: NOT a separate cosign attest step.
      # `provenance: mode=max` on build-push-action above tells
      # buildkit to emit a SLSA v1 in-toto attestation anchored
      # to the manifest list — same digest cosign just signed,
      # verifiable via `cosign verify-attestation --type slsa…`
      # OR via Kyverno's `verifyImages.attestations`. Duplicating
      # it via `cosign attest --type slsaprovenance` would require
      # extracting buildkit's predicate JSON from the manifest,
      # which is brittle across buildx versions (the field name
      # has shifted). The native attestation IS the SLSA chain.

  chart:
    runs-on: ubuntu-latest
    needs: images
    if: startsWith(github.ref, 'refs/tags/v')
    # Same gh-pages target as the Docs workflow — serialise so the
    # two jobs never race the worktree push. cancel-in-progress: false
    # because both publishes are meaningful (chart releases and docs
    # changes both need to land).
    concurrency:
      group: gh-pages
      cancel-in-progress: false
    env:
      OWNER: ${{ github.repository_owner }}
      REPO: ${{ github.event.repository.name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # chart-releaser-style merge needs history

      - uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: Login to GHCR (helm)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - id: pkg
        name: Package chart
        run: |
          version="${GITHUB_REF#refs/tags/v}"
          mkdir -p .cr-release-packages
          helm package charts/gocdnext \
            --version "$version" \
            --app-version "$version" \
            --destination .cr-release-packages
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "package=.cr-release-packages/gocdnext-${version}.tgz" >> "$GITHUB_OUTPUT"

      - name: Publish OCI artefact
        run: |
          helm push "${{ steps.pkg.outputs.package }}" "oci://${REGISTRY}/${OWNER}/charts"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Publish to gh-pages
        run: |
          set -euo pipefail
          version="${{ steps.pkg.outputs.version }}"
          pkg="${{ steps.pkg.outputs.package }}"
          pages_url="https://${OWNER}.github.io/${REPO}"

          # First-run safety: create the gh-pages branch as orphan
          # when the repo doesn't have it yet. Subsequent runs check
          # out the existing one and merge new packages into the
          # existing index.yaml.
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch origin gh-pages:gh-pages
            git worktree add pages gh-pages
          else
            git worktree add --orphan -b gh-pages pages
            (cd pages && git rm -rf . 2>/dev/null || true)
          fi

          cp "$pkg" pages/

          # --merge keeps every prior version in the index instead
          # of pruning to whatever's in the directory now. Without
          # this `helm repo` clients only see the current release.
          if [ -f pages/index.yaml ]; then
            helm repo index pages --url "$pages_url" --merge pages/index.yaml
          else
            helm repo index pages --url "$pages_url"
          fi

          # Commit + push only if something changed (idempotent for
          # re-runs of the same tag).
          (
            cd pages
            git add .
            if git diff --staged --quiet; then
              echo "no chart changes — skipping push"
              exit 0
            fi
            git commit -m "chart: gocdnext-${version}"
            git push origin gh-pages
          )

      - name: Create GitHub Release with chart asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.pkg.outputs.package }}
          fail_on_unmatched_files: true
          # Force published-not-draft + explicit token. v0.15.3 hit a
          # 401 on the finalize PATCH leaving the release stuck in
          # draft state; the action's default behaviour creates as
          # draft and PATCHes to published as a separate call, which
          # is the exact request that failed. Setting draft: false +
          # threading the token explicitly closes both flake modes —
          # the action no longer needs the finalize call (created
          # already-published) and the token is unambiguously the
          # job's GITHUB_TOKEN.
          draft: false
          token: ${{ secrets.GITHUB_TOKEN }}
          # make_latest=legacy fixes the parallel-tags race that
          # demoted v0.18.1 on the retroactive v0.17/v0.18 push:
          # the action's default `true` says "set THIS release as
          # :latest now", so when 3 chart jobs ran in parallel the
          # last one to finish won — v0.17.0 finished last and
          # claimed :latest over v0.18.1. `legacy` instead asks
          # the GitHub backend to re-evaluate :latest from all
          # releases, picking the highest SemVer. Each parallel
          # call still triggers a re-eval, but they converge on
          # the same answer regardless of finish order.
          # GHCR's `:latest` tag is unaffected (gated separately
          # by `startsWith(github.ref, 'refs/tags/v')` in the
          # metadata step). One-time manual fix for the existing
          # bad state: `gh release edit v0.18.1 --latest`.
          make_latest: legacy
