name: CI

on:
  push:
    branches: [main]
    # Docs-site content and the root README never affect the Go/web
    # build or tests — don't burn a full CI run (or force a manual
    # [skip ci]) on a docs-only push. Deliberately NOT '**.md':
    # CHANGELOG.md MUST still trigger CI, because the release gate
    # (release.yml verify-ci-green) polls the tagged changelog commit's
    # SHA for a green CI run. pull_request stays unfiltered so a docs
    # PR's check still reports (no required-check deadlock).
    paths-ignore:
      - 'docs/**'
      - 'README.md'
  pull_request:
  workflow_dispatch:        # allow a manual re-run (e.g. after a flake)

jobs:
  go:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: gocdnext
          POSTGRES_PASSWORD: gocdnext
          POSTGRES_DB: gocdnext
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U gocdnext"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.25" }
      - run: go version
      - name: Test
        env:
          GOCDNEXT_DATABASE_URL: postgres://gocdnext:gocdnext@localhost:5432/gocdnext?sslmode=disable
        run: |
          # -p 1 on the server module: its db-backed packages each boot their
          # OWN Postgres via testcontainers (internal/dbtest), and running
          # package test binaries in parallel spins many containers at once.
          # On the GitHub runner that exhausts memory and a container gets
          # killed mid-run — surfacing as "connection refused" cascades across
          # unrelated store tests (flaky since ~v0.47.0, incl. on main).
          # Serialising the binaries keeps a single container alive at a time.
          # (Follow-up: have dbtest reuse the job's `services: postgres` with a
          # per-package database, then restore parallelism.)
          cd server && go test -p 1 ./...
          cd ../agent && go test ./...
          cd ../cli && go test ./...
      - name: Build
        run: make build

  web:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: web } }
    steps:
      - uses: actions/checkout@v4
      # pnpm action-setup reads packageManager from web/package.json
      # (defaults.working-directory only applies to run: steps, not
      # uses:, so we point at the file explicitly).
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: web/package.json
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm run build
